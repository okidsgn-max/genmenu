<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --accent-color: #e74c3c;
            --bg-color: #fff;
            --menu-bg-color: #fff;
            --menu-text-color: #667099;
            --menu-text-light: #8e8e9e;
            --font-main: 'Roboto', sans-serif;
            --divider-color: #eee;
            --category-font-color: #00b398;
            --category-font-size: 24px;
            --item-font-color: #667099;
            --item-font-size: 16px;
            --desc-font-color: #8e8e9e;
            --desc-font-size: 14px;
            --promo-title-font-size: 60px;
            --promo-text-font-size: 30px;
            --promo-price-font-size: 40px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-main); color: var(--text-color); background-color: #f5f5f5; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; align-items: center; margin-bottom: 5px; padding-bottom: 15px; }
        .header-logo { width: 85px; height: 22px; margin-right: 20px; object-fit: initial; }
        .header-title { font-size: 20px; font-weight: 600; color: #3d435c; margin: 0; margin-bottom: 15px; }
        .main-container { display: flex; flex: 1; gap: 20px; overflow: hidden; height: calc(100% - 120px); }
        .controls-panel { background: white; padding: 20px; border-radius: 8px; width: 380px; display: flex; flex-direction: column; height: 100%; }
        .controls-content { flex: 1; overflow-y: auto; padding-right: 10px; }
        .controls-footer { padding-top: 15px; border-top: 1px solid #eee; margin-top: auto; }
        .tab-buttons { display: flex; margin-bottom: 10px; position: sticky; top: 0; background: white; z-index: 1; }
        .tab-btn { display: flex; align-items: center; padding: 10px; background: none; border: none; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab-btn img { width: 20px; height: 20px; margin-right: 8px; }
        .tab-btn.active { color: var(--active-color); }
        .control-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .control-group:last-child { border-bottom: none; }
        .control-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: var(--text-color); }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 10px; }
        .checkbox-group input { margin-right: 10px; }
        .btn { background: var(--button-color); color: var(--button-text); border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 14px; transition: background 0.3s; width: 100%; margin-bottom: 10px; }
        .btn:hover { background: var(--button-hover); }
        .btn-secondary { background: none; color: var(--text-color); border: 1px solid #ddd; }
        .btn-secondary:hover { background: #f0f0f0; }
        .input, .select { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 4px; font-family: inherit; font-size: 14px; margin-bottom: 10px; background-color: var(--input-bg); }
        .setting-row { display: grid; grid-template-columns: 1fr 1fr 30px; gap: 10px; align-items: center; margin-bottom: 5px; }
        .preview-wrapper { flex: 1; display: flex; flex-direction: column; }
        .preview-container { background: white; border-radius: 8px; flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; background-color: transparent; }
        .preview-actions { display: flex; gap: 10px; margin-top: 20px; }
        .menu-preview-aspect-ratio { width: 100%; aspect-ratio: 16 / 9; background: white; margin: auto; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .menu-preview { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .menu-content { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; background-size: cover; background-position: center; padding: 30px; }
        .menu-items-container { flex: 1; overflow-y: auto; padding-right: 10px; }
        .menu-items-container.two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .menu-section { margin-bottom: 30px; }
        .section-title { font-family: var(--font-category); font-size: var(--category-font-size); font-weight: 700; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid var(--divider-color); color: var(--category-font-color); }
        .menu-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed var(--divider-color); color: var(--item-font-color); }
        .item-content { flex-grow: 1; }
        .item-name { font-family: var(--font-item); font-weight: 500; font-size: var(--item-font-size); margin-bottom: 5px; }
        .item-description { font-family: var(--font-desc); font-size: var(--desc-font-size); color: var(--desc-font-color); margin-bottom: 5px; }
        .item-price { font-family: var(--font-item); font-weight: 700; font-size: var(--item-font-size); white-space: nowrap; margin-left: 20px; text-align: right; min-width: 80px; }
        .menu-grid-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; width: 100%; height: 100%; padding: 10px; background-size: cover; background-position: center; }
        .menu-grid-item { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); border: 1px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .grid-item-content { flex-grow: 1; }
        .grid-item-image { width: 50%; height: 40%; object-fit: cover; border-radius: 4px; position: absolute; bottom: 10px; right: 10px; }
        .upload-placeholder { position: absolute; bottom: 10px; right: 10px; width: 50%; height: 40%; background: #e9e9e9; border: 2px dashed #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #aaa; cursor: pointer; transition: all 0.3s; }
        .upload-placeholder:hover { background: #ddd; border-color: #bbb; }
        .promo-template { color: white; position: relative; width: 100%; height: 100%; overflow: hidden; background-size: cover; background-position: center; }
        .promo-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; padding: 40px; text-align: left; }
        .promo-content.align-center { text-align: center; align-items: center; justify-content: center; }
        .promo-content.align-right { text-align: right; align-items: flex-end; justify-content: center; }
        .promo-content.align-left { text-align: left; align-items: flex-start; justify-content: center; }
        .promo-title { font-size: var(--promo-title-font-size); font-weight: 700; margin-bottom: 20px; line-height: 1.1; }
        .promo-text { font-size: var(--promo-text-font-size); margin-bottom: 30px; line-height: 1.3; }
        .promo-price { font-size: var(--promo-price-font-size); font-weight: bold; margin-top: 20px; }
        .combined-template { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; overflow: hidden; }
        .combined-menu-part { padding: 30px; background-size: cover; background-position: center; overflow: hidden; }
        .combined-menu-scroll { height: 100%; overflow-y: auto; }
        .combined-promo-part { position: relative; color: white; overflow: hidden; background-size: cover; background-position: center; }
        .combined-promo-content { position: relative; z-index: 2; padding: 30px; height: 100%; display: flex; flex-direction: column; text-align: left; }
        .bg-options { display: flex; gap: 10px; margin-bottom: 15px; }
        .bg-option-btn { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white; flex-grow: 1; }
        .bg-option-btn.active { background: var(--active-color); color: white; border-color: var(--active-color); }
        .prompt-input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid var(--input-border); border-radius: 4px; background-color: var(--input-bg); }
        .generate-btn { background: var(--accent-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; width: 100%; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; color: white; font-size: 24px; flex-direction: column; text-align: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--active-color); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drop-area { border: 2px dashed #ccc; border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.3s; background-color: var(--input-bg); }
        .drop-area:hover, .drop-area.highlight { border-color: var(--active-color); background: rgba(0, 179, 152, 0.05); }
        .file-info { font-size: 12px; color: var(--menu-text-light); margin-top: 5px; }
        @media (max-width: 768px) { .main-container { flex-direction: column; height: auto; } .controls-panel { width: 100%; } .combined-template { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo">
    </div>
    
    <div class="main-container">

        <div class="controls-panel">
            <h1 class="header-title">Генератор менюборда</h1>

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu"><img src="menu.svg" alt="Меню"> Меню</button>
                <button class="tab-btn" data-tab="promo"><img src="acii.svg" alt="Акция"> Акция</button>
                <button class="tab-btn" data-tab="combined"><img src="2v1.svg" alt="2 в 1"> 2в1</button>
            </div>

            <div class="controls-content">
                <div id="menu-controls">
                     <div class="control-group">
                        <label>Загрузка данных:</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл Excel или
                            <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display: none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Настройки верстки</label>
                         <select id="layout-type-select" class="select">
                            <option value="list">Список</option>
                            <option value="grid">Сетка 2x2 (первые 4 блюда)</option>
                        </select>
                        <div class="checkbox-group">
                            <input type="checkbox" id="show-description-checkbox">
                            <label for="show-description-checkbox">Показывать описание блюда</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="multiple-prices-checkbox">
                            <label for="multiple-prices-checkbox">Использовать цены для объемов (S/M/L)</label>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон меню:</label>
                        <div class="bg-options">
                            <button class="bg-option-btn active" data-type="color">Цвет</button>
                            <button class="bg-option-btn" data-type="image">Изображение</button>
                        </div>
                        <div id="bg-color-container-menu">
                            <input type="color" id="menu-bg-color-picker" value="#ffffff" style="width: 100%; height: 40px;">
                        </div>
                        <div id="bg-image-container-menu" style="display: none;">
                            <button class="btn btn-secondary" onclick="document.getElementById('menu-bg-upload').click()">Добавить фон</button>
                            <input type="file" id="menu-bg-upload" accept="image/*" style="display: none;">
                            <div class="file-info" id="menu-bg-file-info">Фон не загружен</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт категорий:</label>
                        <div class="setting-row">
                            <select id="category-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Open Sans', sans-serif">Open Sans</option></select>
                            <input type="number" id="category-font-size" class="input" value="24" min="10" max="100">
                            <input type="color" id="category-color-picker" value="#00b398">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт пунктов:</label>
                        <div class="setting-row">
                            <select id="item-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Open Sans', sans-serif">Open Sans</option><option value="'Lato', sans-serif">Lato</option></select>
                            <input type="number" id="item-font-size" class="input" value="16" min="10" max="100">
                            <input type="color" id="item-color-picker" value="#667099">
                        </div>
                    </div>

                    <div class="control-group" id="description-font-controls" style="display:none;">
                        <label>Шрифт описания:</label>
                        <div class="setting-row">
                            <select id="desc-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Open Sans', sans-serif">Open Sans</option><option value="'Lato', sans-serif">Lato</option></select>
                            <input type="number" id="desc-font-size" class="input" value="14" min="8" max="100">
                            <input type="color" id="desc-color-picker" value="#8e8e9e">
                        </div>
                    </div>
                </div>
                
                <div id="promo-controls" style="display: none;">
                    <div class="control-group">
                        <label for="promo-title-input">Заголовок акции:</label>
                        <input type="text" id="promo-title-input" class="input" placeholder="Введите заголовок акции">
                        <div class="setting-row">
                            <select id="promo-title-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Oswald', sans-serif">Oswald</option></select>
                            <input type="number" id="promo-title-size" class="input" value="60" min="10" max="100">
                            <input type="color" id="promo-title-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-text-input">Текст акции:</label>
                        <input type="text" id="promo-text-input" class="input" placeholder="Введите текст акции">
                         <div class="setting-row">
                            <select id="promo-text-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Open Sans', sans-serif">Open Sans</option><option value="'Lato', sans-serif">Lato</option></select>
                            <input type="number" id="promo-text-size" class="input" value="30" min="10" max="100">
                            <input type="color" id="promo-text-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-price-input">Цена товара (₽):</label>
                        <input type="number" id="promo-price-input" class="input" placeholder="Введите цену товара">
                        <div class="setting-row">
                            <select id="promo-price-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Oswald', sans-serif">Oswald</option></select>
                            <input type="number" id="promo-price-size" class="input" value="40" min="10" max="100">
                            <input type="color" id="promo-price-color-picker" value="#ffffff">
                        </div>
                    </div>

                     <div class="control-group">
                        <label>Расположение текста на акции</label>
                         <select id="promo-align-select" class="select">
                            <option value="left">Слева</option>
                            <option value="center" selected>По центру</option>
                            <option value="right">Справа</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон:</label>
                        <div class="bg-options">
                            <button class="bg-option-btn active" data-type="color">Цвет</button>
                            <button class="bg-option-btn" data-type="image">Изображение</button>
                            <button class="bg-option-btn" data-type="generate">AI Генерация</button>
                        </div>
                        <div id="bg-color-container"><input type="color" id="bg-color-picker" value="#4a6baf" style="width: 100%; height: 40px;"></div>
                        <div id="bg-image-container" style="display: none;">
                            <button class="btn btn-secondary" onclick="document.getElementById('promo-background-upload').click()">Добавить фон</button>
                            <input type="file" id="promo-background-upload" accept="image/*" style="display: none;">
                            <div class="file-info" id="bg-file-info">Изображение не загружено</div>
                        </div>
                        <div id="bg-generate-container" style="display: none;">
                            <input type="text" id="bg-prompt" class="prompt-input" placeholder="Опишите фон для генерации (на англ.)">
                            <button class="generate-btn" id="generate-bg-btn">Сгенерировать фон</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-wrapper">
            <div class="menu-preview-aspect-ratio">
                <div class="menu-preview" id="menu-preview">
                    <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                        <h3>Здесь будет ваше меню</h3>
                        <p>Настройте параметры и загрузите данные</p>
                    </div>
                </div>
            </div>

            <div class="preview-actions">
                <button class="btn" id="download-png-btn">Сохранить в JPEG</button>
                <button class="btn btn-secondary" id="download-pdf-btn">Сохранить в PDF</button>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Генерация фона...</div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- DOM Elements ---
        const getEl = (id) => document.getElementById(id);
        const queryEl = (sel) => document.querySelector(sel);
        const queryAll = (sel) => document.querySelectorAll(sel);

        const tabButtons = queryAll('.tab-btn');
        const menuControls = getEl('menu-controls');
        const promoControls = getEl('promo-controls');
        const fileInput = getEl('file-input');
        const menuDropArea = getEl('menu-drop-area');
        const menuFileInfo = getEl('menu-file-info');
        const menuPreview = getEl('menu-preview');
        const loadingOverlay = getEl('loading-overlay');
        const loadingText = getEl('loading-text');

        // Menu Controls
        const layoutTypeSelect = getEl('layout-type-select');
        const showDescriptionCheckbox = getEl('show-description-checkbox');
        const descriptionFontControls = getEl('description-font-controls');
        const multiplePricesCheckbox = getEl('multiple-prices-checkbox');
        const menuBgUpload = getEl('menu-bg-upload');
        const menuBgFileInfo = getEl('menu-bg-file-info');
        const menuBgColorPicker = getEl('menu-bg-color-picker');
        const menuBgOptions = queryAll('#menu-controls .bg-option-btn');
        const menuBgColorContainer = getEl('bg-color-container-menu');
        const menuBgImageContainer = getEl('bg-image-container-menu');

        // Font Controls
        const categoryFontSelect = getEl('category-font-select');
        const categoryFontSizeInput = getEl('category-font-size');
        const categoryColorPicker = getEl('category-color-picker');
        const itemFontSelect = getEl('item-font-select');
        const itemFontSizeInput = getEl('item-font-size');
        const itemColorPicker = getEl('item-color-picker');
        const descFontSelect = getEl('desc-font-select');
        const descFontSizeInput = getEl('desc-font-size');
        const descColorPicker = getEl('desc-color-picker');

        // Promo Controls
        const promoTitleInput = getEl('promo-title-input');
        const promoTextInput = getEl('promo-text-input');
        const promoPriceInput = getEl('promo-price-input');
        const promoTitleFontSelect = getEl('promo-title-font-select');
        const promoTextFontSelect = getEl('promo-text-font-select');
        const promoPriceFontSelect = getEl('promo-price-font-select');
        const promoTitleColorPicker = getEl('promo-title-color-picker');
        const promoTextColorPicker = getEl('promo-text-color-picker');
        const promoPriceColorPicker = getEl('promo-price-color-picker');
        const promoTitleSizeInput = getEl('promo-title-size');
        const promoTextSizeInput = getEl('promo-text-size');
        const promoPriceSizeInput = getEl('promo-price-size');
        const promoAlignSelect = getEl('promo-align-select');
        const bgOptionBtns = queryAll('#promo-controls .bg-option-btn');
        const bgColorContainer = getEl('bg-color-container');
        const bgImageContainer = getEl('bg-image-container');
        const bgGenerateContainer = getEl('bg-generate-container');
        const promoBackgroundUpload = getEl('promo-background-upload');
        const bgFileInfo = getEl('bg-file-info');
        const bgColorPicker = getEl('bg-color-picker');
        const bgPromptInput = getEl('bg-prompt');
        const generateBgBtn = getEl('generate-bg-btn');

        // Download Buttons
        const downloadPngBtn = getEl('download-png-btn');
        const downloadPdfBtn = getEl('download-pdf-btn');

        // --- State ---
        let currentTab = 'menu';
        let excelData = null;
        let gridImages = {}; // To store user-uploaded images for grid layout
        let currentPromoBgType = "color";
        let currentMenuBgType = "color";
        let promoBackgroundImage = null;
        let menuBackgroundImage = null;

        // --- Initialization ---
        init();

        function init() {
            setupEventListeners();
            updateTab();
            render();
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            // Tabs
            tabButtons.forEach(btn => btn.addEventListener('click', function() {
                currentTab = this.dataset.tab;
                updateTab();
                render();
            }));

            // File Drop Area
            setupDropArea(menuDropArea, fileInput, menuFileInfo);

            // General Controls
            const controlsToRerender = [
                layoutTypeSelect, showDescriptionCheckbox, multiplePricesCheckbox,
                categoryFontSelect, categoryFontSizeInput, categoryColorPicker,
                itemFontSelect, itemFontSizeInput, itemColorPicker,
                descFontSelect, descFontSizeInput, descColorPicker,
                menuBgColorPicker,
                promoTitleInput, promoTextInput, promoPriceInput, promoTitleFontSelect,
                promoTextFontSelect, promoPriceFontSelect, promoTitleColorPicker,
                promoTextColorPicker, promoPriceColorPicker, promoTitleSizeInput,
                promoTextSizeInput, promoPriceSizeInput, promoAlignSelect, bgColorPicker
            ];
            controlsToRerender.forEach(el => {
                const event = el.type === 'color' || el.type === 'number' || el.type === 'text' ? 'input' : 'change';
                el.addEventListener(event, render);
            });
            
            showDescriptionCheckbox.addEventListener('change', () => {
                descriptionFontControls.style.display = showDescriptionCheckbox.checked ? 'block' : 'none';
                render();
            });

            // BG Options (Menu & Promo)
            setupBgOptions(menuBgOptions, (type) => {
                currentMenuBgType = type;
                menuBgColorContainer.style.display = type === 'color' ? 'block' : 'none';
                menuBgImageContainer.style.display = type === 'image' ? 'block' : 'none';
                render();
            });

            setupBgOptions(bgOptionBtns, (type) => {
                currentPromoBgType = type;
                bgColorContainer.style.display = type === 'color' ? 'block' : 'none';
                bgImageContainer.style.display = type === 'image' ? 'block' : 'none';
                bgGenerateContainer.style.display = type === 'generate' ? 'block' : 'none';
                render();
            });
            
            // Image Uploads
            setupImageUpload(menuBgUpload, menuBgFileInfo, (result) => { menuBackgroundImage = result; render(); });
            setupImageUpload(promoBackgroundUpload, bgFileInfo, (result) => { promoBackgroundImage = result; render(); });

            // AI Generation
            generateBgBtn.addEventListener('click', generateAIBg);
            
            // Downloads
            downloadPngBtn.addEventListener('click', () => download('png'));
            downloadPdfBtn.addEventListener('click', () => download('pdf'));
        }
        
        function setupDropArea(dropArea, input, infoEl) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => dropArea.classList.add('highlight'), false);
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => dropArea.classList.remove('highlight'), false);
            });
            dropArea.addEventListener('drop', e => {
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    handleFile(input.files[0]);
                }
            }, false);
            input.addEventListener('change', () => { if (input.files.length) handleFile(input.files[0]); });
            
            function handleFile(file) {
                infoEl.textContent = file.name;
                gridImages = {}; // Reset custom images on new file
                loadExcelFile(file);
            }
        }

        function setupBgOptions(buttons, callback) {
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    callback(this.dataset.type);
                });
            });
        }
        
        function setupImageUpload(input, infoEl, callback) {
            input.addEventListener('change', e => {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    if(infoEl) infoEl.textContent = file.name;
                    const reader = new FileReader();
                    reader.onload = event => callback(event.target.result);
                    reader.readAsDataURL(file);
                }
            });
        }
        
        // --- Core Logic ---
        function updateTab() {
            tabButtons.forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
            menuControls.style.display = (currentTab === 'menu' || currentTab === 'combined') ? 'block' : 'none';
            promoControls.style.display = (currentTab === 'promo' || currentTab === 'combined') ? 'block' : 'none';
            
            if (currentTab === 'combined') {
                 promoControls.style.borderTop = '1px solid #eee';
                 promoControls.style.paddingTop = '15px';
            } else {
                 promoControls.style.borderTop = 'none';
                 promoControls.style.paddingTop = '0';
            }
        }
        
        function loadExcelFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    excelData = XLSX.utils.sheet_to_json(worksheet);
                    render();
                } catch (error) {
                    alert('Ошибка при чтении файла: ' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- Rendering ---
        function setCssVariables() {
            const root = document.documentElement.style;
            root.setProperty('--category-font-size', categoryFontSizeInput.value + 'px');
            root.setProperty('--category-font-color', categoryColorPicker.value);
            root.setProperty('--font-category', categoryFontSelect.value);
            root.setProperty('--item-font-size', itemFontSizeInput.value + 'px');
            root.setProperty('--item-font-color', itemColorPicker.value);
            root.setProperty('--font-item', itemFontSelect.value);
            root.setProperty('--desc-font-size', descFontSizeInput.value + 'px');
            root.setProperty('--desc-font-color', descColorPicker.value);
            root.setProperty('--font-desc', descFontSelect.value);
            root.setProperty('--promo-title-font-size', promoTitleSizeInput.value + 'px');
            root.setProperty('--promo-text-font-size', promoTextSizeInput.value + 'px');
            root.setProperty('--promo-price-font-size', promoPriceSizeInput.value + 'px');
        }
        
        function render() {
            setCssVariables();
            menuPreview.innerHTML = ''; // Clear previous content

            if (checkIfEmpty()) return;

            if (currentTab === 'menu') {
                const layout = layoutTypeSelect.value;
                if (layout === 'list') {
                    menuPreview.appendChild(createMenuList());
                } else if (layout === 'grid') {
                    menuPreview.appendChild(createMenuGrid());
                }
            } else if (currentTab === 'promo') {
                menuPreview.appendChild(createPromo());
            } else if (currentTab === 'combined') {
                menuPreview.appendChild(createCombined());
            }
        }

        function createMenuList() {
            const container = document.createElement('div');
            container.className = 'menu-content';
            applyMenuBackground(container);
            
            const itemsContainer = document.createElement('div');
            itemsContainer.className = 'menu-items-container';
            container.appendChild(itemsContainer);

            itemsContainer.innerHTML = generateMenuItemsHtml();
            return container;
        }
        
        function createMenuGrid() {
            const container = document.createElement('div');
            container.className = 'menu-grid-container';
            applyMenuBackground(container);

            const items = excelData.slice(0, 4);
            items.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'menu-grid-item';

                const name = getItemProperty(item, ['Название', 'Наименование']);
                const desc = getItemProperty(item, ['Описание']);
                const price = getItemProperty(item, ['Цена', 'стоимость', 'с ндс']);
                const image = gridImages[index] || getItemProperty(item, ['Фото', 'Изображение']);
                
                let contentHtml = `<div class="grid-item-content">
                    <div class="item-name">${name || ''}</div>
                    ${showDescriptionCheckbox.checked && desc ? `<div class="item-description">${desc}</div>` : ''}
                    <div class="item-price">${formatPrice(price)}</div>
                </div>`;
                
                if (image) {
                    contentHtml += `<img src="${image}" class="grid-item-image">`;
                } else {
                    contentHtml += `<div class="upload-placeholder" data-index="${index}">+</div>`;
                }
                
                itemEl.innerHTML = contentHtml;
                container.appendChild(itemEl);

                const placeholder = itemEl.querySelector('.upload-placeholder');
                if (placeholder) {
                    placeholder.addEventListener('click', () => {
                        const uploader = document.createElement('input');
                        uploader.type = 'file';
                        uploader.accept = 'image/*';
                        setupImageUpload(uploader, null, (result) => {
                            gridImages[index] = result;
                            render();
                        });
                        uploader.click();
                    });
                }
            });
            return container;
        }

        function createPromo() {
            const container = document.createElement('div');
            container.className = 'promo-template';
            applyPromoBackground(container);

            const content = document.createElement('div');
            content.className = 'promo-content';
            content.classList.add(`align-${promoAlignSelect.value}`);
            content.innerHTML = generatePromoHtml();
            container.appendChild(content);
            return container;
        }
        
        function createCombined() {
            const container = document.createElement('div');
            container.className = 'combined-template';
            
            const menuPart = document.createElement('div');
            menuPart.className = 'combined-menu-part';
            applyMenuBackground(menuPart);
            const menuScroll = document.createElement('div');
            menuScroll.className = 'combined-menu-scroll';
            menuScroll.innerHTML = generateMenuItemsHtml();
            menuPart.appendChild(menuScroll);
            
            const promoPart = createPromo();
            promoPart.className = 'combined-promo-part'; // Override to fit combined layout
            applyPromoBackground(promoPart);
            const promoContent = promoPart.querySelector('.promo-content');
            promoContent.className = 'combined-promo-content'; // Override for combined layout
            
            container.appendChild(menuPart);
            container.appendChild(promoPart);
            return container;
        }

        // --- HTML Generators ---
        function generateMenuItemsHtml() {
            if (!excelData) return '';
            let html = '';
            const categories = [...new Set(excelData.map(item => getItemProperty(item, ['Категория']) || 'Основное меню'))];
            
            categories.forEach(category => {
                html += `<div class="menu-section"><div class="section-title">${category}</div>`;
                excelData.filter(item => (getItemProperty(item, ['Категория']) || 'Основное меню') === category).forEach(item => {
                    const name = getItemProperty(item, ['Название', 'Наименование']);
                    const desc = getItemProperty(item, ['Описание']);
                    const price = getItemProperty(item, ['Цена', 'стоимость', 'с ндс']);
                    const volumePrices = multiplePricesCheckbox.checked ? getVolumePrices(item) : '';
                    const showMainPrice = !multiplePricesCheckbox.checked || !volumePrices;

                    html += `<div class="menu-item">
                        <div class="item-content">
                            <div class="item-name">${name || ''}</div>
                            ${showDescriptionCheckbox.checked && desc ? `<div class="item-description">${desc}</div>` : ''}
                        </div>
                        <div class="item-price">
                            ${showMainPrice ? formatPrice(price) : volumePrices}
                        </div>
                    </div>`;
                });
                html += `</div>`;
            });
            return html;
        }
        
        function generatePromoHtml() {
            let html = '';
            if (promoTitleInput.value) {
                html += `<div class="promo-title" style="font-family: ${promoTitleFontSelect.value}; color: ${promoTitleColorPicker.value}">${promoTitleInput.value}</div>`;
            }
            if (promoTextInput.value) {
                html += `<div class="promo-text" style="font-family: ${promoTextFontSelect.value}; color: ${promoTextColorPicker.value}">${promoTextInput.value}</div>`;
            }
            if (promoPriceInput.value) {
                html += `<div class="promo-price" style="font-family: ${promoPriceFontSelect.value}; color: ${promoPriceColorPicker.value}">${formatPrice(promoPriceInput.value)}</div>`;
            }
            return html;
        }

        // --- Helpers ---
        function getItemProperty(item, keys) {
            for (const key of keys) {
                if (item[key] !== undefined) return item[key];
            }
            return undefined;
        }
        
        function formatPrice(price) {
            if (price === null || price === undefined || price === '') return '';
            const num = parseFloat(price);
            return isNaN(num) ? price : num.toFixed(0) + ' ₽';
        }
        
        function getVolumePrices(item) {
            let pricesHtml = '';
            ['S', 'M', 'L'].forEach(vol => {
                if (item[vol] && !isNaN(parseFloat(item[vol]))) {
                    pricesHtml += `<span class="volume-price">${vol}: ${formatPrice(item[vol])}</span> `;
                }
            });
            return pricesHtml.trim();
        }

        function applyMenuBackground(element) {
            if (currentMenuBgType === 'color') {
                element.style.backgroundColor = menuBgColorPicker.value;
                element.style.backgroundImage = 'none';
            } else if (currentMenuBgType === 'image' && menuBackgroundImage) {
                element.style.backgroundImage = `url(${menuBackgroundImage})`;
                element.style.backgroundColor = '';
            }
        }
        
        function applyPromoBackground(element) {
            let bgValue = 'none';
            let colorValue = bgColorPicker.value;

            if (currentPromoBgType === 'color') {
                bgValue = 'none';
            } else if ((currentPromoBgType === 'image' || currentPromoBgType === 'generate') && promoBackgroundImage) {
                bgValue = `url(${promoBackgroundImage})`;
                colorValue = ''; // Don't set bg color if image is present
            }
            
            element.style.backgroundImage = bgValue;
            element.style.backgroundColor = colorValue;
        }
        
        function checkIfEmpty() {
            const isMenuEmpty = !excelData;
            const isPromoEmpty = !promoTitleInput.value && !promoTextInput.value && !promoPriceInput.value;
            let message = '';

            if (currentTab === 'menu' && isMenuEmpty) message = '<h3>Меню</h3><p>Загрузите файл Excel</p>';
            else if (currentTab === 'promo' && isPromoEmpty) message = '<h3>Акция</h3><p>Введите данные для акции</p>';
            else if (currentTab === 'combined' && (isMenuEmpty || isPromoEmpty)) message = '<h3>Комбинированное меню</h3><p>Загрузите меню и введите данные для акции</p>';

            if (message) {
                menuPreview.innerHTML = `<div style="text-align: center; color: #a3a9c2; padding: 40px;">${message}</div>`;
                return true;
            }
            return false;
        }

        // --- AI & Downloads ---
        async function generateAIBg() {
            const prompt = bgPromptInput.value.trim();
            if (!prompt) {
                alert('Введите описание (промпт) для генерации фона.');
                return;
            }

            loadingText.textContent = "Запускаем генерацию...";
            loadingOverlay.style.display = 'flex';
            
            const apiKey = "7BE81F273FA49A565F4BFFA787DE9D3C"; // As provided
            const secretKey = "YOUR_FUSION_BRAIN_SECRET_KEY"; // IMPORTANT: Replace with your actual secret key

            if (secretKey === "YOUR_FUSION_BRAIN_SECRET_KEY") {
                 console.error("FusionBrain Secret Key is not set. Using placeholder image.");
                 // Fallback to a placeholder if the key isn't set
                 await new Promise(resolve => setTimeout(resolve, 1000));
                 promoBackgroundImage = `https://dummyimage.com/1280x720/4a6baf/ffffff&text=${encodeURIComponent(prompt)}`;
                 bgFileInfo.textContent = "Сгенерированный фон (placeholder)";
                 render();
                 loadingOverlay.style.display = 'none';
                 return;
            }

            class Text2ImageAPI {
                constructor(url, apiKey, secretKey) {
                    this.URL = url;
                    this.AUTH_HEADERS = { 'X-Key': `Key ${apiKey}`, 'X-Secret': `Secret ${secretKey}` };
                }
                async getModels() { /* ... implementation ... */ }
                async generate(prompt, model, images = 1, width = 1024, height = 1024) {
                    const params = { type: 'GENERATE', style: 'DEFAULT', numImages: images, width, height, generateParams: { query: prompt }};
                    const formData = new FormData();
                    formData.append('model_id', (await model));
                    formData.append('params', new Blob([JSON.stringify(params)], { type: 'application/json' }));
                    const response = await fetch(`${this.URL}/key/api/v1/text2image/run`, { method: 'POST', headers: this.AUTH_HEADERS, body: formData });
                    const data = await response.json();
                    return data.uuid;
                }
                async checkGeneration(requestId, attempts = 10, delay = 10) {
                    while (attempts > 0) {
                        loadingText.textContent = `Проверяем результат... (осталось ${attempts} попыток)`;
                        const response = await fetch(`${this.URL}/key/api/v1/text2image/status/${requestId}`, { headers: this.AUTH_HEADERS });
                        const data = await response.json();
                        if (data.status === 'DONE') {
                            return data.images;
                        }
                        attempts--;
                        await new Promise(resolve => setTimeout(resolve, delay * 1000));
                    }
                }
            }

            try {
                const api = new Text2ImageAPI('https://api-key.fusionbrain.ai/', apiKey, secretKey);
                const modelId = '4'; // Kandinsky 3.0
                const uuid = await api.generate(prompt, modelId, 1, 1280, 720); // 16:9 aspect ratio
                const images = await api.checkGeneration(uuid);

                if (images && images.length > 0) {
                    promoBackgroundImage = `data:image/jpeg;base64,${images[0]}`;
                    bgFileInfo.textContent = "Фон сгенерирован!";
                    render();
                } else {
                    throw new Error("AI не вернул изображение.");
                }

            } catch (error) {
                console.error('Ошибка генерации фона:', error);
                alert('Произошла ошибка при генерации фона: ' + error.message);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }
        
        function download(type) {
            const target = menuPreview.children[0];
            if (!target) {
                alert("Нечего сохранять. Сначала создайте меню.");
                return;
            }

            loadingText.textContent = `Сохранение в ${type.toUpperCase()}...`;
            loadingOverlay.style.display = 'flex';

            html2canvas(target, { scale: 2, backgroundColor: null }).then(canvas => {
                if (type === 'png') {
                    canvas.toBlob(blob => {
                        saveAs(blob, 'menuboard.jpeg');
                        loadingOverlay.style.display = 'none';
                    }, 'image/jpeg', 0.95);
                } else if (type === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const pdf = new jsPDF({
                        orientation: 'landscape',
                        unit: 'px',
                        format: [canvas.width, canvas.height]
                    });
                    pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
                    pdf.save('menuboard.pdf');
                    loadingOverlay.style.display = 'none';
                }
            }).catch(err => {
                console.error("Ошибка сохранения:", err);
                alert("Произошла ошибка при сохранении файла.");
                loadingOverlay.style.display = 'none';
            });
        }
    });
    </script>
