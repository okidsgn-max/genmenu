<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            
            --primary-color: #00b398;
            --secondary-color: #f8f9fa;
            --accent-color: #e74c3c;
            --bg-color: #f5f5f5;
            --menu-bg-color: #fff;
            --menu-text-color: #667099;
            --menu-text-light: #8e8e9e;
            --font-main: 'Roboto', sans-serif;
            --font-heading: 'Roboto', sans-serif;
            --text-align: left;
            --section-font-size: 24px;
            --item-name-font-size: 16px;
            --item-desc-font-size: 14px;
            --item-price-font-size: 16px;
            --promo-title-font-size: 60px;
            --promo-text-font-size: 30px;
            --promo-price-font-size: 40px;
            --divider-color: #eee;
            --category-font-color: #00b398;
            --category-font-size: 24px;
            --item-font-color: #667099;
            --item-font-size: 16px;
            --description-font-color: #8e8e9e;
            --description-font-size: 14px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-main);
            color: var(--text-color);
            background-color: #f5f5f5;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 15px;
            border-bottom: 0px solid #eee;
        }
        
        .header-logo {
            width: 85px;
            height: 22px;
            margin-right:20px;
            object-fit: initial;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #3d435c;
            margin: 0;
            margin-bottom: 15px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            height: calc(100% - 70px);
        }
        
        .controls-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 380px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .controls-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .controls-footer {
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: auto;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .tab-btn {
            display: flex;
            align-items: center;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .tab-btn.active {
            color: var(--active-color);
        }
        
        .control-group {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .control-group:last-child {
            border-bottom: none;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .checkbox-group input {
            margin-right: 10px;
        }
        
        .btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background: var(--button-hover);
        }
        
        .btn-secondary {
            background: none;
            color: var(--text-color);
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #f0f0f0;
        }
        
        .input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
            background-color: var(--input-bg);
        }
        
        .select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background-color: var(--input-bg);
            margin-bottom: 10px;
        }

        .setting-row {
            display: grid;
            grid-template-columns: 1fr 1fr 20px;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-row label {
            grid-column: 1 / -1;
        }
        
        .preview-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            border-radius: 8px;
        }
        
        .preview-container {
            width: 100%;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            aspect-ratio: 16 / 9;
        }
        
        .menu-preview {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .preview-actions {
            padding: 15px 0 0 0;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 800px;
        }
        
        /* -- Global Menu Styles -- */
        .menu-board {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            padding-top: 8%;
            position: relative;
        }

        .menu-top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px 20px 30px;
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            z-index: 5;
        }

        .menu-logo {
            max-height: 60px;
            max-width: 150px;
            object-fit: contain;
        }

        .menu-date {
            font-size: 18px;
            font-weight: 500;
            color: var(--menu-text-color);
        }
        
        /* -- List Layout Styles -- */
        .menu-content-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 30px;
        }

        .menu-items-container.two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .menu-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-family: var(--font-category);
            font-size: var(--category-font-size);
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--divider-color);
            color: var(--category-font-color);
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--divider-color);
            color: var(--item-font-color);
        }
        
        .item-content {
            flex-grow: 1;
        }
        
        .item-name {
            font-family: var(--font-item);
            font-weight: 500;
            font-size: var(--item-font-size);
            margin-bottom: 5px;
        }
        
        .item-description {
            font-family: var(--font-description);
            font-size: var(--description-font-size);
            color: var(--description-font-color);
            margin-bottom: 5px;
        }
        
        .item-price {
            font-family: var(--font-item);
            font-weight: 700;
            font-size: var(--item-font-size);
            white-space: nowrap;
            margin-left: 20px;
            text-align: right;
            min-width: 80px;
        }
        
        /* -- Grid Layout Styles -- */
        .menu-content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 0 30px 30px 30px;
            height: 100%;
        }

        .grid-cell {
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .grid-cell-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .grid-cell-content .item-name {
            font-size: 1.2em;
        }
        .grid-cell-content .item-description {
            flex-grow: 1;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .grid-cell-content .item-price {
            margin-left: 0;
            text-align: left;
        }

        .grid-cell-image {
            width: 100px;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .upload-placeholder-btn {
            width: 100%;
            height: 100%;
            background-color: #e9ecef;
            border: 2px dashed #ced4da;
            color: #6c757d;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* -- Promo Template Styles -- */
        .promo-template {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            color: white;
        }

        .promo-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }
        
        .promo-content.align-left { text-align: left; align-items: flex-start; }
        .promo-content.align-center { text-align: center; align-items: center; }
        .promo-content.align-right { text-align: right; align-items: flex-end; }


        .promo-title {
            font-size: var(--promo-title-font-size);
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .promo-text {
            font-size: var(--promo-text-font-size);
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .promo-price {
            font-size: var(--promo-price-font-size);
            font-weight: bold;
            margin-top: 20px;
        }
        
        /* -- Combined Template Styles -- */
        .combined-template {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .combined-menu-part {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .combined-promo-part {
            position: relative;
        }
        
        /* -- Helper Styles -- */
        .bg-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bg-option-btn {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            background: white;
        }

        .bg-option-btn.active {
            background: var(--active-color);
            color: white;
            border-color: var(--active-color);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 24px;
            flex-direction: column;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--active-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .drop-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: var(--input-bg);
        }
        
        .drop-area:hover, .drop-area.highlight {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.05);
        }
        
        .file-info {
            font-size: 12px;
            color: var(--menu-text-light);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo">
    </div>
    
    <div class="main-container">
        <div class="controls-panel">
            <h1 class="header-title">Генератор менюборда</h1>
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu"><img src="menu.svg" alt="Меню">Меню</button>
                <button class="tab-btn" data-tab="promo"><img src="acii.svg" alt="Акция">Акция</button>
                <button class="tab-btn" data-tab="combined"><img src="2v1.svg" alt="2 в 1">2в1</button>
            </div>
            <div class="controls-content">
                <div id="menu-controls">
                    <div class="control-group">
                        <label>Загрузка данных:</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл Excel или
                            <button class="btn btn-secondary" style="width:auto; display:inline-block; padding: 5px 10px; margin: 5px 0 0 0;" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display: none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Логотип (по желанию):</label>
                        <button class="btn btn-secondary" onclick="document.getElementById('logo-upload').click()">Загрузить логотип</button>
                        <input type="file" id="logo-upload" accept="image/*" style="display: none;">
                        <div class="file-info" id="logo-file-info">Логотип не загружен</div>
                    </div>

                    <div class="control-group">
                        <label>Тип верстки меню:</label>
                        <select id="menu-layout-select" class="select">
                            <option value="list">Список</option>
                            <option value="grid">Сетка 2x2</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон меню:</label>
                        <div class="bg-options">
                            <button class="bg-option-btn active" data-type="color">Цвет</button>
                            <button class="bg-option-btn" data-type="image">Изображение</button>
                        </div>
                        <div id="bg-color-container-menu">
                            <input type="color" id="menu-bg-color-picker" value="#f5f5f5" style="width: 100%; height: 40px;">
                        </div>
                        <div id="bg-image-container-menu" style="display: none;">
                            <button class="btn btn-secondary" onclick="document.getElementById('menu-bg-upload').click()">Добавить фон</button>
                            <input type="file" id="menu-bg-upload" accept="image/*" style="display: none;">
                            <div class="file-info" id="menu-bg-file-info">Фон не загружен</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт заголовка:</label>
                        <div class="setting-row">
                            <select id="category-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                            </select>
                            <input type="number" id="category-font-size" class="input" value="24" min="10" max="100">
                            <input type="color" id="category-color-picker" value="#00b398">
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="show-description-checkbox">
                            <label for="show-description-checkbox">Показывать описание блюда</label>
                        </div>
                        <div id="description-settings" style="display: none;">
                            <label>Шрифт описания:</label>
                            <div class="setting-row">
                                <select id="description-font-select" class="select">
                                    <option value="'Roboto', sans-serif">Roboto</option>
                                    <option value="'Open Sans', sans-serif">Open Sans</option>
                                </select>
                                <input type="number" id="description-font-size" class="input" value="14" min="8" max="50">
                                <input type="color" id="description-color-picker" value="#6c757d">
                            </div>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Шрифт цен:</label>
                        <div class="setting-row">
                            <select id="item-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Lato', sans-serif">Lato</option>
                            </select>
                            <input type="number" id="item-font-size" class="input" value="16" min="10" max="100">
                            <input type="color" id="item-color-picker" value="#3d435c">
                        </div>
                    </div>
                </div>
                
                <div id="promo-controls" style="display: none;">
                    <div class="control-group">
                        <label for="promo-title-input">Заголовок акции:</label>
                        <input type="text" id="promo-title-input" class="input" placeholder="Супер предложение!">
                        <div class="setting-row">
                            <select id="promo-title-font-select" class="select">
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Oswald', sans-serif">Oswald</option>
                            </select>
                            <input type="number" id="promo-title-size" class="input" value="60" min="10" max="180">
                            <input type="color" id="promo-title-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-text-input">Текст акции:</label>
                        <input type="text" id="promo-text-input" class="input" placeholder="Только сегодня!">
                        <div class="setting-row">
                            <select id="promo-text-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                            </select>
                            <input type="number" id="promo-text-size" class="input" value="30" min="10" max="100">
                            <input type="color" id="promo-text-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-price-input">Цена товара (₽):</label>
                        <input type="number" id="promo-price-input" class="input" placeholder="999">
                        <div class="setting-row">
                            <select id="promo-price-font-select" class="select">
                                <option value="'Oswald', sans-serif">Oswald</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                            </select>
                            <input type="number" id="promo-price-size" class="input" value="40" min="10" max="180">
                            <input type="color" id="promo-price-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон акции:</label>
                        <div class="bg-options">
                            <button class="bg-option-btn active" data-type="color">Цвет</button>
                            <button class="bg-option-btn" data-type="image">Свой</button>
                            <button class="bg-option-btn" data-type="generate">AI Фон</button>
                        </div>
                        <div id="bg-color-container">
                            <input type="color" id="bg-color-picker" value="#4a6baf" style="width: 100%; height: 40px;">
                        </div>
                        <div id="bg-image-container" style="display: none;">
                            <button class="btn btn-secondary" onclick="document.getElementById('promo-background-upload').click()">Загрузить фон</button>
                            <input type="file" id="promo-background-upload" accept="image/*" style="display: none;">
                            <div class="file-info" id="bg-file-info">Фон не загружен</div>
                        </div>
                        <div id="bg-generate-container" style="display: none;">
                            <input type="text" id="bg-prompt" class="input" placeholder="Опишите фон, например: food photography">
                            <button class="btn" id="generate-bg-btn">Сгенерировать фон</button>
                        </div>
                    </div>

                     <div class="control-group">
                        <label>Расположение текста:</label>
                        <select id="promo-align-select" class="select">
                            <option value="align-center">Центр</option>
                            <option value="align-left">Слева</option>
                            <option value="align-right">Справа</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-wrapper">
            <div class="preview-container">
                <div class="menu-preview" id="menu-preview">
                    </div>
            </div>
            <div class="preview-actions">
                <button class="btn" id="download-png-btn">Сохранить в JPEG</button>
                <button class="btn btn-secondary" id="download-pdf-btn">Сохранить в PDF</button>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Загрузка...</div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- DOM Elements ---
        const getEl = (id) => document.getElementById(id);
        const queryEl = (sel) => document.querySelector(sel);
        const queryAll = (sel) => document.querySelectorAll(sel);
        
        // Tabs
        const tabButtons = queryAll('.tab-btn');
        const menuControls = getEl('menu-controls');
        const promoControls = getEl('promo-controls');

        // General
        const menuPreview = getEl('menu-preview');
        const loadingOverlay = getEl('loading-overlay');
        const loadingText = getEl('loading-text');

        // Menu Controls
        const fileInput = getEl('file-input');
        const menuDropArea = getEl('menu-drop-area');
        const menuFileInfo = getEl('menu-file-info');
        const logoUpload = getEl('logo-upload');
        const logoFileInfo = getEl('logo-file-info');
        const menuLayoutSelect = getEl('menu-layout-select');
        const menuBgOptions = queryAll('#menu-controls .bg-option-btn');
        const menuBgColorContainer = getEl('bg-color-container-menu');
        const menuBgImageContainer = getEl('bg-image-container-menu');
        const menuBgColorPicker = getEl('menu-bg-color-picker');
        const menuBgUpload = getEl('menu-bg-upload');
        const menuBgFileInfo = getEl('menu-bg-file-info');
        const showDescriptionCheckbox = getEl('show-description-checkbox');
        const descriptionSettings = getEl('description-settings');

        // Font Controls
        const categoryFontSelect = getEl('category-font-select');
        const categoryFontSizeInput = getEl('category-font-size');
        const categoryColorPicker = getEl('category-color-picker');
        const descriptionFontSelect = getEl('description-font-select');
        const descriptionFontSizeInput = getEl('description-font-size');
        const descriptionColorPicker = getEl('description-color-picker');
        const itemFontSelect = getEl('item-font-select');
        const itemFontSizeInput = getEl('item-font-size');
        const itemColorPicker = getEl('item-color-picker');

        // Promo Controls
        const promoTitleInput = getEl('promo-title-input');
        const promoTextInput = getEl('promo-text-input');
        const promoPriceInput = getEl('promo-price-input');
        const promoTitleFontSelect = getEl('promo-title-font-select');
        const promoTextFontSelect = getEl('promo-text-font-select');
        const promoPriceFontSelect = getEl('promo-price-font-select');
        const promoTitleColorPicker = getEl('promo-title-color-picker');
        const promoTextColorPicker = getEl('promo-text-color-picker');
        const promoPriceColorPicker = getEl('promo-price-color-picker');
        const promoTitleSizeInput = getEl('promo-title-size');
        const promoTextSizeInput = getEl('promo-text-size');
        const promoPriceSizeInput = getEl('promo-price-size');
        const promoAlignSelect = getEl('promo-align-select');
        const bgOptionBtns = queryAll('#promo-controls .bg-option-btn');
        const bgColorContainer = getEl('bg-color-container');
        const bgImageContainer = getEl('bg-image-container');
        const bgGenerateContainer = getEl('bg-generate-container');
        const promoBackgroundUpload = getEl('promo-background-upload');
        const bgFileInfo = getEl('bg-file-info');
        const bgColorPicker = getEl('bg-color-picker');
        const bgPromptInput = getEl('bg-prompt');
        const generateBgBtn = getEl('generate-bg-btn');
        
        // Download Buttons
        const downloadPngBtn = getEl('download-png-btn');
        const downloadPdfBtn = getEl('download-pdf-btn');

        // --- State ---
        let state = {
            currentTab: 'menu',
            menuData: null,
            logoImage: null,
            menuLayout: 'list',
            menuBgType: 'color',
            menuBgImage: null,
            promoBgType: 'color',
            promoBgImage: null,
        };

        // --- Mappings for flexible Excel parsing ---
        const COLUMN_MAPPINGS = {
            name: ['Наименование', 'Название', 'name', 'title'],
            description: ['Описание', 'description'],
            price: ['Цена', 'Стоимость', 'с ндс', 'price'],
            category: ['Категория', 'category'],
            image: ['Фото', 'Изображение', 'image', 'img'],
        };

        // --- API Details ---
        const FUSIONBRAIN_API = {
            KEY: '7BE81F273FA49A565F4BFFA787DE9D3C',
            SECRET: 'YOUR_SECRET_KEY', // Secret key is often required, add if needed
            URL: 'https://api.fusionbrain.ai/web/api/v1/text2image',
            CHECK_URL: 'https://api.fusionbrain.ai/web/api/v1/text2image/status/',
        };

        // --- Initialization ---
        init();

        function init() {
            setupEventListeners();
            updateTab();
            render();
        }

        function setupEventListeners() {
            // Tabs
            tabButtons.forEach(btn => btn.addEventListener('click', handleTabClick));
            
            // File Uploads
            setupDropArea(menuDropArea, fileInput, handleMenuFile);
            logoUpload.addEventListener('change', handleLogoFile);
            menuBgUpload.addEventListener('change', (e) => handleImageUpload(e, 'menuBgImage', menuBgFileInfo));
            promoBackgroundUpload.addEventListener('change', (e) => handleImageUpload(e, 'promoBgImage', bgFileInfo));

            // Menu Controls
            menuLayoutSelect.addEventListener('change', (e) => updateState({ menuLayout: e.target.value }));
            menuBgOptions.forEach(btn => btn.addEventListener('click', () => handleBgOptionClick('menu', btn.dataset.type)));
            showDescriptionCheckbox.addEventListener('change', () => {
                descriptionSettings.style.display = showDescriptionCheckbox.checked ? 'block' : 'none';
                render();
            });

            // Promo Controls
            bgOptionBtns.forEach(btn => btn.addEventListener('click', () => handleBgOptionClick('promo', btn.dataset.type)));
            generateBgBtn.addEventListener('click', generateAIBg);
            
            // All controls that trigger a re-render
            const renderControls = [
                menuBgColorPicker, categoryFontSelect, categoryFontSizeInput, categoryColorPicker,
                descriptionFontSelect, descriptionFontSizeInput, descriptionColorPicker,
                itemFontSelect, itemFontSizeInput, itemColorPicker, promoTitleInput, promoTextInput,
                promoPriceInput, promoTitleFontSelect, promoTextFontSelect, promoPriceFontSelect,
                promoTitleColorPicker, promoTextColorPicker, promoPriceColorPicker, promoTitleSizeInput,
                promoTextSizeInput, promoPriceSizeInput, promoAlignSelect, bgColorPicker
            ];
            renderControls.forEach(el => el.addEventListener('input', render));

            // Download
            downloadPngBtn.addEventListener('click', downloadAsPNG);
            downloadPdfBtn.addEventListener('click', downloadAsPDF);
        }

        // --- State & UI Updates ---
        function updateState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function updateTab() {
            menuControls.style.display = 'none';
            promoControls.style.display = 'none';

            if (state.currentTab === 'menu' || state.currentTab === 'combined') {
                menuControls.style.display = 'block';
            }
            if (state.currentTab === 'promo' || state.currentTab === 'combined') {
                promoControls.style.display = 'block';
            }
        }
        
        function setLoading(isLoading, text = 'Загрузка...') {
            loadingText.textContent = text;
            loadingOverlay.style.display = isLoading ? 'flex' : 'none';
        }

        // --- Event Handlers ---
        function handleTabClick(e) {
            tabButtons.forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            state.currentTab = e.currentTarget.dataset.tab;
            updateTab();
            render();
        }
        
        function handleBgOptionClick(panel, type) {
            const options = panel === 'menu' ? menuBgOptions : bgOptionBtns;
            const containers = {
                menu: [menuBgColorContainer, menuBgImageContainer],
                promo: [bgColorContainer, bgImageContainer, bgGenerateContainer]
            };
            
            options.forEach(b => b.classList.remove('active'));
            const clickedBtn = [...options].find(b => b.dataset.type === type);
            if(clickedBtn) clickedBtn.classList.add('active');

            if (panel === 'menu') {
                updateState({ menuBgType: type });
                containers.menu.forEach(c => c.style.display = 'none');
                if (type === 'color') menuBgColorContainer.style.display = 'block';
                else if (type === 'image') menuBgImageContainer.style.display = 'block';
            } else {
                 updateState({ promoBgType: type });
                containers.promo.forEach(c => c.style.display = 'none');
                if (type === 'color') bgColorContainer.style.display = 'block';
                else if (type === 'image') bgImageContainer.style.display = 'block';
                else if (type === 'generate') bgGenerateContainer.style.display = 'block';
            }
            render();
        }

        // --- File Handling ---
        function handleMenuFile(file) {
            if (!file) return;
            menuFileInfo.textContent = file.name;
            setLoading(true, "Обработка файла...");
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);
                    
                    const processedData = jsonData.map(row => {
                        const newRow = {};
                        for (const key in COLUMN_MAPPINGS) {
                            const possibleHeaders = COLUMN_MAPPINGS[key];
                            const foundHeader = possibleHeaders.find(h => row[h] !== undefined);
                            newRow[key] = foundHeader ? row[foundHeader] : null;
                        }
                        return newRow;
                    });
                    
                    updateState({ menuData: processedData });
                } catch (error) {
                    alert('Ошибка при чтении файла: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function handleImageUpload(event, stateKey, infoElement) {
            const file = event.target.files[0];
            if (!file) return;
            infoElement.textContent = file.name;
            const reader = new FileReader();
            reader.onload = (e) => updateState({ [stateKey]: e.target.result });
            reader.readAsDataURL(file);
        }

        function handleLogoFile(e) {
            handleImageUpload(e, 'logoImage', logoFileInfo)
        }
        
        function handleGridImageUpload(e, index) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const newData = [...state.menuData];
                newData[index].image = re.target.result;
                updateState({ menuData: newData });
            };
            reader.readAsDataURL(file);
        }

        function setupDropArea(area, input, handler) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eName => area.addEventListener(eName, e => e.preventDefault() && e.stopPropagation(), false));
            ['dragenter', 'dragover'].forEach(eName => area.addEventListener(eName, () => area.classList.add('highlight'), false));
            ['dragleave', 'drop'].forEach(eName => area.addEventListener(eName, () => area.classList.remove('highlight'), false));
            area.addEventListener('drop', e => {
                const files = e.dataTransfer.files;
                if(files.length) {
                    input.files = files;
                    handler(files[0]);
                }
            }, false);
            input.addEventListener('change', () => input.files.length && handler(input.files[0]));
        }

        // --- Rendering Engine ---
        function render() {
            setCssVariables();
            menuPreview.innerHTML = ''; // Clear previous content

            let contentHtml = '';
            if (state.currentTab === 'menu') {
                contentHtml = renderMenuBoard();
            } else if (state.currentTab === 'promo') {
                contentHtml = renderPromoBoard();
            } else if (state.currentTab === 'combined') {
                contentHtml = renderCombinedBoard();
            }
            
            if (!contentHtml) {
                menuPreview.innerHTML = `<div style="text-align: center; color: #a3a9c2; padding: 40px;">
                    <h3>Здесь будет ваше меню</h3>
                    <p>Настройте параметры и загрузите данные</p>
                </div>`;
                return;
            }
            
            menuPreview.innerHTML = contentHtml;
            attachDynamicEventListeners();
        }

        function attachDynamicEventListeners() {
            queryAll('.upload-placeholder-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const inputId = `grid-image-upload-${btn.dataset.index}`;
                    getEl(inputId).click();
                });
            });
        }
        
        function renderHeader() {
            if (!state.logoImage) return '';
            const date = new Date().toLocaleDateString('ru-RU', { day: '2-digit', month: 'long', year: 'numeric' });
            return `
                <div class="menu-top-header">
                    <img src="${state.logoImage}" alt="Логотип" class="menu-logo">
                    <div class="menu-date" style="color: var(--item-font-color);">${date}</div>
                </div>`;
        }
        
        function renderMenuBoard() {
            if (!state.menuData) return '';
            const bgStyle = getBackgroundStyle('menu');
            const headerHtml = renderHeader();
            let content;

            if (state.menuLayout === 'grid') {
                content = renderGridLayout();
            } else {
                content = renderListLayout();
            }
            
            return `<div class="menu-board" style="${bgStyle}">${headerHtml}${content}</div>`;
        }

        function renderListLayout() {
            const categories = [...new Set(state.menuData.map(item => item.category || 'Основное меню'))];
            let menuHtml = '';

            categories.forEach(category => {
                menuHtml += `<div class="menu-section"><div class="section-title">${category}</div>`;
                state.menuData.filter(item => (item.category || 'Основное меню') === category).forEach(item => {
                    menuHtml += `
                        <div class="menu-item">
                            <div class="item-content">
                                <div class="item-name">${item.name || ''}</div>
                                ${showDescriptionCheckbox.checked && item.description ? `<div class="item-description">${item.description}</div>` : ''}
                            </div>
                            <div class="item-price">${formatPrice(item.price)}</div>
                        </div>`;
                });
                menuHtml += `</div>`;
            });
            return `<div class="menu-content-list">${menuHtml}</div>`;
        }
        
        function renderGridLayout() {
            const items = state.menuData.slice(0, 4);
            let gridHtml = '';
            
            items.forEach((item, index) => {
                const imageStyle = item.image ? `background-image: url('${item.image}')` : '';
                const imagePart = item.image 
                    ? `<div class="grid-cell-image" style="${imageStyle}"></div>`
                    : `<div class="grid-cell-image">
                           <button class="upload-placeholder-btn" data-index="${index}">+</button>
                           <input type="file" id="grid-image-upload-${index}" accept="image/*" style="display:none;" onchange="handleGridImageUpload(event, ${index})">
                       </div>`;

                gridHtml += `
                    <div class="grid-cell" style="background-color: ${menuBgColorPicker.value};">
                        <div class="grid-cell-content">
                            <div class="item-name">${item.name || ''}</div>
                            ${showDescriptionCheckbox.checked && item.description ? `<div class="item-description">${item.description}</div>` : ''}
                            <div class="item-price">${formatPrice(item.price)}</div>
                        </div>
                        ${imagePart}
                    </div>`;
            });

            return `<div class="menu-content-grid">${gridHtml}</div>`;
        }
        
        function renderPromoBoard() {
            const bgStyle = getBackgroundStyle('promo');
            const alignmentClass = promoAlignSelect.value;
            return `
                <div class="promo-template" style="${bgStyle}">
                    <div class="promo-content ${alignmentClass}">
                        ${promoTitleInput.value ? `<div class="promo-title" style="font-family: ${promoTitleFontSelect.value}; color: ${promoTitleColorPicker.value}">${promoTitleInput.value}</div>` : ''}
                        ${promoTextInput.value ? `<div class="promo-text" style="font-family: ${promoTextFontSelect.value}; color: ${promoTextColorPicker.value}">${promoTextInput.value}</div>` : ''}
                        ${promoPriceInput.value ? `<div class="promo-price" style="font-family: ${promoPriceFontSelect.value}; color: ${promoPriceColorPicker.value}">${formatPrice(promoPriceInput.value)}</div>` : ''}
                    </div>
                </div>`;
        }

        function renderCombinedBoard() {
            const menuPart = renderMenuBoard();
            const promoPart = renderPromoBoard();

            if (!menuPart || !promoPart) return '';

            // This is tricky. We need to extract the inner content of the rendered boards.
            const menuContent = menuPart.replace(/<div class="menu-board"[^>]*>|<\/div>$/g, '');
            const promoContent = promoPart.replace(/<div class="promo-template"[^>]*>|<\/div>$/g, '');
            
            const menuBgStyle = getBackgroundStyle('menu');
            const promoBgStyle = getBackgroundStyle('promo');
            
            return `
                <div class="combined-template">
                    <div class="combined-menu-part" style="${menuBgStyle}">${menuContent}</div>
                    <div class="combined-promo-part" style="${promoBgStyle}">${promoContent}</div>
                </div>`;
        }
        
        // --- AI Image Generation ---
        async function generateAIBg() {
            const prompt = bgPromptInput.value.trim();
            if (!prompt) {
                alert('Введите описание для генерации фона');
                return;
            }
            
            setLoading(true, "Магия AI... Отправляем запрос.");

            const params = {
                type: "GENERATE",
                style: "DEFAULT",
                width: 1024,
                height: 576, // 16:9 ratio
                generateParams: {
                    query: prompt
                }
            };
            
            try {
                const response = await fetch(FUSIONBRAIN_API.URL, {
                    method: 'POST',
                    headers: {
                        'X-Key': `Key ${FUSIONBRAIN_API.KEY}`,
                        'X-Secret': `Secret ${FUSIONBRAIN_API.SECRET}`, // Add if you get a secret key
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(params)
                });
                
                const data = await response.json();
                if (data.uuid) {
                    setLoading(true, "Фон генерируется... (может занять до минуты)");
                    checkGenerationStatus(data.uuid);
                } else {
                    throw new Error(data.message || 'Ошибка API');
                }
            } catch (error) {
                console.error("Ошибка API:", error);
                alert(`Ошибка при генерации: ${error.message}`);
                setLoading(false);
            }
        }
        
        function checkGenerationStatus(uuid, attempts = 0) {
            if (attempts > 30) { // 30 * 2s = 1 minute timeout
                alert('Не удалось получить сгенерированное изображение. Попробуйте позже.');
                setLoading(false);
                return;
            }

            setTimeout(async () => {
                try {
                    const response = await fetch(`${FUSIONBRAIN_API.CHECK_URL}${uuid}`, {
                         headers: {
                            'X-Key': `Key ${FUSIONBRAIN_API.KEY}`,
                            'X-Secret': `Secret ${FUSIONBRAIN_API.SECRET}`
                        }
                    });
                    const data = await response.json();

                    if (data.status === 'DONE' && data.images) {
                        const base64Image = `data:image/jpeg;base64,${data.images[0]}`;
                        updateState({ promoBgImage: base64Image });
                        bgFileInfo.textContent = "Сгенерированный фон";
                        setLoading(false);
                    } else if (data.status === 'FAIL') {
                        throw new Error(data.errorDescription || 'Генерация не удалась');
                    } else {
                        // In progress, check again
                        checkGenerationStatus(uuid, attempts + 1);
                    }
                } catch (error) {
                    console.error('Ошибка проверки статуса:', error);
                    alert(`Ошибка при проверке: ${error.message}`);
                    setLoading(false);
                }
            }, 2000);
        }

        // --- Helpers & Utilities ---
        function setCssVariables() {
            const root = document.documentElement;
            root.style.setProperty('--category-font-size', categoryFontSizeInput.value + 'px');
            root.style.setProperty('--category-font-color', categoryColorPicker.value);
            root.style.setProperty('--font-category', categoryFontSelect.value);
            root.style.setProperty('--item-font-size', itemFontSizeInput.value + 'px');
            root.style.setProperty('--item-font-color', itemColorPicker.value);
            root.style.setProperty('--font-item', itemFontSelect.value);
            root.style.setProperty('--description-font-size', descriptionFontSizeInput.value + 'px');
            root.style.setProperty('--description-font-color', descriptionColorPicker.value);
            root.style.setProperty('--font-description', descriptionFontSelect.value);
            root.style.setProperty('--promo-title-font-size', promoTitleSizeInput.value + 'px');
            root.style.setProperty('--promo-text-font-size', promoTextSizeInput.value + 'px');
            root.style.setProperty('--promo-price-font-size', promoPriceSizeInput.value + 'px');
        }

        function getBackgroundStyle(type) {
            if (type === 'menu') {
                if (state.menuBgType === 'image' && state.menuBgImage) {
                    return `background-image: url(${state.menuBgImage});`;
                }
                return `background-color: ${menuBgColorPicker.value};`;
            } else { // promo
                if ((state.promoBgType === 'image' || state.promoBgType === 'generate') && state.promoBgImage) {
                    return `background-image: url(${state.promoBgImage});`;
                }
                return `background-color: ${bgColorPicker.value};`;
            }
        }

        function formatPrice(price) {
            if (price === null || price === undefined) return '';
            const num = parseFloat(price);
            return isNaN(num) ? price : num.toFixed(0) + ' ₽';
        }

        // --- Download Functions ---
        function downloadAsPNG() {
            setLoading(true, "Сохранение JPEG...");
            html2canvas(menuPreview, { scale: 2 }).then(canvas => {
                canvas.toBlob(blob => {
                    saveAs(blob, 'menuboard.jpeg');
                    setLoading(false);
                }, 'image/jpeg', 0.95);
            });
        }
        
        function downloadAsPDF() {
            setLoading(true, "Сохранение PDF...");
            const { jsPDF } = window.jspdf;
            
            html2canvas(menuPreview, { scale: 3 }).then(canvas => { // Higher scale for better PDF quality
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'mm',
                    format: 'a4'
                });
                
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save('menuboard.pdf');
                setLoading(false);
            });
        }

        // Make functions accessible from inline HTML event attributes
        window.handleGridImageUpload = handleGridImageUpload;

    });
    </script>
</body>
</html>
