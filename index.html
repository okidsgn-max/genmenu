<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --accent-color: #e74c3c;
            --menu-bg-color: #fff;
            --divider-color: #eee;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            background-color: #f5f5f5;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 15px;
        }
        
        .header-logo {
            width: 85px;
            height: 22px;
            margin-right:20px;
            object-fit: initial;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #3d435c;
            margin: 0;
            margin-bottom: 15px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            height: calc(100% - 70px);
        }
        
        .controls-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 380px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .controls-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .tab-btn {
            display: flex;
            align-items: center;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .tab-btn.active {
            color: var(--active-color);
        }
        
        .control-group {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .control-group:last-child { border-bottom: none; }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .checkbox-group input { margin-right: 10px; }
        .checkbox-group label { margin-bottom: 0; }
        
        .btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn:hover { background: var(--button-hover); }
        .btn-secondary {
            background: none;
            color: var(--text-color);
            border: 1px solid #ddd;
        }
        .btn-secondary:hover { background: #f0f0f0; }
        
        .input, .select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 10px;
            background-color: var(--input-bg);
        }
        
        .setting-row {
            display: grid;
            grid-template-columns: 1fr 70px 40px;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .setting-row .input, .setting-row .select { margin-bottom: 0; }
        .setting-row input[type="color"] {
            width: 100%;
            height: 38px;
            padding: 0;
            border: none;
            background: none;
        }

        .preview-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        #aspect-ratio-wrapper {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            margin-bottom: 15px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .menu-preview {
            width: 100%;
            height: 100%;
            background-color: white;
            overflow: hidden; /* Important for capturing */
        }
        
        .preview-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            text-align: center;
            color: #a3a9c2;
            padding: 40px;
        }
        
        .preview-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }
        
        /* MENU LIST LAYOUT */
        .menu-list-content {
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .menu-items-container {
            flex: 1;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        .menu-items-container.two-columns { grid-template-columns: 1fr 1fr; }
        .menu-section { margin-bottom: 20px; }
        .section-title {
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--divider-color);
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .item-content { flex-grow: 1; }
        .item-name { font-weight: 500; margin-bottom: 5px; }
        .item-description {
            color: #8e8e9e;
            margin-bottom: 5px;
            padding-right: 10px;
        }
        .item-price {
            font-weight: 700;
            white-space: nowrap;
            margin-left: 20px;
            text-align: right;
        }

        /* MENU GRID LAYOUT */
        .menu-grid-content {
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }
        .menu-grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            height: 100%;
        }
        .grid-item {
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .grid-item-content { flex-grow: 1; }
        .grid-item .item-price { text-align: left; margin-left: 0; margin-top: 10px; }
        .grid-item-image-container {
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            position: relative;
            margin-top: 10px;
            align-self: flex-end;
            height: 50%;
            max-height: 50%;
        }
        .grid-item-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        .add-image-btn {
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--button-color);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .add-image-btn:hover { background: var(--button-hover); }

        /* PROMO TEMPLATE */
        .promo-template {
            color: white;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
        }
        .promo-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
        }
        .promo-content {
            position: relative;
            z-index: 2;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 50px;
        }
        .promo-text-wrapper { text-align: left; flex: 1; }
        .promo-image-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; }
        .promo-image { max-width: 100%; max-height: 80%; object-fit: contain; }
        
        .promo-content.img-left { flex-direction: row; }
        .promo-content.img-right { flex-direction: row-reverse; }
        .promo-content.img-center .promo-text-wrapper {
            position: absolute;
            z-index: 3;
            bottom: 50px; left: 50px; right: 50px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 8px;
        }

        .promo-title { font-weight: 700; line-height: 1.1; margin-bottom: 20px; }
        .promo-text { line-height: 1.3; margin-bottom: 30px; }
        .promo-price { font-weight: bold; margin-top: 20px; }

        /* LOADING OVERLAY */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 24px;
            flex-direction: column;
            text-align: center;
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--active-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* DRAG & DROP */
        .drop-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: var(--input-bg);
        }
        .drop-area:hover, .drop-area.highlight {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.1);
        }
        .file-info { font-size: 12px; color: #8e8e9e; margin-top: 5px; }

    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo">
    </div>
    
    <div class="main-container">
        <div class="controls-panel">
            <h1 class="header-title">Генератор менюборда</h1>

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu"><img src="menu.svg" alt="Меню"> Меню</button>
                <button class="tab-btn" data-tab="promo"><img src="acii.svg" alt="Акция"> Акция</button>
            </div>

            <div class="controls-content">
                <div id="menu-controls">
                    <div class="control-group">
                        <label>Загрузка данных (Excel):</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл сюда или
                            <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display: none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Тип верстки:</label>
                        <select id="layout-type-select" class="select">
                            <option value="list">Список</option>
                            <option value="grid">Сетка (4x4)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Настройки отображения:</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="show-description-checkbox" checked>
                            <label for="show-description-checkbox">Показывать описание блюда</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="multiple-prices-checkbox">
                            <label for="multiple-prices-checkbox">Использовать цены для объемов (S/M/L)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт категорий:</label>
                        <div class="setting-row">
                            <select id="category-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                            </select>
                            <input type="number" id="category-font-size" class="input" value="24" min="10" max="100">
                            <input type="color" id="category-color-picker" value="#00b398">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт пунктов:</label>
                        <div class="setting-row">
                            <select id="item-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="'Lato', sans-serif">Lato</option>
                            </select>
                            <input type="number" id="item-font-size" class="input" value="16" min="10" max="100">
                            <input type="color" id="item-color-picker" value="#667099">
                        </div>
                    </div>

                    <div class="control-group" id="description-font-controls">
                        <label>Шрифт описания:</label>
                        <div class="setting-row">
                            <select id="desc-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="'Lato', sans-serif">Lato</option>
                            </select>
                            <input type="number" id="desc-font-size" class="input" value="14" min="8" max="100">
                            <input type="color" id="desc-color-picker" value="#8e8e9e">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Фон меню:</label>
                        <input type="color" id="menu-bg-color-picker" value="#ffffff" style="width: 100%; height: 40px;">
                    </div>
                </div>
                
                <div id="promo-controls" style="display: none;">
                    <div class="control-group">
                        <label for="promo-title-input">Заголовок акции:</label>
                        <input type="text" id="promo-title-input" class="input" placeholder="Супер Комбо">
                        <div class="setting-row">
                            <select id="promo-title-font-select" class="select"><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Oswald', sans-serif">Oswald</option></select>
                            <input type="number" id="promo-title-size" class="input" value="60" min="10" max="150">
                            <input type="color" id="promo-title-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-text-input">Текст акции:</label>
                        <input type="text" id="promo-text-input" class="input" placeholder="Бургер + Картошка">
                         <div class="setting-row">
                            <select id="promo-text-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Lato', sans-serif">Lato</option></select>
                            <input type="number" id="promo-text-size" class="input" value="30" min="10" max="100">
                            <input type="color" id="promo-text-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-price-input">Цена (₽):</label>
                        <input type="number" id="promo-price-input" class="input" placeholder="399">
                        <div class="setting-row">
                            <select id="promo-price-font-select" class="select"><option value="'Oswald', sans-serif">Oswald</option><option value="'Montserrat', sans-serif">Montserrat</option></select>
                            <input type="number" id="promo-price-size" class="input" value="50" min="10" max="150">
                            <input type="color" id="promo-price-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон акции:</label>
                        <input type="color" id="bg-color-picker" value="#e74c3c" style="width: 100%; height: 40px;">
                    </div>

                    <div class="control-group">
                        <label>Изображение акции:</label>
                         <div id="bg-generate-container">
                            <input type="text" id="bg-prompt" class="input" placeholder="Опишите картинку для генерации (на англ.)">
                            <button class="btn" id="generate-bg-btn">Сгенерировать (AI)</button>
                        </div>
                        <button class="btn btn-secondary" onclick="document.getElementById('promo-image-upload').click()">Или загрузить свое</button>
                        <input type="file" id="promo-image-upload" accept="image/*" style="display: none;">
                        <div class="file-info" id="promo-image-info">Изображение не выбрано</div>
                    </div>
                    
                    <div class="control-group">
                        <label>Расположение картинки:</label>
                        <select id="promo-image-position" class="select">
                            <option value="right">Справа от текста</option>
                            <option value="left">Слева от текста</option>
                            <option value="center">Текст поверх картинки</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-wrapper">
            <div id="aspect-ratio-wrapper">
                <div class="menu-preview" id="menu-preview">
                    <div class="preview-placeholder">
                        <h3>Здесь будет ваше меню</h3>
                        <p>Загрузите данные и настройте параметры</p>
                    </div>
                </div>
            </div>
            <div class="preview-actions">
                <button class="btn" id="download-jpeg-btn">Сохранить в JPEG</button>
                <button class="btn btn-secondary" id="download-pdf-btn">Сохранить в PDF</button>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Генерация...</div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- DOM Elements ---
        const controls = {
            tabs: document.querySelectorAll('.tab-btn'),
            menuControls: document.getElementById('menu-controls'),
            promoControls: document.getElementById('promo-controls'),
            // Menu
            fileInput: document.getElementById('file-input'),
            dropArea: document.getElementById('menu-drop-area'),
            fileInfo: document.getElementById('menu-file-info'),
            layoutSelect: document.getElementById('layout-type-select'),
            showDescCheck: document.getElementById('show-description-checkbox'),
            multiPriceCheck: document.getElementById('multiple-prices-checkbox'),
            catFontSelect: document.getElementById('category-font-select'),
            catFontSize: document.getElementById('category-font-size'),
            catColor: document.getElementById('category-color-picker'),
            itemFontSelect: document.getElementById('item-font-select'),
            itemFontSize: document.getElementById('item-font-size'),
            itemColor: document.getElementById('item-color-picker'),
            descFontControls: document.getElementById('description-font-controls'),
            descFontSelect: document.getElementById('desc-font-select'),
            descFontSize: document.getElementById('desc-font-size'),
            descColor: document.getElementById('desc-color-picker'),
            menuBgColor: document.getElementById('menu-bg-color-picker'),
            // Promo
            promoTitle: document.getElementById('promo-title-input'),
            promoText: document.getElementById('promo-text-input'),
            promoPrice: document.getElementById('promo-price-input'),
            promoTitleFont: document.getElementById('promo-title-font-select'),
            promoTitleSize: document.getElementById('promo-title-size'),
            promoTitleColor: document.getElementById('promo-title-color-picker'),
            promoTextFont: document.getElementById('promo-text-font-select'),
            promoTextSize: document.getElementById('promo-text-size'),
            promoTextColor: document.getElementById('promo-text-color-picker'),
            promoPriceFont: document.getElementById('promo-price-font-select'),
            promoPriceSize: document.getElementById('promo-price-size'),
            promoPriceColor: document.getElementById('promo-price-color-picker'),
            promoBgColor: document.getElementById('bg-color-picker'),
            promoImgUpload: document.getElementById('promo-image-upload'),
            promoImgInfo: document.getElementById('promo-image-info'),
            promoImgPosition: document.getElementById('promo-image-position'),
            // AI
            generateBtn: document.getElementById('generate-bg-btn'),
            promptInput: document.getElementById('bg-prompt'),
            // Preview & Download
            menuPreview: document.getElementById('menu-preview'),
            downloadJpegBtn: document.getElementById('download-jpeg-btn'),
            downloadPdfBtn: document.getElementById('download-pdf-btn'),
            // Loading
            loadingOverlay: document.getElementById('loading-overlay'),
            loadingText: document.getElementById('loading-text'),
        };

        // --- State ---
        let state = {
            currentTab: 'menu',
            excelData: null,
            promoImage: null,
            gridImages: {}, // { rowIndex: base64_data }
        };

        // --- Constants ---
        const API_KEY = '7BE81F273FA49A565F4BFFA787DE9D3C'; 
        const API_URL = 'https://api.fusionbrain.ai/web/api/v1/text2image';

        // --- Initialization ---
        function init() {
            setupEventListeners();
            updateTab();
            render();
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            // Tabs
            controls.tabs.forEach(btn => btn.addEventListener('click', handleTabClick));
            
            // Drag & Drop
            setupDropArea(controls.dropArea, controls.fileInput, controls.fileInfo);

            // General Controls - re-render on any change
            const allControls = document.querySelectorAll('.controls-content .input, .controls-content .select, .controls-content input[type="checkbox"], .controls-content input[type="color"]');
            allControls.forEach(el => el.addEventListener('input', render));
            allControls.forEach(el => el.addEventListener('change', render));

            // File Uploads
            controls.promoImgUpload.addEventListener('change', handlePromoImageUpload);

            // Buttons
            controls.generateBtn.addEventListener('click', handleGenerateImage);
            controls.downloadJpegBtn.addEventListener('click', () => download('jpeg'));
            controls.downloadPdfBtn.addEventListener('click', () => download('pdf'));
            
            // Special cases
            controls.showDescCheck.addEventListener('change', toggleDescriptionControls);
        }

        function handleTabClick(e) {
            state.currentTab = e.currentTarget.dataset.tab;
            updateTab();
            render();
        }

        function toggleDescriptionControls() {
            controls.descFontControls.style.display = controls.showDescCheck.checked ? 'block' : 'none';
        }

        function updateTab() {
            controls.tabs.forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${state.currentTab}"]`).classList.add('active');
            controls.menuControls.style.display = state.currentTab === 'menu' ? 'block' : 'none';
            controls.promoControls.style.display = state.currentTab === 'promo' ? 'block' : 'none';
        }

        // --- Data Handling ---
        function setupDropArea(dropArea, fileInput, fileInfo) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => dropArea.classList.add('highlight'), false);
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => dropArea.classList.remove('highlight'), false);
            });
            dropArea.addEventListener('drop', e => {
                fileInput.files = e.dataTransfer.files;
                handleFile(fileInput.files[0]);
            }, false);
            fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));
        }

        function handleFile(file) {
            if (!file) return;
            controls.fileInfo.textContent = file.name;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);
                    state.excelData = processExcelData(jsonData);
                    state.gridImages = {}; // Reset custom images on new file
                    render();
                } catch (err) {
                    alert('Ошибка при чтении файла: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function processExcelData(data) {
            const nameKeys = ['название', 'наименование', 'item', 'name'];
            const priceKeys = ['цена', 'стоимость', 'с ндс', 'price'];
            const descKeys = ['описание', 'description', 'desc'];
            const categoryKeys = ['категория', 'category', 'group'];
            const imageKeys = ['фото', 'картинка', 'image', 'img', 'photo'];
            const sKeys = ['s', 'small'];
            const mKeys = ['m', 'medium'];
            const lKeys = ['l', 'large'];

            const findKey = (obj, keys) => {
                const lowerCaseKeys = Object.keys(obj).reduce((acc, k) => { acc[k.toLowerCase()] = obj[k]; return acc; }, {});
                for (const key of keys) {
                    if (lowerCaseKeys[key] !== undefined) return lowerCaseKeys[key];
                }
                return null;
            }

            return data.map(row => ({
                name: findKey(row, nameKeys),
                price: findKey(row, priceKeys),
                description: findKey(row, descKeys),
                category: findKey(row, categoryKeys) || 'Основное меню',
                image: findKey(row, imageKeys),
                S: findKey(row, sKeys),
                M: findKey(row, mKeys),
                L: findKey(row, lKeys),
            }));
        }
        
        // --- Image Handling ---
        function handlePromoImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                state.promoImage = event.target.result;
                controls.promoImgInfo.textContent = file.name;
                render();
            };
            reader.readAsDataURL(file);
        }

        function handleGridImageUpload(e, index) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                state.gridImages[index] = event.target.result;
                render();
            };
            reader.readAsDataURL(file);
        }

        // --- AI Image Generation ---
        async function handleGenerateImage() {
            const prompt = controls.promptInput.value.trim();
            if (!prompt) {
                alert('Введите описание для генерации изображения.');
                return;
            }
            
            showLoading('Запускаем нейросеть...');

            try {
                const params = {
                    type: "GENERATE",
                    style: "DEFAULT",
                    width: 1024,
                    height: 1024,
                    generateParams: { query: prompt }
                };

                const modelResponse = await fetch(`${API_URL}/models`, {
                    method: 'GET',
                    headers: { 'X-Key': `Key ${API_KEY}` }
                });
                const models = await modelResponse.json();
                const modelId = models[0].id;

                const runResponse = await fetch(`${API_URL}/run`, {
                    method: 'POST',
                    headers: {
                        'X-Key': `Key ${API_KEY}`,
                        'X-Secret': `Secret ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ model_id: modelId, ...params })
                });

                const runData = await runResponse.json();
                if (runData.error || runData.status === 'FAILED') {
                    throw new Error(runData.message || 'Failed to start generation');
                }
                const uuid = runData.uuid;
                
                showLoading('Генерация изображения... Это может занять минуту.');

                // Polling for result
                for (let i = 0; i < 30; i++) {
                    await new Promise(resolve => setTimeout(resolve, 4000)); // Wait 4 seconds
                    const statusResponse = await fetch(`${API_URL}/status/${uuid}`, {
                         headers: { 'X-Key': `Key ${API_KEY}`, 'X-Secret': `Secret ${API_KEY}` }
                    });
                    const statusData = await statusResponse.json();
                    
                    if (statusData.status === 'DONE') {
                        state.promoImage = `data:image/jpeg;base64,${statusData.images[0]}`;
                        controls.promoImgInfo.textContent = `Сгенерировано: "${prompt}"`;
                        hideLoading();
                        render();
                        return;
                    }
                    if (statusData.status === 'FAILED') {
                         throw new Error('Генерация не удалась.');
                    }
                }
                throw new Error('Время ожидания истекло.');

            } catch (error) {
                console.error('AI Error:', error);
                alert('Ошибка генерации: ' + error.message);
                hideLoading();
            }
        }
        
        // --- Rendering Engine ---
        function render() {
            if (state.currentTab === 'menu') {
                renderMenu();
            } else if (state.currentTab === 'promo') {
                renderPromo();
            }
        }

        function renderPlaceholder(title, text) {
            controls.menuPreview.innerHTML = `
                <div class="preview-placeholder">
                    <h3>${title}</h3><p>${text}</p>
                </div>`;
        }
        
        // MENU RENDER
        function renderMenu() {
            if (!state.excelData) {
                return renderPlaceholder('Сейчас здесь будет ваше меню', 'Загрузите Excel-файл с данными.');
            }
            if (controls.layoutSelect.value === 'list') {
                renderMenuList();
            } else {
                renderMenuGrid();
            }
        }

        function renderMenuList() {
            const useMultiPrice = controls.multiPriceCheck.checked;
            const showDesc = controls.showDescCheck.checked;
            const categories = [...new Set(state.excelData.map(item => item.category))];
            
            let html = '';
            categories.forEach(category => {
                html += `<div class="menu-section">
                    <div class="section-title" style="font-family:${controls.catFontSelect.value}; font-size:${controls.catFontSize.value}px; color:${controls.catColor.value};">${category}</div>`;
                
                state.excelData.filter(item => item.category === category).forEach(item => {
                    const priceHtml = useMultiPrice && (item.S || item.M || item.L)
                        ? `${item.S ? `S:${formatPrice(item.S)} ` : ''}${item.M ? `M:${formatPrice(item.M)} ` : ''}${item.L ? `L:${formatPrice(item.L)}` : ''}`
                        : formatPrice(item.price);

                    html += `
                    <div class="menu-item">
                        <div class="item-content">
                            <div class="item-name" style="font-family:${controls.itemFontSelect.value}; font-size:${controls.itemFontSize.value}px; color:${controls.itemColor.value};">${item.name || ''}</div>
                            ${showDesc && item.description ? `<div class="item-description" style="font-family:${controls.descFontSelect.value}; font-size:${controls.descFontSize.value}px; color:${controls.descColor.value};">${item.description}</div>` : ''}
                        </div>
                        <div class="item-price" style="font-family:${controls.itemFontSelect.value}; font-size:${controls.itemFontSize.value}px; color:${controls.itemColor.value};">
                            ${priceHtml}
                        </div>
                    </div>`;
                });
                html += `</div>`;
            });
            
            const totalItems = state.excelData.length;
            const useTwoColumns = totalItems > 12; // Threshold for two columns

            controls.menuPreview.innerHTML = `
                <div class="menu-list-content" style="background-color: ${controls.menuBgColor.value};">
                    <div class="menu-items-container ${useTwoColumns ? 'two-columns' : ''}">${html}</div>
                </div>`;
        }

        function renderMenuGrid() {
            let html = '';
            for (let i = 0; i < 16; i++) {
                const item = state.excelData[i];
                if (item) {
                    const itemImage = state.gridImages[i] || item.image;
                    const showDesc = controls.showDescCheck.checked;
                    html += `
                    <div class="grid-item">
                        <div class="grid-item-content">
                            <div class="item-name" style="font-family:${controls.itemFontSelect.value}; font-size:${controls.itemFontSize.value}px; color:${controls.itemColor.value};">${item.name || ''}</div>
                            ${showDesc && item.description ? `<div class="item-description" style="font-family:${controls.descFontSelect.value}; font-size:${controls.descFontSize.value}px; color:${controls.descColor.value};">${item.description}</div>` : ''}
                             <div class="item-price" style="font-family:${controls.itemFontSelect.value}; font-size:${controls.itemFontSize.value}px; color:${controls.itemColor.value};">${formatPrice(item.price)}</div>
                        </div>
                        <div class="grid-item-image-container">
                            ${itemImage ? `<img src="${itemImage}" class="grid-item-image">` : ''}
                            <button class="add-image-btn" data-index="${i}">+</button>
                            <input type="file" class="grid-image-upload" data-index="${i}" accept="image/*" style="display: none;">
                        </div>
                    </div>`;
                } else {
                    html += `<div class="grid-item"></div>`; // Empty cell
                }
            }
             controls.menuPreview.innerHTML = `
                <div class="menu-grid-content" style="background-color: ${controls.menuBgColor.value};">
                    <div class="menu-grid-container">${html}</div>
                </div>`;

            // Add event listeners for the new buttons
            document.querySelectorAll('.add-image-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = e.currentTarget.dataset.index;
                    document.querySelector(`.grid-image-upload[data-index="${index}"]`).click();
                });
            });
            document.querySelectorAll('.grid-image-upload').forEach(input => {
                 input.addEventListener('change', (e) => handleGridImageUpload(e, e.currentTarget.dataset.index));
            });
        }


        // PROMO RENDER
        function renderPromo() {
            const title = controls.promoTitle.value;
            const text = controls.promoText.value;
            const price = controls.promoPrice.value;

            if (!title && !text && !price && !state.promoImage) {
                return renderPlaceholder('Сейчас здесь будет ваша акция', 'Заполните поля в панели управления.');
            }
            
            const imagePosition = controls.promoImgPosition.value;

            const textHtml = `
                <div class="promo-text-wrapper">
                    ${title ? `<div class="promo-title" style="font-family:${controls.promoTitleFont.value}; font-size:${controls.promoTitleSize.value}px; color:${controls.promoTitleColor.value};">${title}</div>` : ''}
                    ${text ? `<div class="promo-text" style="font-family:${controls.promoTextFont.value}; font-size:${controls.promoTextSize.value}px; color:${controls.promoTextColor.value};">${text}</div>` : ''}
                    ${price ? `<div class="promo-price" style="font-family:${controls.promoPriceFont.value}; font-size:${controls.promoPriceSize.value}px; color:${controls.promoPriceColor.value};">${formatPrice(price)}</div>` : ''}
                </div>`;
            
            const imageHtml = state.promoImage ? `
                <div class="promo-image-wrapper">
                    <img src="${state.promoImage}" class="promo-image" alt="Promotion Image">
                </div>` : '';

            controls.menuPreview.innerHTML = `
            <div class="promo-template">
                <div class="promo-background" style="background-color:${controls.promoBgColor.value};"></div>
                <div class="promo-content img-${imagePosition}">
                    ${textHtml}
                    ${imageHtml}
                </div>
            </div>`;
        }

        // --- Utilities ---
        function formatPrice(price) {
            if (!price) return '';
            const num = parseFloat(price);
            return isNaN(num) ? price : num.toFixed(0) + ' ₽';
        }

        function showLoading(text) {
            controls.loadingText.textContent = text;
            controls.loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            controls.loadingOverlay.style.display = 'none';
        }

        // --- Exporting ---
        function download(format) {
            showLoading(`Сохранение в ${format.toUpperCase()}...`);
            // Temporarily set a fixed size for high-res capture, respecting aspect ratio
            const previewEl = controls.menuPreview;
            const originalWidth = previewEl.style.width;
            const originalHeight = previewEl.style.height;

            previewEl.style.width = '1920px';
            previewEl.style.height = '1080px';
            previewEl.style.borderRadius = '0'; // Ensure no rounded corners in capture

            html2canvas(previewEl, { 
                backgroundColor: null, 
                scale: 1, // Capture at the fixed size
                logging: false,
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                // Restore original styles
                previewEl.style.width = originalWidth;
                previewEl.style.height = originalHeight;
                previewEl.style.borderRadius = ''; 

                if (format === 'jpeg') {
                    canvas.toBlob(blob => {
                        saveAs(blob, 'menuboard.jpeg');
                        hideLoading();
                    }, 'image/jpeg', 0.95);
                } else if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [297, 167] }); // A4-width 16:9
                    
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
                    pdf.save('menuboard.pdf');
                    hideLoading();
                }
            }).catch(err => {
                console.error("Download Error:", err);
                alert("Ошибка сохранения. Попробуйте снова.");
                hideLoading();
            });
        }

        // --- Run App ---
        init();
    });
    </script>
</body>
