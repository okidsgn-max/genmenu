<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --accent-color: #e74c3c;
            --bg-color: #fff;
            --divider-color: #eee;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            background-color: #f5f5f5;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 15px;
        }
        
        .header-logo {
            width: 85px;
            height: 22px;
            margin-right:20px;
            object-fit: initial;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #3d435c;
            margin: 0;
            margin-bottom: 15px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            height: calc(100% - 120px);
        }
        
        .controls-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 380px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .controls-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .controls-footer {
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: auto;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .tab-btn {
            display: flex;
            align-items: center;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: var(--text-color);
        }

        .tab-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .tab-btn.active {
            color: var(--active-color);
        }
        
        .control-group {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .control-group:last-child { border-bottom: none; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .checkbox-group input { margin-right: 10px; }
        .checkbox-group label { margin-bottom: 0; }
        
        .btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:hover { background: var(--button-hover); }
        
        .btn-secondary {
            background: none;
            color: var(--text-color);
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover { background: #e0e0e0; }
        
        .input, .select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
            background-color: var(--input-bg);
        }
        
        .setting-row {
            display: grid;
            grid-template-columns: 1fr 1fr 30px;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .setting-row label { grid-column: 1 / -1; }

        .preview-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .preview-container {
            width: 100%;
            background: transparent;
            border-radius: 8px;
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
                
        .preview-actions {
            padding: 15px 0 0 0;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }
        
        .menu-preview {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: var(--menu-bg-color, #eeeeee);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Стили для шаблона списка */
        .menu-list-template {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow: hidden;
        }
        
        .menu-items-container {
            flex: 1;
            overflow: hidden;
            display: grid;
            gap: 20px 40px;
        }

        .menu-items-container.two-columns { grid-template-columns: 1fr 1fr; }
        
        .menu-section { margin-bottom: 30px; }
        
        .section-title {
            font-family: var(--category-font-family);
            font-size: var(--category-font-size);
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--divider-color);
            color: var(--category-font-color);
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--divider-color);
        }
        
        .item-content { flex-grow: 1; }
        
        .item-name {
            font-family: var(--item-font-family);
            font-weight: 500;
            font-size: var(--item-font-size);
            color: var(--item-font-color);
            margin-bottom: 5px;
        }
        
        .item-description {
            font-family: var(--desc-font-family);
            font-size: var(--desc-font-size);
            color: var(--desc-font-color);
            margin-bottom: 5px;
            font-weight: 300;
        }
        
        .item-price {
            font-family: var(--item-font-family);
            font-weight: 700;
            font-size: var(--item-font-size);
            color: var(--item-font-color);
            white-space: nowrap;
            margin-left: 20px;
            text-align: right;
            min-width: 80px;
        }
        
        /* Стили для шаблона сетки */
        .menu-grid-template {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 5px 15px;
            position: relative;
            overflow: hidden;
        }
        .grid-cell .item-name { grid-area: 1 / 1 / 2 / 2; font-weight: 700;}
        .grid-cell .item-description { grid-area: 2 / 1 / 3 / 2; align-self: start; }
        .grid-cell .item-price { grid-area: 3 / 1 / 4 / 2; align-self: end; text-align: left; margin-left: 0; }
        .grid-cell .item-photo-container {
            grid-area: 1 / 2 / 4 / 3;
            position: relative;
            background: #f0f0f0;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .grid-cell .item-photo { width: 100%; height: 100%; object-fit: cover; }
        .grid-cell .upload-photo-btn {
            font-size: 30px;
            cursor: pointer;
            border: none;
            background: #e0e0e0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #888;
        }

        /* Стили для шаблона "Акция" */
        .promo-template {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        .promo-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            text-align: left;
            color: white;
        }
        .promo-title {
            font-size: var(--promo-title-font-size);
            font-family: var(--promo-title-font-family);
            color: var(--promo-title-font-color);
            font-weight: 700; margin-bottom: 20px; line-height: 1.1;
        }
        .promo-text {
            font-size: var(--promo-text-font-size);
            font-family: var(--promo-text-font-family);
            color: var(--promo-text-font-color);
            margin-bottom: 30px; line-height: 1.3;
        }
        .promo-price {
            font-size: var(--promo-price-font-size);
            font-family: var(--promo-price-font-family);
            color: var(--promo-price-font-color);
            font-weight: bold; margin-top: auto;
        }
        
        /* Стили для комбинированного шаблона */
        .combined-template {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .combined-menu-part {
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        .combined-promo-part {
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .combined-promo-content {
            position: relative;
            z-index: 2;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            text-align: left;
            color: white;
        }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            color: white; font-size: 24px; flex-direction: column; text-align: center;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid var(--active-color);
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .drop-area {
            border: 2px dashed #ccc; border-radius: 8px;
            padding: 20px; text-align: center; margin-bottom: 15px;
            cursor: pointer; transition: all 0.3s; background-color: var(--input-bg);
        }
        .drop-area:hover, .drop-area.highlight {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.1);
        }
        .file-info { font-size: 12px; color: #8e8e9e; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo">
    </div>
    
    <div class="main-container">

        <div class="controls-panel">
            <h1 class="header-title">Генератор менюборда</h1>

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu"><img src="menu.svg" alt="Меню"> Меню</button>
                <button class="tab-btn" data-tab="promo"><img src="acii.svg" alt="Акция"> Акция</button>
                <button class="tab-btn" data-tab="combined"><img src="2v1.svg" alt="2 в 1"> 2в1</button>
            </div>

            <div class="controls-content">
                <div id="menu-controls">
                    <div class="control-group">
                        <label>Загрузка данных:</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл Excel или
                            <button class="btn btn-secondary" style="width: auto; padding: 5px 10px; margin: 5px 0 0 0;" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display: none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Настройки верстки:</label>
                        <select id="layout-type-select" class="select">
                            <option value="list">Список</option>
                            <option value="grid">Сетка 2x2</option>
                        </select>
                        <div class="checkbox-group">
                            <input type="checkbox" id="show-description-checkbox" checked>
                            <label for="show-description-checkbox">Показывать описание блюд</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="multiple-prices-checkbox">
                            <label for="multiple-prices-checkbox">Использовать цены для объемов (S/M/L)</label>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон меню:</label>
                        <input type="color" id="menu-bg-color-picker" value="#eeeeee" style="width: 100%; height: 40px;">
                    </div>

                    <div class="control-group">
                        <label>Шрифт категорий:</label>
                        <div class="setting-row">
                            <select id="category-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Open Sans', sans-serif">Open Sans</option></select>
                            <input type="number" id="category-font-size" class="input" value="24" min="10" max="100">
                            <input type="color" id="category-color-picker" value="#00b398">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Шрифт пунктов:</label>
                        <div class="setting-row">
                            <select id="item-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Open Sans', sans-serif">Open Sans</option><option value="'Lato', sans-serif">Lato</option></select>
                            <input type="number" id="item-font-size" class="input" value="16" min="10" max="100">
                            <input type="color" id="item-color-picker" value="#3d435c">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт описания:</label>
                        <div class="setting-row">
                            <select id="desc-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Open Sans', sans-serif">Open Sans</option><option value="'Lato', sans-serif">Lato</option></select>
                            <input type="number" id="desc-font-size" class="input" value="14" min="8" max="100">
                            <input type="color" id="desc-color-picker" value="#667099">
                        </div>
                    </div>
                </div>
                
                <div id="promo-controls" style="display: none;">
                    <div class="control-group">
                        <label>Заголовок акции:</label>
                        <input type="text" id="promo-title-input" class="input" placeholder="Введите заголовок">
                        <div class="setting-row">
                            <select id="promo-title-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Oswald', sans-serif">Oswald</option></select>
                            <input type="number" id="promo-title-size" class="input" value="60" min="10" max="180">
                            <input type="color" id="promo-title-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Текст акции:</label>
                        <input type="text" id="promo-text-input" class="input" placeholder="Введите текст">
                        <div class="setting-row">
                            <select id="promo-text-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Open Sans', sans-serif">Open Sans</option></select>
                            <input type="number" id="promo-text-size" class="input" value="30" min="10" max="100">
                            <input type="color" id="promo-text-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Цена:</label>
                        <input type="number" id="promo-price-input" class="input" placeholder="Введите цену">
                        <div class="setting-row">
                            <select id="promo-price-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option></select>
                            <input type="number" id="promo-price-size" class="input" value="40" min="10" max="180">
                            <input type="color" id="promo-price-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон:</label>
                         <select id="promo-bg-type-select" class="select">
                            <option value="color">Сплошной цвет</option>
                            <option value="image">Загрузить изображение</option>
                            <option value="generate">Сгенерировать (AI)</option>
                        </select>
                         <div id="bg-position-container" style="display: none;">
                            <label>Расположение картинки:</label>
                            <select id="promo-bg-position-select" class="select">
                                <option value="center">По центру</option>
                                <option value="left">Слева</option>
                                <option value="right">Справа</option>
                            </select>
                        </div>
                        <div id="bg-color-container">
                            <input type="color" id="bg-color-picker" value="#4a6baf" style="width: 100%; height: 40px;">
                        </div>
                        <div id="bg-image-container" style="display: none;">
                            <button class="btn btn-secondary" onclick="document.getElementById('promo-background-upload').click()">Выберите файл</button>
                            <input type="file" id="promo-background-upload" accept="image/*" style="display: none;">
                            <div class="file-info" id="bg-file-info">Изображение не загружено</div>
                        </div>
                        <div id="bg-generate-container" style="display: none;">
                            <input type="text" id="bg-prompt" class="input" placeholder="Опишите фон для генерации...">
                            <button class="btn" id="generate-bg-btn" style="background:var(--accent-color)">Сгенерировать</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-wrapper">
            <div class="preview-container">
                <div class="menu-preview" id="menu-preview">
                    <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                        <h3>Здесь будет ваше меню</h3>
                        <p>Настройте параметры слева и загрузите данные</p>
                    </div>
                </div>
            </div>
            <div class="preview-actions">
                <button class="btn" id="download-png-btn">Сохранить в JPEG</button>
                <button class="btn btn-secondary" id="download-pdf-btn">Сохранить в PDF</button>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Генерация фона...</div>
    </div>
    <input type="file" id="grid-photo-upload" accept="image/*" style="display: none;">

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Element Refs
            const getEl = (id) => document.getElementById(id);
            const controls = {
                tabButtons: document.querySelectorAll('.tab-btn'),
                menuControls: getEl('menu-controls'),
                promoControls: getEl('promo-controls'),
                fileInput: getEl('file-input'),
                menuDropArea: getEl('menu-drop-area'),
                menuFileInfo: getEl('menu-file-info'),
                layoutSelect: getEl('layout-type-select'),
                showDescCheck: getEl('show-description-checkbox'),
                multiPriceCheck: getEl('multiple-prices-checkbox'),
                menuBgPicker: getEl('menu-bg-color-picker'),
                categoryFont: getEl('category-font-select'),
                categorySize: getEl('category-font-size'),
                categoryColor: getEl('category-color-picker'),
                itemFont: getEl('item-font-select'),
                itemSize: getEl('item-font-size'),
                itemColor: getEl('item-color-picker'),
                descFont: getEl('desc-font-select'),
                descSize: getEl('desc-font-size'),
                descColor: getEl('desc-color-picker'),
                promoTitle: getEl('promo-title-input'),
                promoText: getEl('promo-text-input'),
                promoPrice: getEl('promo-price-input'),
                promoTitleFont: getEl('promo-title-font-select'),
                promoTitleSize: getEl('promo-title-size'),
                promoTitleColor: getEl('promo-title-color-picker'),
                promoTextFont: getEl('promo-text-font-select'),
                promoTextSize: getEl('promo-text-size'),
                promoTextColor: getEl('promo-text-color-picker'),
                promoPriceFont: getEl('promo-price-font-select'),
                promoPriceSize: getEl('promo-price-size'),
                promoPriceColor: getEl('promo-price-color-picker'),
                promoBgType: getEl('promo-bg-type-select'),
                promoBgPos: getEl('promo-bg-position-select'),
                bgColorContainer: getEl('bg-color-container'),
                bgImageContainer: getEl('bg-image-container'),
                bgGenerateContainer: getEl('bg-generate-container'),
                bgPositionContainer: getEl('bg-position-container'),
                promoBgUpload: getEl('promo-background-upload'),
                promoBgInfo: getEl('bg-file-info'),
                bgColorPicker: getEl('bg-color-picker'),
                bgPrompt: getEl('bg-prompt'),
                generateBgBtn: getEl('generate-bg-btn'),
                gridPhotoUpload: getEl('grid-photo-upload'),
                menuPreview: getEl('menu-preview'),
                downloadPngBtn: getEl('download-png-btn'),
                downloadPdfBtn: getEl('download-pdf-btn'),
                loadingOverlay: getEl('loading-overlay'),
                loadingText: getEl('loading-text'),
            };

            // State
            let state = {
                currentTab: 'menu',
                excelData: null,
                promoBgImage: null,
                gridImages: {}, // {0: 'data:image/...', 1: ...}
                currentGridTarget: null,
            };
            
            // --- API KEYS ---
            const FUSION_BRAIN_API_KEY = '7BE81F273FA49A565F4BFFA787DE9D3C';
            const FUSION_BRAIN_SECRET_KEY = 'YOUR_SECRET_KEY'; // Usually required, add if you have one.

            function init() {
                setupEventListeners();
                updateTabVisibility();
                render();
            }

            function setupEventListeners() {
                // Tabs
                controls.tabButtons.forEach(btn => btn.addEventListener('click', () => {
                    state.currentTab = btn.dataset.tab;
                    controls.tabButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateTabVisibility();
                    render();
                }));

                // Drag & Drop
                setupDropArea(controls.menuDropArea, controls.fileInput, controls.menuFileInfo);

                // Menu Controls
                [controls.layoutSelect, controls.showDescCheck, controls.multiPriceCheck, controls.menuBgPicker,
                 controls.categoryFont, controls.categorySize, controls.categoryColor,
                 controls.itemFont, controls.itemSize, controls.itemColor,
                 controls.descFont, controls.descSize, controls.descColor].forEach(el => {
                    el.addEventListener('input', render);
                    el.addEventListener('change', render);
                 });
                
                // Promo Controls
                [controls.promoTitle, controls.promoText, controls.promoPrice, controls.promoTitleFont,
                 controls.promoTitleSize, controls.promoTitleColor, controls.promoTextFont, controls.promoTextSize,
                 controls.promoTextColor, controls.promoPriceFont, controls.promoPriceSize, controls.promoPriceColor,
                 controls.promoBgType, controls.promoBgPos, controls.bgColorPicker].forEach(el => {
                    el.addEventListener('input', render);
                    el.addEventListener('change', render);
                 });

                controls.promoBgType.addEventListener('change', updatePromoBgControls);
                controls.promoBgUpload.addEventListener('change', handlePromoBgUpload);
                controls.generateBgBtn.addEventListener('click', generateAIBg);
                
                // Downloads
                controls.downloadPngBtn.addEventListener('click', downloadAsPNG);
                controls.downloadPdfBtn.addEventListener('click', downloadAsPDF);

                // Grid photo upload
                controls.menuPreview.addEventListener('click', handleGridPhotoUploadClick);
                controls.gridPhotoUpload.addEventListener('change', handleGridPhotoFileChange);
            }

            // --- UI UPDATE FUNCTIONS ---
            function updateTabVisibility() {
                controls.menuControls.style.display = (state.currentTab === 'menu' || state.currentTab === 'combined') ? 'block' : 'none';
                controls.promoControls.style.display = (state.currentTab === 'promo' || state.currentTab === 'combined') ? 'block' : 'none';
                if (state.currentTab === 'combined') {
                    controls.promoControls.style.display = 'block';
                }
            }
            
            function updatePromoBgControls() {
                const type = controls.promoBgType.value;
                controls.bgColorContainer.style.display = type === 'color' ? 'block' : 'none';
                controls.bgImageContainer.style.display = type === 'image' ? 'block' : 'none';
                controls.bgGenerateContainer.style.display = type === 'generate' ? 'block' : 'none';
                controls.bgPositionContainer.style.display = (type === 'image' || type === 'generate') ? 'block' : 'none';
            }

            // --- DATA HANDLING ---
            function setupDropArea(dropArea, fileInput, fileInfo) {
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    dropArea.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
                });
                ['dragenter', 'dragover'].forEach(eventName => dropArea.addEventListener(eventName, () => dropArea.classList.add('highlight')));
                ['dragleave', 'drop'].forEach(eventName => dropArea.addEventListener(eventName, () => dropArea.classList.remove('highlight')));
                
                dropArea.addEventListener('drop', e => {
                    if (e.dataTransfer.files.length) {
                        fileInput.files = e.dataTransfer.files;
                        handleExcelFile(e.dataTransfer.files[0]);
                    }
                });
                fileInput.addEventListener('change', e => { if (e.target.files.length) handleExcelFile(e.target.files[0]) });

                function handleExcelFile(file) {
                    fileInfo.textContent = file.name;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                            const jsonData = XLSX.utils.sheet_to_json(worksheet);
                            
                            // Normalize keys
                            state.excelData = jsonData.map(row => ({
                                name: row['Название'] || row['Наименование'] || '',
                                description: row['Описание'] || '',
                                price: row['Цена'] || row['Стоимость'] || row['с ндс'] || '',
                                photo: row['Фото'] || '',
                                category: row['Категория'] || 'Основное меню',
                                S: row['S'] || '', M: row['M'] || '', L: row['L'] || ''
                            }));
                            state.gridImages = {}; // Reset images on new file
                            render();
                        } catch (error) { alert('Ошибка при чтении файла: ' + error.message); }
                    };
                    reader.readAsArrayBuffer(file);
                }
            }

            function formatPrice(price) {
                if (price === null || price === undefined || price === '') return '';
                const num = parseFloat(String(price).replace(',', '.'));
                return isNaN(num) ? price : num.toFixed(0) + ' ₽';
            }

            // --- IMAGE HANDLING ---
            function handlePromoBgUpload(e) {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    controls.promoBgInfo.textContent = file.name;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        state.promoBgImage = event.target.result;
                        render();
                    };
                    reader.readAsDataURL(file);
                }
            }

            function handleGridPhotoUploadClick(e) {
                if (e.target.matches('.upload-photo-btn')) {
                    state.currentGridTarget = e.target.dataset.index;
                    controls.gridPhotoUpload.click();
                }
            }

            function handleGridPhotoFileChange(e) {
                if (e.target.files && e.target.files[0] && state.currentGridTarget !== null) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        state.gridImages[state.currentGridTarget] = event.target.result;
                        render();
                        state.currentGridTarget = null;
                    };
                    reader.readAsDataURL(file);
                    e.target.value = ''; // Reset input
                }
            }

            // --- RENDER FUNCTIONS ---
            function applyStyles() {
                const root = document.documentElement.style;
                root.setProperty('--menu-bg-color', controls.menuBgPicker.value);
                root.setProperty('--category-font-family', controls.categoryFont.value);
                root.setProperty('--category-font-size', controls.categorySize.value + 'px');
                root.setProperty('--category-font-color', controls.categoryColor.value);
                root.setProperty('--item-font-family', controls.itemFont.value);
                root.setProperty('--item-font-size', controls.itemSize.value + 'px');
                root.setProperty('--item-font-color', controls.itemColor.value);
                root.setProperty('--desc-font-family', controls.descFont.value);
                root.setProperty('--desc-font-size', controls.descSize.value + 'px');
                root.setProperty('--desc-font-color', controls.descColor.value);
                root.setProperty('--promo-title-font-family', controls.promoTitleFont.value);
                root.setProperty('--promo-title-font-size', controls.promoTitleSize.value + 'px');
                root.setProperty('--promo-title-font-color', controls.promoTitleColor.value);
                root.setProperty('--promo-text-font-family', controls.promoTextFont.value);
                root.setProperty('--promo-text-font-size', controls.promoTextSize.value + 'px');
                root.setProperty('--promo-text-font-color', controls.promoTextColor.value);
                root.setProperty('--promo-price-font-family', controls.promoPriceFont.value);
                root.setProperty('--promo-price-font-size', controls.promoPriceSize.value + 'px');
                root.setProperty('--promo-price-font-color', controls.promoPriceColor.value);
            }
            
            function renderMenuHTML() {
                if (!state.excelData) return '';
                const layout = controls.layoutSelect.value;
                return layout === 'grid' ? renderGridMenu() : renderListMenu();
            }

            function renderListMenu() {
                let html = '';
                const categories = [...new Set(state.excelData.map(item => item.category))];
                
                categories.forEach(category => {
                    html += `<div class="menu-section"><div class="section-title">${category}</div>`;
                    state.excelData.filter(item => item.category === category).forEach(item => {
                        const volumePrices = controls.multiPriceCheck.checked ? 
                            ['S', 'M', 'L'].map(v => item[v] ? `<span class="volume-price">${v}: ${formatPrice(item[v])}</span>` : '').join(' ') : '';
                        
                        html += `
                        <div class="menu-item">
                            <div class="item-content">
                                <div class="item-name">${item.name}</div>
                                ${controls.showDescCheck.checked && item.description ? `<div class="item-description">${item.description}</div>` : ''}
                            </div>
                            <div class="item-price">
                                ${volumePrices || formatPrice(item.price)}
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                });

                const container = document.createElement('div');
                container.className = 'menu-list-template';
                container.innerHTML = `<div class="menu-items-container">${html}</div>`;
                return container.outerHTML;
            }

            function renderGridMenu() {
                let html = '';
                const itemsToDisplay = state.excelData.slice(0, 4);

                itemsToDisplay.forEach((item, index) => {
                    const imgSrc = state.gridImages[index] || item.photo;
                    html += `
                    <div class="grid-cell">
                        <div class="item-name">${item.name}</div>
                        ${controls.showDescCheck.checked && item.description ? `<div class="item-description">${item.description}</div>` : '<div></div>'}
                        <div class="item-price">${formatPrice(item.price)}</div>
                        <div class="item-photo-container">
                            ${imgSrc ? `<img src="${imgSrc}" alt="${item.name}" class="item-photo">` : `<button class="upload-photo-btn" data-index="${index}">+</button>`}
                        </div>
                    </div>`;
                });
                return `<div class="menu-grid-template">${html}</div>`;
            }

            function renderPromoHTML() {
                const title = controls.promoTitle.value;
                const text = controls.promoText.value;
                const price = controls.promoPrice.value;
                if (!title && !text && !price) return '';

                return `
                    <div class="promo-content">
                        ${title ? `<div class="promo-title">${title}</div>` : ''}
                        ${text ? `<div class="promo-text">${text}</div>` : ''}
                        ${price ? `<div class="promo-price">${formatPrice(price)}</div>` : ''}
                    </div>
                `;
            }

            function render() {
                applyStyles();
                let html = '';
                
                // Show initial placeholder if no data
                if ( (state.currentTab === 'menu' && !state.excelData) ||
                     (state.currentTab === 'promo' && !controls.promoTitle.value && !controls.promoText.value) ||
                     (state.currentTab === 'combined' && !state.excelData)
                ) {
                    controls.menuPreview.innerHTML = `
                    <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                        <h3>Здесь будет ваше меню</h3>
                        <p>Настройте параметры слева и загрузите данные</p>
                    </div>`;
                    controls.menuPreview.style.backgroundImage = 'none';
                    return;
                }

                if (state.currentTab === 'menu') {
                    html = renderMenuHTML();
                    controls.menuPreview.style.backgroundImage = 'none';
                } else if (state.currentTab === 'promo') {
                    const promoContainer = document.createElement('div');
                    promoContainer.className = 'promo-template';
                    promoContainer.innerHTML = renderPromoHTML();
                    setPromoBackground(promoContainer);
                    html = promoContainer.outerHTML;
                } else if (state.currentTab === 'combined') {
                    const menuPart = `<div class="combined-menu-part" style="background-color: ${controls.menuBgPicker.value};">${renderMenuHTML()}</div>`;
                    
                    const promoPart = document.createElement('div');
                    promoPart.className = 'combined-promo-part';
                    promoPart.innerHTML = renderPromoHTML();
                    setPromoBackground(promoPart);

                    html = `<div class="combined-template">${menuPart}${promoPart.outerHTML}</div>`;
                }
                
                controls.menuPreview.innerHTML = html;
            }

            function setPromoBackground(element) {
                const type = controls.promoBgType.value;
                const position = controls.promoBgPos.value;
                element.style.backgroundPosition = position;
                if (type === 'color') {
                    element.style.backgroundColor = controls.bgColorPicker.value;
                    element.style.backgroundImage = 'none';
                } else if ((type === 'image' || type === 'generate') && state.promoBgImage) {
                    element.style.backgroundImage = `url(${state.promoBgImage})`;
                    element.style.backgroundColor = '';
                } else {
                    element.style.backgroundColor = controls.bgColorPicker.value;
                    element.style.backgroundImage = 'none';
                }
            }
            
            // --- API & DOWNLOAD ---
            async function generateAIBg() {
                const prompt = controls.bgPrompt.value.trim();
                if (!prompt) { alert('Введите описание для генерации фона'); return; }

                controls.loadingText.textContent = 'Отправка запроса...';
                controls.loadingOverlay.style.display = 'flex';
                
                try {
                    // Step 1: Request generation
                    const modelId = 4; // Kandinsky 2.2
                    const params = new FormData();
                    params.append('model_id', modelId);
                    params.append('prompt', prompt);

                    const runResponse = await fetch('https://api-key.fusionbrain.ai/key/api/v1/text2image/run', {
                        method: 'POST',
                        headers: { 'X-Key': `Key ${FUSION_BRAIN_API_KEY}`, 'X-Secret': `Secret ${FUSION_BRAIN_SECRET_KEY}`},
                        body: params
                    });
                    const runData = await runResponse.json();
                    if (!runData.uuid) throw new Error(runData.message || 'Failed to start generation');
                    
                    const uuid = runData.uuid;
                    controls.loadingText.textContent = 'Генерация изображения... \nЭто может занять минуту.';

                    // Step 2: Poll for result
                    for (let i = 0; i < 30; i++) {
                        await new Promise(resolve => setTimeout(resolve, 4000)); // wait 4 seconds
                        const statusResponse = await fetch(`https://api-key.fusionbrain.ai/key/api/v1/text2image/status/${uuid}`, {
                           headers: { 'X-Key': `Key ${FUSION_BRAIN_API_KEY}`, 'X-Secret': `Secret ${FUSION_BRAIN_SECRET_KEY}`}
                        });
                        const statusData = await statusResponse.json();
                        
                        if (statusData.status === 'DONE') {
                            state.promoBgImage = 'data:image/jpeg;base64,' + statusData.images[0];
                            controls.promoBgInfo.textContent = 'Сгенерированный фон';
                            render();
                            controls.loadingOverlay.style.display = 'none';
                            return;
                        } else if (statusData.status === 'FAIL') {
                            throw new Error('Generation failed: ' + statusData.errorDescription);
                        }
                    }
                     throw new Error('Generation timed out.');
                } catch (error) {
                    console.error('Ошибка генерации фона:', error);
                    alert('Произошла ошибка при генерации фона: ' + error.message);
                    controls.loadingOverlay.style.display = 'none';
                }
            }

            function download(generator, filename) {
                const target = controls.menuPreview.children[0];
                if (!target) return;
                
                controls.loadingText.textContent = 'Сохранение...';
                controls.loadingOverlay.style.display = 'flex';

                html2canvas(target, { backgroundColor: null, scale: 2 }).then(canvas => {
                    generator(canvas, filename);
                    controls.loadingOverlay.style.display = 'none';
                }).catch(err => {
                    console.error('Download error:', err);
                    alert('Ошибка сохранения файла.');
                    controls.loadingOverlay.style.display = 'none';
                });
            }

            function downloadAsPNG() {
                download((canvas, filename) => {
                    canvas.toBlob(blob => saveAs(blob, filename), 'image/png');
                }, 'menuboard.png');
            }
            
            function downloadAsPDF() {
                 download((canvas, filename) => {
                    const { jsPDF } = window.jspdf;
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
                    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
                    pdf.save(filename);
                }, 'menuboard.pdf');
            }

            init();
        });
    </script>
</body>
</html>
