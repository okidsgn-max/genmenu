<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            
            --primary-color: #00b398;
            --secondary-color: #f8f9fa;
            --accent-color: #e74c3c;
            --bg-color: #fff;
            --menu-bg-color: #fff;
            --menu-text-color: #667099;
            --menu-text-light: #8e8e9e;
            --font-main: 'Roboto', sans-serif;
            --font-heading: 'Roboto', sans-serif;
            --text-align: left;
            --section-font-size: 24px;
            --item-name-font-size: 16px;
            --item-desc-font-size: 14px;
            --item-price-font-size: 16px;
            --promo-title-font-size: 60px;
            --promo-text-font-size: 30px;
            --promo-price-font-size: 40px;
            --divider-color: #eee;
            --category-font-color: #00b398;
            --category-font-size: 24px;
            --item-font-color: #667099;
            --item-font-size: 16px;
            --description-font-color: #8e8e9e;
            --description-font-size: 14px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-main);
            color: var(--text-color);
            background-color: #f5f5f5;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 15px;
            border-bottom: 0px solid #eee;
        }
        
        .header-logo {
            width: 85px;
            height: 22px;
            margin-right:20px;
            object-fit: initial;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #3d435c;
            margin: 0;
            margin-bottom: 15px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            height: calc(100% - 120px);
        }
        
        .controls-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0px 0px rgba(0,0,0,0.1);
            width: 350px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .controls-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .controls-footer {
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: auto;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 10px;
            border-bottom: 0px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 0;
        }
        
        .tab-btn {
            display: flex;
            align-items: center;
            padding: 10px 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 0px ;
            transition: all 0.3s;
        }

        .tab-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .tab-btn.active {
            border-bottom: 0px solid var(--active-color);
            color: var(--active-color);
        }
        
        .control-group {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .control-group:last-child {
            border-bottom: none;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
        }
        
        .checkbox-group, .radio-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .checkbox-group input, .radio-group input {
            margin-right: 10px;
        }

        .radio-group label {
            margin-right: 15px;
            font-weight: normal;
        }
        
        .btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background: var(--button-hover);
        }
        
        .btn-secondary {
            background: none;
            color: var(--text-color);
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
            background-color: var(--input-bg);
        }
        
        .select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
           border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background: var(--input-bg);
            margin-bottom: 10px;
        }

        .setting-row {
            display: grid;
            grid-template-columns: 1fr 1fr 20px;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .preview-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e0e0e0; /* Default grey background */
            border-radius: 8px;
            overflow: hidden;
        }
        
        .preview-container {
            background: white;
            border-radius: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            box-shadow: none;
            background-color: transparent;
        }
        
        .preview-actions {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        
        .menu-preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            margin: auto;
            position: relative;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .menu-board-content-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .menu-board-header {
            min-height: 5%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-shrink: 0;
        }

        .menu-board-logo {
            max-height: 50px;
            max-width: 150px;
            object-fit: contain;
        }

        .menu-board-date {
            font-size: 16px;
            color: var(--text-color);
        }

        .menu-board-body {
            flex-grow: 1;
            overflow: hidden;
            padding: 20px;
            height: 100%;
        }
        
        .menu-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }
        
        .menu-items-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .menu-items-container.two-columns {
            grid-template-columns: 1fr 1fr;
        }
        
        .menu-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-family: var(--font-category);
            font-size: var(--category-font-size);
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--divider-color);
            color: var(--category-font-color);
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--divider-color);
            color: var(--item-font-color);
        }
        
        .item-content {
            flex-grow: 1;
        }
        
        .item-name {
            font-weight: 500;
            font-size: var(--item-font-size);
            margin-bottom: 5px;
        }
        
        .item-description {
            font-family: var(--font-description);
            font-size: var(--description-font-size);
            color: var(--description-font-color);
            margin-bottom: 5px;
        }
        
        .item-price {
            font-family: var(--font-price);
            font-weight: 700;
            font-size: var(--price-font-size);
            color: var(--price-font-color);
            white-space: nowrap;
            margin-left: 20px;
            text-align: right;
            min-width: 80px;
        }

        /* Grid 2x2 Layout Styles */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        .grid-cell-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .grid-cell-image-wrapper {
            width: 50%;
            height: 100%;
            margin-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .combined-view .grid-cell-image-wrapper {
            height: 80%;
            align-self: center;
        }

        .grid-cell-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        
        .upload-image-btn {
            width: 50px;
            height: 50px;
            border: 2px dashed var(--active-color);
            border-radius: 50%;
            background: rgba(0, 179, 152, 0.1);
            color: var(--active-color);
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .volume-price {
            display: inline;
            font-size: 14px;
            color: var(--menu-text-light);
            margin-left: 5px;
        }
        
        /* Стили для шаблона "Акция" */
        .promo-template {
            color: white;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            padding: 40px;
        }

        .promo-template.layout-left .promo-image-container { order: 1; }
        .promo-template.layout-left .promo-content { order: 2; text-align: left; }
        .promo-template.layout-right .promo-image-container { order: 2; }
        .promo-template.layout-right .promo-content { order: 1; text-align: right; }
        .promo-template.layout-center { flex-direction: column; text-align: center; }
        .promo-template.layout-center .promo-image-container { order: 1; height: 50%; }
        .promo-template.layout-center .promo-content { order: 2; }
        
        .promo-image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .promo-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .promo-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            box-sizing: border-box;
        }
        
        .promo-title {
            font-size: var(--promo-title-font-size);
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .promo-text {
            font-size: var(--promo-text-font-size);
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .promo-price {
            font-size: var(--promo-price-font-size);
            font-weight: bold;
            margin-top: 20px;
        }

        /* Стили для комбинированного шаблона */
        .combined-template {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .combined-menu-part {
            background: var(--menu-bg-color);
            overflow: hidden;
            display: flex; /* For centering content */
            flex-direction: column;
        }
        
        .combined-promo-part {
            position: relative;
            color: white;
            overflow: hidden;
            display: flex; /* Added */
            align-items: center; /* Added */
            justify-content: center; /* Added */
        }
        
        .combined-promo-part .promo-template {
            padding: 30px;
        }

        /* Стили для генерации фона */
        .prompt-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
        }
        
        /* Загрузочный экран */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 24px;
            flex-direction: column;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--active-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Drag and drop стили */
        .drop-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: var(--input-bg);
        }
        
        .drop-area:hover, .drop-area.highlight {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.1);
        }
        
        .file-info {
            font-size: 12px;
            color: var(--menu-text-light);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo">
    </div>
    
    <div class="main-container">
        <div class="controls-panel">
            <h1 class="header-title">Генератор менюборда</h1>
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu"><img src="menu.svg" alt="Меню"> Меню</button>
                <button class="tab-btn" data-tab="promo"><img src="acii.svg" alt="Акция"> Акция</button>
                <button class="tab-btn" data-tab="combined"><img src="2v1.svg" alt="2 в 1"> 2в1</button>
            </div>

            <div class="controls-content">
                <div id="menu-controls">
                    <div class="control-group">
                        <label>Загрузка данных:</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл Excel или
                            <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display: none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Загрузка логотипа:</label>
                        <button class="btn btn-secondary" onclick="document.getElementById('logo-upload').click()">Загрузить лого</button>
                        <input type="file" id="logo-upload" accept="image/*" style="display: none;">
                        <div class="file-info" id="logo-file-info">Логотип не загружен</div>
                    </div>

                    <div class="control-group">
                        <label>Тип верстки меню:</label>
                        <div class="radio-group">
                            <input type="radio" id="layout-list" name="layout-type" value="list" checked>
                            <label for="layout-list">Список</label>
                            <input type="radio" id="layout-grid" name="layout-type" value="grid">
                            <label for="layout-grid">Сетка 2x2</label>
                        </div>
                    </div>
                    
                    <div class="control-group" id="list-settings">
                        <div class="checkbox-group">
                            <input type="checkbox" id="show-description-checkbox">
                            <label for="show-description-checkbox">Показывать описание блюда</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="multiple-prices-checkbox">
                            <label for="multiple-prices-checkbox">Использовать цены для объемов (S/M/L)</label>
                        </div>
                    </div>

                    <div class="control-group" id="grid-settings" style="display: none;">
                        <label>Цвет фона ячейки:</label>
                        <input type="color" id="grid-cell-bg-color" value="#ffffff" style="width: 40%; height: 40px;">
                    </div>

                    <div class="control-group">
                        <label>Фон блока:</label>
                        <input type="color" id="menu-bg-color-picker" value="#f5f5f5" style="width: 40%; height: 40px;">
                        <button class="btn btn-secondary" onclick="document.getElementById('menu-bg-upload').click()">Добавить картинку</button>
                        <input type="file" id="menu-bg-upload" accept="image/*" style="display: none;">
                    </div>

                    <div class="control-group">
                        <label>Шрифт категорий:</label>
                        <div class="setting-row">
                            <select id="category-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                            </select>
                            <input type="number" id="category-font-size" class="input" value="24" min="10" max="100">
                            <input type="color" id="category-color-picker" value="#00b398">
                        </div>
                    </div>

                    <div class="control-group" id="description-settings-group" style="display: none;">
                        <label>Шрифт описания:</label>
                        <div class="setting-row">
                            <select id="description-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="'Lato', sans-serif">Lato</option>
                            </select>
                            <input type="number" id="description-font-size" class="input" value="14" min="8" max="50">
                            <input type="color" id="description-color-picker" value="#667099">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт цен:</label>
                        <div class="setting-row">
                            <select id="price-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="'Lato', sans-serif">Lato</option>
                            </select>
                            <input type="number" id="price-font-size" class="input" value="16" min="10" max="100">
                            <input type="color" id="price-color-picker" value="#3d435c">
                        </div>
                    </div>
                </div>
                
                <div id="promo-controls" style="display: none;">
                    <div class="control-group">
                        <label for="promo-title-input">Заголовок акции:</label>
                        <input type="text" id="promo-title-input" class="input" placeholder="Введите заголовок акции">
                        <div class="setting-row">
                            <select id="promo-title-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option></select>
                            <input type="number" id="promo-title-size" class="input" value="60" min="10" max="180">
                            <input type="color" id="promo-title-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-text-input">Текст акции:</label>
                        <input type="text" id="promo-text-input" class="input" placeholder="Введите текст акции">
                        <div class="setting-row">
                             <select id="promo-text-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Open Sans', sans-serif">Open Sans</option></select>
                            <input type="number" id="promo-text-size" class="input" value="30" min="10" max="100">
                            <input type="color" id="promo-text-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-price-input">Цена товара (₽):</label>
                        <input type="number" id="promo-price-input" class="input" placeholder="Введите цену">
                        <div class="setting-row">
                            <select id="promo-price-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option></select>
                            <input type="number" id="promo-price-size" class="input" value="40" min="10" max="100">
                            <input type="color" id="promo-price-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон блока:</label>
                        <input type="color" id="bg-color-picker" value="#4a6baf" style="width: 100%; height: 40px;">
                    </div>
                    
                    <div class="control-group">
                        <label>Изображение акции:</label>
                        <input type="text" id="bg-prompt" class="prompt-input" placeholder="Опишите картинку для генерации">
                        <button class="generate-btn" id="generate-bg-btn">Сгенерировать (AI)</button>
                        <div class="file-info">или</div>
                        <button class="btn btn-secondary" onclick="document.getElementById('promo-background-upload').click()">Загрузить свою</button>
                        <input type="file" id="promo-background-upload" accept="image/*" style="display: none;">
                        <div class="file-info" id="bg-file-info">Изображение не загружено</div>
                    </div>

                    <div class="control-group">
                        <label>Расположение картинки:</label>
                        <select id="promo-layout-select" class="select">
                            <option value="left">Слева</option>
                            <option value="right">Справа</option>
                            <option value="center">По центру</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-wrapper">
            <div class="preview-container">
                <div class="menu-preview" id="menu-preview">
                    <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                        <h3>Здесь будет ваше меню</h3>
                        <p>Настройте параметры слева и загрузите данные</p>
                    </div>
                </div>
            </div>
            <div class="preview-actions">
                <button class="btn" id="download-png-btn">Сохранить в JPEG</button>
                <button class="btn btn-secondary" id="download-pdf-btn">Сохранить в PDF</button>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Генерация...</div>
    </div>
    <input type="file" id="grid-image-upload" accept="image/*" style="display: none;">

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // API Keys - IMPORTANT: Replace with your actual keys
        const FUSION_BRAIN_API_KEY = '7BE81F273FA49A565F4BFFA787DE9D3C';
        const FUSION_BRAIN_SECRET_KEY = 'YOUR_SECRET_KEY'; // Replace with your secret key

        // DOM Elements
        const getEl = (id) => document.getElementById(id);
        const queryEl = (sel) => document.querySelector(sel);
        const queryAll = (sel) => document.querySelectorAll(sel);
        
        const tabButtons = queryAll('.tab-btn');
        const menuControls = getEl('menu-controls');
        const promoControls = getEl('promo-controls');
        const fileInput = getEl('file-input');
        const menuDropArea = getEl('menu-drop-area');
        const menuFileInfo = getEl('menu-file-info');
        const menuPreview = getEl('menu-preview');
        const downloadPngBtn = getEl('download-png-btn');
        const downloadPdfBtn = getEl('download-pdf-btn');
        const loadingOverlay = getEl('loading-overlay');
        const loadingText = getEl('loading-text');

        // State variables
        let currentTab = 'menu';
        let excelData = null;
        let logoImage = null;
        let menuBackgroundImage = null;
        let promoImage = null;
        let gridImages = {}; // To store uploaded images for grid cells by index
        let currentGridImageInput = null; // To track which grid cell is uploading an image

        // Field aliases for Excel parsing
        const FIELD_ALIASES = {
            name: ['наименование', 'название', 'блюдо'],
            description: ['описание', 'состав'],
            price: ['цена', 'стоимость', 'с ндс', 'price'],
            category: ['категория', 'раздел'],
            image: ['фото', 'изображение', 'картинка', 'image'],
            s: ['s', 'small', 'маленький'],
            m: ['m', 'medium', 'средний'],
            l: ['l', 'large', 'большой'],
        };
        
        function init() {
            setupEventListeners();
            updateTab();
            renderMenu();
        }

        function setupEventListeners() {
            // Tabs
            tabButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    currentTab = this.dataset.tab;
                    updateTab();
                    renderMenu();
                });
            });

            // General Controls
            setupDropArea(menuDropArea, fileInput, menuFileInfo, loadExcelFile);
            getEl('logo-upload').addEventListener('change', (e) => handleImageUpload(e, (result) => { logoImage = result; getEl('logo-file-info').textContent = e.target.files[0].name; renderMenu(); }));
            getEl('menu-bg-upload').addEventListener('change', (e) => handleImageUpload(e, (result) => { menuBackgroundImage = result; renderMenu(); }));
            downloadPngBtn.addEventListener('click', downloadAsPNG);
            downloadPdfBtn.addEventListener('click', downloadAsPDF);
            
            // Menu Controls
            queryAll('input[name="layout-type"]').forEach(radio => radio.addEventListener('change', handleLayoutChange));
            getEl('show-description-checkbox').addEventListener('change', handleDescriptionToggle);
            getEl('grid-image-upload').addEventListener('change', handleGridImageSelected);
            
            // Promo Controls
            getEl('promo-background-upload').addEventListener('change', (e) => handleImageUpload(e, (result) => { promoImage = result; getEl('bg-file-info').textContent = e.target.files[0].name; renderMenu(); }));
            getEl('generate-bg-btn').addEventListener('click', generatePromoImage);

            // Universal render triggers
            const controlsToWatch = [
                'multiple-prices-checkbox', 'category-font-select', 'category-font-size', 'category-color-picker',
                'description-font-select', 'description-font-size', 'description-color-picker', 'price-font-select', 'price-font-size', 'price-color-picker',
                'menu-bg-color-picker', 'grid-cell-bg-color', 'promo-title-input', 'promo-text-input', 'promo-price-input',
                'promo-title-font-select', 'promo-text-font-select', 'promo-price-font-select', 'promo-title-color-picker',
                'promo-text-color-picker', 'promo-price-color-picker', 'promo-title-size', 'promo-text-size', 'promo-price-size',
                'bg-color-picker', 'promo-layout-select'
            ];
            controlsToWatch.forEach(id => getEl(id).addEventListener('input', renderMenu));
        }

        // --- Event Handlers ---

        function handleLayoutChange() {
            const layout = queryEl('input[name="layout-type"]:checked').value;
            getEl('list-settings').style.display = layout === 'list' ? 'block' : 'none';
            getEl('grid-settings').style.display = layout === 'grid' ? 'block' : 'none';
            renderMenu();
        }

        function handleDescriptionToggle() {
            const show = getEl('show-description-checkbox').checked;
            getEl('description-settings-group').style.display = show ? 'block' : 'none';
            renderMenu();
        }

        function handleImageUpload(e, callback) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => callback(event.target.result);
                reader.readAsDataURL(e.target.files[0]);
            }
        }
        
        function handleGridImageUpload(index) {
            currentGridImageInput = index;
            getEl('grid-image-upload').click();
        }

        function handleGridImageSelected(e) {
            if (e.target.files && e.target.files[0] && currentGridImageInput !== null) {
                handleImageUpload(e, (result) => {
                    gridImages[currentGridImageInput] = result;
                    renderMenu();
                    currentGridImageInput = null;
                });
            }
        }
        
        function setupDropArea(area, input, info, fileHandler) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => area.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(e => area.addEventListener(e, () => area.classList.add('highlight'), false));
            ['dragleave', 'drop'].forEach(e => area.addEventListener(e, () => area.classList.remove('highlight'), false));
            area.addEventListener('drop', (e) => {
                input.files = e.dataTransfer.files;
                if(input.files.length) {
                   info.textContent = input.files[0].name;
                   fileHandler(input.files[0]);
                }
            }, false);
            input.addEventListener('change', () => {
                 if(input.files.length) {
                   info.textContent = input.files[0].name;
                   fileHandler(input.files[0]);
                }
            });
        }
        
        // --- Data Processing ---

        function findHeader(headerRow, aliases) {
            for (const alias of aliases) {
                const header = headerRow.find(h => h.toString().toLowerCase().trim() === alias);
                if (header) return header;
            }
            return null;
        }

        function loadExcelFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                    if (json.length === 0) throw new Error("Excel file is empty.");
                    
                    const headers = Object.keys(json[0]);
                    const headerMap = {};
                    for (const key in FIELD_ALIASES) {
                        headerMap[key] = findHeader(headers, FIELD_ALIASES[key]);
                    }

                    excelData = json.map(row => {
                        const newItem = {};
                        for (const key in headerMap) {
                            if (headerMap[key]) {
                                newItem[key] = row[headerMap[key]];
                            }
                        }
                        return newItem;
                    });

                    gridImages = {}; // Reset grid images on new file
                    renderMenu();
                } catch (error) {
                    alert('Ошибка при чтении файла: ' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- AI Image Generation ---
        
        async function generatePromoImage() {
            const prompt = getEl('bg-prompt').value.trim();
            if (!prompt) {
                alert('Введите описание для генерации изображения.');
                return;
            }
            if (FUSION_BRAIN_SECRET_KEY === 'YOUR_SECRET_KEY') {
                alert('Пожалуйста, введите ваш Secret Key для FusionBrain API в коде index.html');
                return;
            }

            loadingText.textContent = 'Запрос на генерацию...';
            loadingOverlay.style.display = 'flex';

            const API_URL = 'https://api.fusionbrain.ai/web/api/v1/text2image/run';
            const CHECK_URL = 'https://api.fusionbrain.ai/web/api/v1/text2image/status/';

            try {
                // 1. Get Model ID
                const modelResp = await fetch('https://api.fusionbrain.ai/web/api/v1/models', {
                    method: 'GET',
                    headers: { 'X-Key': `Key ${FUSION_BRAIN_API_KEY}`, 'X-Secret': `Secret ${FUSION_BRAIN_SECRET_KEY}` }
                });
                const models = await modelResp.json();
                if (!models || models.length === 0) throw new Error('Could not fetch models.');
                const modelId = models[0].id;

                // 2. Run Generation
                const params = new FormData();
                params.append('model_id', modelId);
                params.append('prompt', prompt);

                const runResp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'X-Key': `Key ${FUSION_BRAIN_API_KEY}`, 'X-Secret': `Secret ${FUSION_BRAIN_SECRET_KEY}` },
                    body: params
                });
                const runData = await runResp.json();
                if (runData.error || !runData.uuid) throw new Error(runData.message || 'Failed to start generation.');
                
                const uuid = runData.uuid;
                loadingText.textContent = 'Изображение генерируется...';

                // 3. Check Status
                for (let i = 0; i < 30; i++) { // Poll for ~2.5 minutes
                    await new Promise(resolve => setTimeout(resolve, 5000));
                    const checkResp = await fetch(CHECK_URL + uuid, {
                        method: 'GET',
                        headers: { 'X-Key': `Key ${FUSION_BRAIN_API_KEY}`, 'X-Secret': `Secret ${FUSION_BRAIN_SECRET_KEY}` }
                    });
                    const statusData = await checkResp.json();
                    
                    if (statusData.status === 'DONE') {
                        promoImage = `data:image/jpeg;base64,${statusData.images[0]}`;
                        getEl('bg-file-info').textContent = "Сгенерировано AI: " + prompt.substring(0, 20) + '...';
                        renderMenu();
                        return;
                    } else if (statusData.status === 'FAIL') {
                        throw new Error(statusData.errorDescription || 'Generation failed.');
                    }
                }
                 throw new Error('Generation timed out.');
            } catch (error) {
                console.error('Ошибка генерации фона:', error);
                alert('Произошла ошибка при генерации: ' + error.message);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }
        
        // --- Rendering Logic ---
        
        function updateTab() {
            tabButtons.forEach(b => b.classList.remove('active'));
            queryEl(`.tab-btn[data-tab="${currentTab}"]`).classList.add('active');
            menuControls.style.display = (currentTab === 'menu' || currentTab === 'combined') ? 'block' : 'none';
            promoControls.style.display = (currentTab === 'promo' || currentTab === 'combined') ? 'block' : 'none';
        }

        function formatPrice(price) {
            if (!price) return '';
            const num = parseFloat(String(price).replace(/[^0-9.,]/g, '').replace(',', '.'));
            return isNaN(num) ? price : num.toFixed(0) + ' ₽';
        }
        
        function renderHeader() {
            const date = new Date();
            const dateString = date.toLocaleDateString('ru-RU', { day: '2-digit', month: 'long', year: 'numeric' });
            return `
                <div class="menu-board-header">
                    ${logoImage ? `<img src="${logoImage}" alt="Логотип" class="menu-board-logo">` : '<div></div>'}
                    <div class="menu-board-date">${dateString}</div>
                </div>
            `;
        }

        function renderMenuItem(item) {
            const showDesc = getEl('show-description-checkbox').checked;
            const useVolumePrices = getEl('multiple-prices-checkbox').checked;
            
            let priceHtml = '';
            const volumePrices = ['s', 'm', 'l'].map(vol => item[vol] ? `<span class="volume-price">${vol.toUpperCase()}: ${formatPrice(item[vol])}</span>` : '').join('');
            
            if (useVolumePrices && volumePrices) {
                priceHtml = volumePrices;
            } else {
                priceHtml = formatPrice(item.price);
            }

            return `
                <div class="menu-item">
                    <div class="item-content">
                        <div class="item-name">${item.name || ''}</div>
                        ${(showDesc && item.description) ? `<div class="item-description">${item.description}</div>` : ''}
                    </div>
                    <div class="item-price">${priceHtml}</div>
                </div>
            `;
        }
        
        function renderMenuList() {
            if (!excelData) return '<div>Загрузите файл с меню.</div>';
            const categories = [...new Set(excelData.map(item => item.category || 'Основное меню'))];
            let html = '';
            categories.forEach(category => {
                html += `<div class="menu-section"><div class="section-title">${category}</div>`;
                excelData.filter(item => (item.category || 'Основное меню') === category)
                         .forEach(item => { html += renderMenuItem(item); });
                html += `</div>`;
            });
            return `<div class="menu-content">${html}</div>`;
        }

        function renderMenuGrid() {
            if (!excelData) return '<div>Загрузите файл с меню.</div>';
            const gridItems = excelData.slice(0, 4);
            const bgColor = getEl('grid-cell-bg-color').value;

            let html = gridItems.map((item, index) => {
                const imageSrc = gridImages[index] || item.image || null;
                const showDesc = getEl('show-description-checkbox').checked;
                
                return `
                    <div class="grid-cell" style="background-color: ${bgColor};">
                        <div class="grid-cell-content">
                            <div>
                                <div class="item-name">${item.name || ''}</div>
                                ${(showDesc && item.description) ? `<div class="item-description">${item.description}</div>` : ''}
                            </div>
                            <div class="item-price">${formatPrice(item.price)}</div>
                        </div>
                        <div class="grid-cell-image-wrapper">
                           ${imageSrc 
                               ? `<img src="${imageSrc}" class="grid-cell-image" alt="${item.name}">`
                               : `<button class="upload-image-btn" onclick="handleGridImageUpload(${index})">+</button>`
                           }
                        </div>
                    </div>
                `;
            }).join('');
            
            return `<div class="grid-container">${html}</div>`;
        }

        function renderMenuBody(isCombined = false) {
             const layout = queryEl('input[name="layout-type"]:checked').value;
             let menuHtml = '';

             if (layout === 'grid') {
                 menuHtml = renderMenuGrid();
             } else {
                 menuHtml = renderMenuList();
             }
             
             // In combined view, the grid image needs a different class for sizing
             if (isCombined) {
                 menuHtml = menuHtml.replace(/grid-cell-image-wrapper/g, 'grid-cell-image-wrapper combined-view');
             }

             return `<div class="menu-board-body">${menuHtml}</div>`;
        }

        function renderPromoBody() {
            const layout = getEl('promo-layout-select').value;
            const title = getEl('promo-title-input').value;
            const text = getEl('promo-text-input').value;
            const price = getEl('promo-price-input').value;

            const contentHtml = `
                <div class="promo-content">
                    ${title ? `<div class="promo-title">${title}</div>` : ''}
                    ${text ? `<div class="promo-text">${text}</div>` : ''}
                    ${price ? `<div class="promo-price">${formatPrice(price)}</div>` : ''}
                </div>`;
            
            const imageHtml = promoImage ? `
                <div class="promo-image-container">
                    <img src="${promoImage}" class="promo-image" alt="Акция">
                </div>` : '';
            
            return `<div class="promo-template layout-${layout}">${imageHtml}${contentHtml}</div>`;
        }
        
        function applyStyles() {
            const root = document.documentElement.style;
            root.setProperty('--category-font-size', getEl('category-font-size').value + 'px');
            root.setProperty('--category-font-color', getEl('category-color-picker').value);
            root.setProperty('--font-category', getEl('category-font-select').value);
            root.setProperty('--description-font-size', getEl('description-font-size').value + 'px');
            root.setProperty('--description-font-color', getEl('description-color-picker').value);
            root.setProperty('--font-description', getEl('description-font-select').value);
            root.setProperty('--price-font-size', getEl('price-font-size').value + 'px');
            root.setProperty('--price-font-color', getEl('price-color-picker').value);
            root.setProperty('--font-price', getEl('price-font-select').value);

            root.setProperty('--promo-title-font-size', getEl('promo-title-size').value + 'px');
            root.setProperty('--promo-text-font-size', getEl('promo-text-size').value + 'px');
            root.setProperty('--promo-price-font-size', getEl('promo-price-size').value + 'px');
            
            // Set promo text colors directly in style tags for higher specificity against global rules
            const promoTitle = queryEl('.promo-title');
            if(promoTitle) promoTitle.style.color = getEl('promo-title-color-picker').value;
            const promoText = queryEl('.promo-text');
            if(promoText) promoText.style.color = getEl('promo-text-color-picker').value;
            const promoPrice = queryEl('.promo-price');
            if(promoPrice) promoPrice.style.color = getEl('promo-price-color-picker').value;
        }

        function renderMenu() {
            menuPreview.innerHTML = ''; // Clear previous content
            
            let finalHtml = '';
            let menuBgStyle = '';
            
            if (menuBackgroundImage) {
                menuBgStyle = `background-image: url(${menuBackgroundImage}); background-size: cover; background-position: center;`;
            } else {
                menuBgStyle = `background-color: ${getEl('menu-bg-color-picker').value};`;
            }

            if (currentTab === 'menu') {
                finalHtml = `
                    <div class="menu-board-content-wrapper" style="${menuBgStyle}">
                        ${renderHeader()}
                        ${renderMenuBody()}
                    </div>
                `;
            } else if (currentTab === 'promo') {
                const promoBgColor = getEl('bg-color-picker').value;
                finalHtml = `
                    <div class="menu-board-content-wrapper" style="background-color: ${promoBgColor};">
                        ${renderPromoBody()}
                    </div>
                `;
            } else if (currentTab === 'combined') {
                const promoBgColor = getEl('bg-color-picker').value;
                finalHtml = `
                    <div class="combined-template">
                        <div class="combined-menu-part" style="${menuBgStyle}">
                            ${renderHeader()}
                            ${renderMenuBody(true)}
                        </div>
                        <div class="combined-promo-part" style="background-color: ${promoBgColor};">
                           ${renderPromoBody()}
                        </div>
                    </div>
                `;
            } else {
                 finalHtml = `<div>Выберите режим</div>`;
            }

            menuPreview.innerHTML = finalHtml;
            applyStyles();
        }
        
        // --- Saving/Exporting ---
        function downloadAsPNG() {
            const element = getEl('menu-preview');
            html2canvas(element, { backgroundColor: null, scale: 2, useCORS: true }).then(canvas => {
                canvas.toBlob(function(blob) {
                    saveAs(blob, 'menuboard.jpeg');
                }, 'image/jpeg', 0.95);
            });
        }
            
        function downloadAsPDF() {
            const { jsPDF } = window.jspdf;
            const element = getEl('menu-preview');
            
            html2canvas(element, {backgroundColor: null, scale: 2, useCORS: true}).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });
                
                pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
                pdf.save('menuboard.pdf');
            });
        }

        init();
    });
    </script>
</body>
