<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            
            --primary-color: #00b398;
            --secondary-color: #f8f9fa;
            --accent-color: #e74c3c;
            --bg-color: #fff;
            --menu-bg-color: #fff;
            --menu-text-color: #667099;
            --menu-text-light: #8e8e9e;
            --font-main: 'Roboto', sans-serif;
            --font-heading: 'Roboto', sans-serif;
            --text-align: left;
            --section-font-size: 24px;
            --item-name-font-size: 16px;
            --item-desc-font-size: 14px;
            --item-price-font-size: 16px;
            --promo-title-font-size: 180px; /* Increased */
            --promo-text-font-size: 30px;
            --promo-price-font-size: 100px; /* Increased */
            --divider-color: #eee;
            --category-font-color: #00b398;
            --category-font-size: 24px;
            --item-font-color: #667099;
            --item-font-size: 16px;
            --description-font-size: 14px; /* New */
            --description-font-color: #8e8e9e; /* New */
            --font-description: 'Roboto', sans-serif; /* New */
            --cell-bg-color: #ffffff; /* New for 2x2 grid */
            --menu-overall-bg-color: #f5f5f5; /* New for 2x2 grid */

        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-main);
            color: var(--text-color);
            background-color: #f5f5f5;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee; /* Added border */
            padding-top: 5vh; /* Added top margin */
            position: relative;
        }
        
        .header-logo {
            width: 85px;
            height: 22px;
            margin-right:20px;
            object-fit: initial;
        }

        .header-date {
            margin-left: auto;
            font-size: 14px;
            color: var(--text-color);
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #3d435c;
            margin: 0;
            margin-bottom: 15px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            height: calc(100% - 120px);
        }
        
        .controls-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0px 0px rgba(0,0,0,0.1);
            width: 350px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .controls-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .controls-footer {
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: auto;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 10px;
            border-bottom: 0px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 0;
        }
        
        .tab-btn {
            display: flex;
            align-items: center;
            padding: 10px 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 0px ;
            transition: all 0.3s;
        }

        .tab-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .tab-btn.active {
            border-bottom: 0px solid var(--active-color);
            color: var(--active-color);
        }
        
        .control-group {
            margin-bottom: 0px;
            padding-bottom: 10px;
            border-bottom:0px solid #eee;
        }
        
        .control-group:last-child {
            border-bottom: none;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .checkbox-group input {
            margin-right: 10px;
        }
        
        .btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background: var(--button-hover);
        }
        
        .btn-secondary {
            background: none;
            color: var(--text-color);
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
            background-color: var(--input-bg);
        }
        
        .select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
           border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background: transparent;
            margin-bottom: 10px;
        }

        .setting-row {
            display: grid;
            grid-template-columns: 1fr 1fr 20px;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-row label {
            grid-column: 1 / -1;
        }
        
        .color-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .color-option {
            display: flex;
            flex-direction: column;
        }
        
        .color-option label {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .preview-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .preview-container {
            background: white;
            border-radius: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            box-shadow: none; /* Убрана тень */
            background-color: transparent; /* Сделан прозрачным */
        }
        
        .preview-actions {
            padding: 15px;
            background: transparent;
            border-top: 0px solid #eee;
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .menu-preview {
            flex: 1;
            padding: 20px;
            position: relative;
            background-color: var(--menu-overall-bg-color, white); /* Default gray */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            aspect-ratio: 16 / 9; /* Set aspect ratio */
            width: 100%; /* Ensure it takes full width */
            max-width: 1920px; /* Target width */
            max-height: 1080px; /* Target height */
        }
        
        /* Стили для шаблона меню */
        .menu-content {
            width: 100%;
            height: 100%; /* Take full height */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background-color: var(--menu-overall-bg-color, #f5f5f5); /* Default gray */
        }

        .menu-logo-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .menu-logo {
            max-width: 80px;
            max-height: 80px;
            object-fit: contain;
            margin-right: 15px;
        }

        .menu-date {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            color: var(--menu-text-light);
            z-index: 10;
        }
        
        .menu-header {
            margin-bottom: 30px;
            text-align: var(--text-align);
            padding-top: 100px; /* Space for logo/date */
        }
        
        .menu-title {
            font-family: var(--font-heading);
            font-size: var(--title-font-size);
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .menu-subtitle {
            font-size: var(--subtitle-font-size);
            color: var(--menu-text-light);
        }
        
        .menu-items-container {
            flex: 1;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 0 20px 20px; /* Adjust padding for content */
        }

        .menu-items-container.two-columns {
            grid-template-columns: 1fr 1fr;
        }

        .menu-items-container.grid-2x2 {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }
        
        .menu-items-scroll {
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .menu-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-family: var(--font-category); /* Now applies to "Заголовок" */
            font-size: var(--category-font-size);
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--divider-color);
            color: var(--category-font-color);
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--divider-color);
            color: var(--item-font-color);
        }

        .menu-item.grid-item {
            display: flex;
            flex-direction: row; /* Changed to row for image right */
            align-items: stretch; /* Stretch items vertically */
            background-color: var(--cell-bg-color, white); /* Cell background color */
            border-radius: 8px;
            padding: 15px;
            overflow: hidden;
        }

        .grid-item .item-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pushes price to bottom */
            flex-grow: 1;
            padding-right: 15px; /* Space for image */
        }

        .grid-item .item-name {
            font-family: var(--font-category); /* Name uses category font */
            font-size: var(--category-font-size);
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--category-font-color);
        }

        .grid-item .item-description {
            font-family: var(--font-description); /* New description font */
            font-size: var(--description-font-size);
            color: var(--description-font-color);
            margin-bottom: 5px;
        }
        
        .grid-item .item-price {
            font-family: var(--font-item); /* Price uses item font */
            font-weight: 700;
            font-size: var(--item-font-size);
            white-space: nowrap;
            text-align: left; /* Align to bottom left */
            margin-top: auto; /* Push to bottom */
            min-width: unset;
        }

        .grid-item-image-container {
            width: 50%; /* 100x50% */
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .combined-grid-item .grid-item-image-container {
            width: 80%; /* 100x80% for combined */
        }

        .grid-item-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .image-upload-btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .item-content {
            flex-grow: 1;
        }
        
        .item-name {
            font-family: var(--font-category); /* Now category font */
            font-weight: 500;
            font-size: var(--category-font-size); /* Now category font size */
            margin-bottom: 5px;
            color: var(--category-font-color);
        }
        
        .item-description {
            font-family: var(--font-description); /* New description font */
            font-size: var(--description-font-size);
            color: var(--description-font-color);
            margin-bottom: 5px;
        }
        
        .item-price {
            font-family: var(--font-item); /* Now item font */
            font-weight: 700;
            font-size: var(--item-font-size); /* Now item font size */
            white-space: nowrap;
            margin-left: 20px;
            text-align: right;
            min-width: 80px;
        }
        
        .volume-price {
            display: inline;
            font-size: 14px;
            color: var(--menu-text-light);
            margin-left: 5px;
        }
        
        .volume-price:first-child {
            margin-left: 0;
        }
        
        /* Стили для шаблона "Акция" */
        .promo-template {
            color: white;
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1920px; /* Target width */
            max-height: 1080px; /* Target height */
            overflow: hidden;
            display: flex;
            flex-direction: column; /* Allow content to flow vertically */
            justify-content: center; /* Center content vertically */
            align-items: center; /* Center content horizontally */
        }

        .promo-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            text-align: left;
            justify-content: center;
            align-items: flex-start; /* Default align to left */
            width: 100%;
        }

        .promo-content.align-center {
            align-items: center;
            text-align: center;
        }

        .promo-content.align-right {
            align-items: flex-end;
            text-align: right;
        }

        .promo-image-container {
            width: 100%;
            height: auto;
            max-height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .promo-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .promo-header {
            margin-bottom: 30px;
            text-align: inherit; /* Inherit from promo-content */
        }

        .promo-title {
            font-size: var(--promo-title-font-size);
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .promo-text {
            font-size: var(--promo-text-font-size);
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .promo-price {
            font-size: var(--promo-price-font-size);
            font-weight: bold;
            margin-top: 20px;
        }

        /* Стили для комбинированного шаблона */
        .combined-template {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            max-width: 1920px;
            max-height: 1080px;
            overflow: hidden;
        }
        
        .combined-menu-part {
            padding: 30px;
            background: var(--menu-bg-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .combined-menu-scroll {
            height: 100%;
            overflow-y: auto;
        }

        .combined-menu-part .menu-logo-container {
            position: relative; /* Adjust position for combined */
            top: 0;
            left: 0;
            margin-bottom: 20px;
        }
        
        .combined-promo-part {
            position: relative;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .combined-promo-content {
            position: relative;
            z-index: 2;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            text-align: left;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
        }

        .combined-promo-content.align-center {
            align-items: center;
            text-align: center;
        }

        .combined-promo-content.align-right {
            align-items: flex-end;
            text-align: right;
        }

        .combined-promo-part .promo-image-container {
            max-height: 40%; /* Adjusted for combined layout */
        }
        
        /* Стили для генерации фона */
        .bg-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bg-option-btn {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            background: white;
        }

        .bg-option-btn.active {
            background: var(--active-color);
            color: white;
            border-color: var(--active-color);
        }

        .prompt-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
        }

        .generate-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        
        /* Загрузочный экран */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 24px;
            flex-direction: column;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--active-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            
            .controls-panel {
                width: 100%;
            }
            
            .combined-template {
                grid-template-columns: 1fr;
            }
        }
        
        /* Drag and drop стили */
        .drop-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: var(--input-bg);
        }
        
        .drop-area:hover {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.05);
        }
        
        .drop-area.highlight {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.1);
        }
        
        .file-info {
            font-size: 12px;
            color: var(--menu-text-light);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo" id="header-logo-preview" style="display: none;">
        <input type="file" id="logo-upload" accept="image/*" style="display: none;">
        <h1 class="header-title">Генератор менюборда</h1>
        <span class="header-date" id="header-date"></span>
    </div>
    
    <div class="main-container">

        <div class="controls-panel">

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu">
                    <img src="menu.svg" alt="Меню"> Меню
                </button>
                <button class="tab-btn" data-tab="promo">
                    <img src="acii.svg" alt="Акция"> Акция
                </button>
                <button class="tab-btn" data-tab="combined">
                    <img src="2v1.svg" alt="2 в 1"> 2в1
                </button>
            </div>

            <div class="controls-content">
                <div id="menu-controls">
                    <div class="control-group">
                        <label>Загрузка данных:</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл Excel с меню сюда или
                            <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display: none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="multiple-prices-checkbox">
                            <label for="multiple-prices-checkbox">Использовать цены для объемов (S/M/L)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Загрузка логотипа:</label>
                        <button class="btn btn-secondary" onclick="document.getElementById('logo-upload').click()">Загрузить лого</button>
                        <div class="file-info" id="logo-file-info">Логотип не загружен</div>
                    </div>
                    
                    <div class="control-group">
                        <label>Верстка меню:</label>
                        <select id="menu-layout-select" class="select">
                            <option value="list">Список</option>
                            <option value="grid-2x2">Таблица 2x2</option>
                        </select>
                    </div>

                    <div class="control-group" id="menu-overall-bg-settings" style="display: none;">
                        <label>Фон всего блока меню:</label>
                        <div class="bg-options">
                            <button class="bg-option-btn active" data-type="color">Цвет</button>

            function setupDropArea(dropArea, fileInput, fileInfo, handler) {
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    dropArea.addEventListener(eventName, preventDefaults, false);
                });
                
                function preventDefaults(e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                
                ['dragenter', 'dragover'].forEach(eventName => {
                    dropArea.addEventListener(eventName, highlight, false);
                });
                
                ['dragleave', 'drop'].forEach(eventName => {
                    dropArea.addEventListener(eventName, unhighlight, false);
                });
                
                function highlight() {
                    dropArea.classList.add('highlight');
                }
                
                function unhighlight() {
                    dropArea.classList.remove('highlight');
                }
                
                dropArea.addEventListener('drop', handleDrop, false);
                
                function handleDrop(e) {
                    const dt = e.dataTransfer;
                    const files = dt.files;
                    if (files.length) {
                        fileInput.files = files;
                        handler(files);
                    }
                }
                
                fileInput.addEventListener('change', function() {
                    if (this.files.length) {
                        handler(this.files);
                    }
                });
            }

            function handleMenuFile(files) {
                const file = files[0];
                menuFileInfo.textContent = file.name;

            }

                    } else {

                    }
                }
            }
            
            function loadExcelFile(file) {
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);
                        
                        excelData = jsonData;
                        renderMenu();
                    } catch (error) {
                        alert('Ошибка при чтении файла: ' + error.message);
                    }
                };
                reader.onerror = function() {
                    alert('Ошибка при чтении файла');
                };
                reader.readAsArrayBuffer(file);
            }

            // Function to normalize column names
            function getColumnValue(item, possibleNames) {
                for (const name of possibleNames) {
                    if (item[name] !== undefined) {
                        return item[name];
                    }
                }
                return undefined;
            }
            
            function formatPrice(price) {
                if (!price) return '';
                const num = parseFloat(price);
                return isNaN(num) ? price : num.toFixed(0) + ' ₽';
            }
            
            function getVolumePrices(item) {
                const volumes = ['S', 'M', 'L'];
                let pricesHtml = '';
                let hasVolumePrices = false;
                
                volumes.forEach(vol => {
                    const price = getColumnValue(item, [`Цена ${vol}`, `Стоимость ${vol}`, `${vol}`]);
                    if (price && !isNaN(parseFloat(price))) {
                        pricesHtml += `<span class="volume-price">${vol}: ${formatPrice(price)}</span>`;
                        hasVolumePrices = true;
                    }
                });
                
                return hasVolumePrices ? pricesHtml : '';
            }
            
            async function generateBackground() {
                const prompt = bgPromptInput.value.trim();
                if (!prompt) {
                    alert('Введите описание для генерации фона');
                    return;
                }
                
                loadingOverlay.style.display = 'flex';
                loadingOverlay.querySelector('div').textContent = 'Генерация фона...';

                try {
                    const response = await fetch(FUSIONBRAIN_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${FUSIONBRAIN_API_KEY}`
                        },
                        body: JSON.stringify({
                            inputs: prompt
                        })
                    });

                    if (!response.ok) {
                        const errorText = await response.text();

            async function downloadAsPNG() {
                // Set the specific dimensions for 16:9
                const targetWidth = 1920;
                const targetHeight = 1080;

                html2canvas(menuPreview, {
                    backgroundColor: null, 
                    scale: 2, // Capture at higher resolution
                    width: targetWidth,
                    height: targetHeight,
                    useCORS: true // Important for images loaded from different origins (AI generated, external URLs)
                }).then(canvas => {
                    // Create a new canvas to ensure exact dimensions
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = targetWidth;
                    finalCanvas.height = targetHeight;
                    const ctx = finalCanvas.getContext('2d');
                    ctx.drawImage(canvas, 0, 0, targetWidth, targetHeight);

                    finalCanvas.toBlob(function(blob) {
                        saveAs(blob, 'menuboard.jpeg'); // Changed to JPEG
                    }, 'image/jpeg', 1.0); // Save as JPEG with quality 1.0
                });
            }
            
            async function downloadAsPDF() {
                const { jsPDF } = window.jspdf;
                const targetWidth = 1920;
                const targetHeight = 1080;

                html2canvas(menuPreview, {
                    backgroundColor: null, 
                    scale: 2, // Capture at higher resolution
                    width: targetWidth,
                    height: targetHeight,
                    useCORS: true
                }).then(canvas => {
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = targetWidth;
                    finalCanvas.height = targetHeight;
                    const ctx = finalCanvas.getContext('2d');
                    ctx.drawImage(canvas, 0, 0, targetWidth, targetHeight);

                    const imgData = finalCanvas.toDataURL('image/jpeg', 1.0); // Changed to JPEG
                    
                    // A4 dimensions: 210mm x 297mm. For landscape (16:9 like), reverse: 297mm x 210mm
                    const pdf = new jsPDF({
                        orientation: 'landscape',
                        unit: 'mm',
                        format: [297, 210] // A4 landscape
                    });
                    
                    const imgProps = pdf.getImageProperties(imgData);
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width; // Maintain aspect ratio
                    
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight); // Changed to JPEG
                    pdf.save('menuboard.pdf');
                });
            }

            function updateDate() {
                const today = new Date();
                const options = { day: '2-digit', month: 'long', year: 'numeric' };
                headerDate.textContent = today.toLocaleDateString('ru-RU', options);
            }

            window.handleGridImageUpload = function(event, index) {
                if (event.target.files && event.target.files[0]) {
                    const file = event.target.files[0];
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        // Find the corresponding image element and update its src
                        const menuItemElement = document.querySelectorAll('.menu-item.grid-item')[index];
                        if (menuItemElement) {
                            let imgElement = menuItemElement.querySelector('.grid-item-image');
                            if (!imgElement) {
                                imgElement = document.createElement('img');
                                imgElement.className = 'grid-item-image';
                                menuItemElement.querySelector('.grid-item-image-container').innerHTML = ''; // Clear '+' button
                                menuItemElement.querySelector('.grid-item-image-container').appendChild(imgElement);
                            }
                            imgElement.src = e.target.result;
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };
