<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор менюборда</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&family=Oswald:wght@400;700&family=Raleway:wght@400;700&family=PT+Sans:wght@400;700&family=Inter:wght@400;600&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">

  <!-- Libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js"></script>

  <style>
    :root {
      --primary: #00b398;
      --primary-hover: #008f79;
      --primary-active: #005c4e;
      --primary-light: #e0f2f0;
      --text-main: #1A1D1F;
      --text-secondary: #3d435c;
      --text-inactive: #667099;
      --border: #e8e8f0;
      --background-light: #f6f6f9;
      --background-dark: #f0f0f5;
      --placeholder: #9A9FA5;
      --border-radius: 12px;
      --transition-medium: 0.3s;
    }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      color: var(--text-main);
      background: #f5f5f5;
      overflow: hidden;
    }
    .zvuk-button {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      border-radius: var(--border-radius);
      padding: 10px 16px;
      cursor: pointer;
      transition: all var(--transition-medium);
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .zvuk-button--primary { background: var(--primary); color:#fff; }
    .zvuk-button--primary:hover { background: var(--primary-hover); }
    .zvuk-button--secondary { background: var(--background-light); color: var(--text-secondary); border:1px solid var(--border); }
    .zvuk-input, .zvuk-select {
      font-size: 14px; padding: 8px 12px;
      border: 2px solid var(--border); border-radius: var(--border-radius);
      background: var(--background-light); width: 100%; margin-bottom: 12px;
    }
    .main-header {
      position: fixed; top:0; left:0; width:100%; height:60px;
      background: url("banner-adv.webp") no-repeat center/cover;
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 20px; z-index:100;
    }
    .main-header img { height:40px; }
    .header-actions { display:flex; gap:10px; }
    .ratio-popup {
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:2000;
    }
    .ratio-popup-content {
      background:#fff;padding:20px;border-radius:12px;text-align:center;width:300px;
    }
    .ratio-options button { margin:6px 0;width:100%; }
    .preview-logo {position:absolute;top:10px;left:10px;max-width:120px;}
    .preview-date {position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.7);padding:4px 8px;border-radius:6px;font-size:14px;}
    .loading-overlay {position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:3000;display:none;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-direction:column;}
  </style>
</head>
<body>
  <!-- Хедер -->
  <header class="main-header">
    <img src="logo.png" alt="Логотип">
    <div class="header-actions">
      <a href="https://zvuk-b2b.com" class="zvuk-button zvuk-button--primary">Попробовать сервис</a>
      <a href="https://app.zvuk-b2b.com" class="zvuk-button zvuk-button--secondary">Вход в ЛК</a>
    </div>
  </header>

  <!-- Попап выбора пропорций -->
  <div class="ratio-popup" id="ratio-popup">
    <div class="ratio-popup-content">
      <h3>Выберите пропорции превью</h3>
      <div class="ratio-options">
        <button class="zvuk-button zvuk-button--primary" data-ratio="16:9" data-w="1920" data-h="1080">16:9 (1920×1080)</button>
        <button class="zvuk-button zvuk-button--primary" data-ratio="9:16" data-w="1080" data-h="1920">9:16 (1080×1920)</button>
        <button class="zvuk-button zvuk-button--primary" data-ratio="4:3" data-w="1600" data-h="1300">4:3 (1600×1300)</button>
        <button class="zvuk-button zvuk-button--primary" data-ratio="3:2" data-w="1920" data-h="1280">3:2 (1920×1280)</button>
      </div>
    </div>
  </div>

  <!-- Основной контейнер -->
  <div class="main-container" style="margin-top:60px; display:flex; height:calc(100vh - 60px);">
    <div class="controls-panel" style="width:300px; background:#fff; padding:16px;">
      <h1>Генератор менюборда</h1>
      <label>Загрузить логотип</label>
      <input type="file" id="logo-upload" class="zvuk-input" accept="image/*">
    </div>
    <div class="preview-wrapper" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <div class="preview-container" id="preview-container" style="position:relative;width:100%;height:100%;background:#ccc;">
        <div id="menu-preview" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
          <p>Здесь будет превью меню</p>
        </div>
      </div>
      <div class="preview-actions" style="margin-top:10px;display:flex;gap:10px;">
        <button class="zvuk-button zvuk-button--primary" id="download-jpeg">Сохранить JPEG</button>
        <button class="zvuk-button zvuk-button--secondary" id="download-pdf">Сохранить PDF</button>
        <button class="zvuk-button zvuk-button--primary" id="download-mp4">Сохранить MP4</button>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <p id="loading-text">Мы сохраняем видео файл, подождите...</p>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const ratioPopup = document.getElementById("ratio-popup");
  const preview = document.getElementById("menu-preview");
  let exportW=1920, exportH=1080;

  ratioPopup.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click",()=>{
      exportW=+btn.dataset.w; exportH=+btn.dataset.h;
      ratioPopup.style.display="none";
      document.getElementById("preview-container").style.aspectRatio=btn.dataset.ratio;
    });
  });

  const logoUpload=document.getElementById("logo-upload");
  let logoURL=null;
  logoUpload.addEventListener("change",e=>{
    if(e.target.files[0]){
      const r=new FileReader();
      r.onload=ev=>{ logoURL=ev.target.result; renderPreview(); }
      r.readAsDataURL(e.target.files[0]);
    }
  });

  function renderPreview(){
    preview.innerHTML="";
    if(logoURL){
      const img=document.createElement("img");
      img.src=logoURL; img.className="preview-logo";
      preview.appendChild(img);
    }
    const date=document.createElement("div");
    date.className="preview-date";
    date.innerText=new Date().toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"});
    preview.appendChild(date);
  }
  renderPreview();

  document.getElementById("download-jpeg").addEventListener("click",()=>{
    html2canvas(preview,{backgroundColor:null,scale:2,width:exportW,height:exportH}).then(canvas=>{
      canvas.toBlob(blob=>saveAs(blob,"menu.jpeg"),"image/jpeg");
    });
  });

  document.getElementById("download-pdf").addEventListener("click",()=>{
    html2canvas(preview,{backgroundColor:null,scale:2,width:exportW,height:exportH}).then(canvas=>{
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:"landscape",unit:"px",format:[exportW,exportH]});
      pdf.addImage(canvas.toDataURL("image/jpeg"),"JPEG",0,0,exportW,exportH);
      pdf.save("menu.pdf");
    });
  });

  // Экспорт MP4 с ffmpeg.wasm
  document.getElementById("download-mp4").addEventListener("click",async()=>{
    const overlay=document.getElementById("loading-overlay");
    overlay.style.display="flex";
    const canvas=await html2canvas(preview,{backgroundColor:null,scale:2,width:exportW,height:exportH});
    const stream=canvas.captureStream();
    const rec=new MediaRecorder(stream,{mimeType:"video/webm"});
    const chunks=[];
    rec.ondataavailable=e=>chunks.push(e.data);
    rec.onstop=async()=>{
      const webm=new Blob(chunks,{type:"video/webm"});
      const arrayBuffer=await webm.arrayBuffer();
      const ffmpeg=FFmpeg.createFFmpeg({log:true});
      await ffmpeg.load();
      ffmpeg.FS("writeFile","input.webm",new Uint8Array(arrayBuffer));
      await ffmpeg.run("-i","input.webm","-c:v","libx264","-pix_fmt","yuv420p","output.mp4");
      const data=ffmpeg.FS("readFile","output.mp4");
      const mp4Blob=new Blob([data.buffer],{type:"video/mp4"});
      saveAs(mp4Blob,"menu.mp4");
      overlay.style.display="none";
    };
    rec.start();
    setTimeout(()=>rec.stop(),3000); // 3 секунды видео
  });
});
</script>
</body>
</html>
