<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!-- libraries already used in project -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- ffmpeg.wasm (via CDN) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.7/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --accent-color: #e74c3c;
            --bg-color: #fff;
            --divider-color: #eee;
            --grid-bg-color: #f5f5f5;
            --cell-bg-color: rgba(255, 255, 255, 0.85);
        }
        * { box-sizing: border-box; margin:0; padding:0;}
        body { font-family: 'Roboto', sans-serif; color:var(--text-color); background-color:#f5f5f5; padding:20px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .header { display:flex; align-items:center; margin-bottom:5px; padding-bottom:15px; }
        .header-logo { width:85px; height:22px; margin-right:20px; object-fit:initial; }
        .header-title { font-size:20px; font-weight:600; color:#3d435c; margin:0; margin-bottom:15px; }
        .main-container { display:flex; flex:1; gap:20px; overflow:hidden; height:calc(100% - 120px); }
        .controls-panel { background:white; padding:20px; border-radius:8px; width:380px; display:flex; flex-direction:column; height:100%; }
        .controls-content { flex:1; overflow-y:auto; padding-right:10px; }
        .controls-footer { padding-top:15px; border-top:1px solid #eee; margin-top:auto; }
        .tab-buttons { display:flex; margin-bottom:10px; position:sticky; top:0; background:white; z-index:10; }
        .tab-btn { display:flex; align-items:center; padding:10px; background:none; border:none; cursor:pointer; font-weight:600; transition:all 0.3s; color:var(--text-color); }
        .tab-btn img { width:20px; height:20px; margin-right:8px; }
        .tab-btn.active { color:var(--active-color); }
        .control-group { margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #f0f0f0;}
        .control-group:last-child { border-bottom:none; }
        label { display:block; margin-bottom:8px; font-weight:500; font-size:14px; color:var(--text-color); }
        .checkbox-group { display:flex; align-items:center; margin-bottom:10px; }
        .checkbox-group input { margin-right:10px; }
        .btn { background:var(--button-color); color:var(--button-text); border:none; padding:10px 15px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:14px; transition:background 0.3s; width:100%; margin-bottom:10px; }
        .btn:hover { background:var(--button-hover); }
        .btn-secondary { background:none; color:var(--text-color); border:1px solid #ddd; }
        .btn-secondary:hover { background:#e0e0e0; }
        .input, .select { width:100%; padding:10px; border:1px solid var(--input-border); border-radius:4px; font-family:inherit; font-size:14px; margin-bottom:10px; background-color:var(--input-bg); }
        .setting-row { display:grid; grid-template-columns: 1fr 60px 30px; gap:10px; align-items:center; margin-bottom:10px; }
        .preview-wrapper { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .preview-container { width:100%; background:transparent; border-radius:8px; aspect-ratio:16/9; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        .preview-actions { padding:15px 0 0 0; display:flex; gap:10px; width:100%; max-width:600px; }
        .menu-preview { width:100%; height:100%; position:relative; background-color:var(--menu-bg-color, #eeeeee); display:flex; justify-content:center; align-items:center; overflow:hidden; }
        .menu-list-template { width:100%; height:100%; display:flex; flex-direction:column; padding:30px; overflow:hidden; }
        .menu-items-container { flex:1; overflow:hidden; display:grid; gap:20px 40px; }
        .menu-section { margin-bottom:30px; }
        .section-title { font-family:var(--category-font-family); font-size:var(--category-font-size); font-weight:700; margin-bottom:15px; padding-bottom:8px; border-bottom:2px solid var(--divider-color); color:var(--category-font-color); }
        .menu-item { display:flex; justify-content:space-between; margin-bottom:15px; padding-bottom:15px; border-bottom:1px dashed var(--divider-color); }
        .item-content { flex-grow:1; }
        .item-name { font-family:var(--item-font-family); font-weight:500; font-size:var(--item-font-size); color:var(--item-font-color); margin-bottom:5px; }
        .item-description { font-family:var(--desc-font-family); font-size:var(--desc-font-size); color:var(--desc-font-color); margin-bottom:5px; font-weight:300; }
        .item-price { font-family:var(--item-font-family); font-weight:700; font-size:var(--item-font-size); color:var(--item-font-color); white-space:nowrap; margin-left:20px; text-align:right; min-width:80px;}
        .menu-grid-template, .menu-grid-template-3x3 { width:100%; height:100%; display:grid; gap:15px; padding:15px; background-color:var(--grid-bg-color); }
        .menu-grid-template { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
        .menu-grid-template-3x3 { grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr; }
        .grid-cell { background-color:var(--cell-bg-color); backdrop-filter: blur(5px); border-radius:8px; padding:15px; display:grid; grid-template-columns:3fr 2fr; grid-template-rows:auto 1fr auto; gap:5px 15px; position:relative; overflow:hidden; }
        .grid-cell .item-name { grid-area:1/1/2/2; font-weight:700; }
        .grid-cell .item-description { grid-area:2/1/3/2; align-self:start; white-space:normal; overflow:hidden; }
        .grid-cell .item-price { grid-area:3/1/4/2; align-self:end; text-align:left; margin-left:0; }
        .grid-cell .item-photo-container { grid-area:1/2/4/3; position:relative; background:#f0f0f0; border-radius:4px; display:flex; justify-content:center; align-items:center; height:100%; }
        .grid-cell .item-photo { width:100%; height:100%; object-fit:cover; }
        .grid-cell .upload-photo-btn { font-size:30px; cursor:pointer; border:none; background:#e0e0e0; width:40px; height:40px; border-radius:50%; color:#888; }
        .promo-template { position:relative; width:100%; height:100%; overflow:hidden; background-size:cover; background-position:center; }
        .promo-content { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; padding:40px; box-sizing:border-box; text-align:left; color:white; }
        .promo-title { font-size:var(--promo-title-font-size); font-family:var(--promo-title-font-family); color:var(--promo-title-font-color); font-weight:700; margin-bottom:20px; line-height:1.1; }
        .promo-text { font-size:var(--promo-text-font-size); font-family:var(--promo-text-font-family); color:var(--promo-text-font-color); margin-bottom:30px; line-height:1.3; }
        .promo-price { font-size:var(--promo-price-font-size); font-family:var(--promo-price-font-family); color:var(--promo-price-font-color); font-weight:bold; margin-top:auto; }
        .combined-template { display:grid; grid-template-columns:1fr 1fr; width:100%; height:100%; overflow:hidden; }
        .combined-menu-part { overflow:hidden; position:relative; background-color:var(--menu-bg-color); }
        .combined-promo-part { position:relative; overflow:hidden; background-size:cover; background-position:center; }
        .combined-grid-active .combined-promo-part { display:grid; place-items:center; }
        .combined-grid-active .combined-promo-content { width:90%; height:90%; padding:30px; }
        .combined-promo-content { position:relative; z-index:2; padding:30px; height:100%; display:flex; flex-direction:column; text-align:left; color:white; }
        .loading-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:1000; color:white; font-size:24px; flex-direction:column; text-align:center; }
        .spinner { border:5px solid #f3f3f3; border-top:5px solid var(--active-color); border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin-bottom:20px; }
        @keyframes spin { 0%{ transform:rotate(0deg);} 100%{ transform:rotate(360deg);} }
        .drop-area { border:2px dashed #ccc; border-radius:8px; padding:20px; text-align:center; margin-bottom:15px; cursor:pointer; transition:all 0.3s; background-color:var(--input-bg); }
        .drop-area:hover, .drop-area.highlight { border-color:var(--active-color); background:rgba(0,179,152,0.1); }
        .file-info { font-size:12px; color:#8e8e9e; margin-top:5px; }
        .layout-buttons { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
        .layout-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; border:1px solid #ddd; border-radius:4px; cursor:pointer; transition:all 0.2s; background:var(--input-bg); font-size:12px; font-weight:500; }
        .layout-btn:hover { border-color:var(--active-color); background:rgba(0,179,152,0.1); }
        .layout-btn.active { border-color:var(--active-color); background:var(--active-color); color:white; }
        .layout-btn img { width:24px; height:24px; margin-bottom:5px; }
        .layout-btn.active img { filter:brightness(0) invert(1); }
        .color-picker-row { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; align-items:center; }
        .color-picker-item label { font-size:12px; text-align:center; }
        .color-picker-item input[type="color"] { width:100%; height:30px; padding:0; border:none; background:none; border-radius:4px; }
        .grid-color-item { display:none; }

        /* Modal for MP4 settings */
        .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:1500; }
        .modal { background:white; border-radius:8px; padding:20px; width:420px; max-width:90%; box-shadow:0 8px 30px rgba(0,0,0,0.3); }
        .modal h3 { margin-bottom:10px; font-size:18px; color:#333; }
        .modal .row { margin-bottom:12px; }
        .modal label { margin-bottom:6px; display:block; font-size:13px; color:#555; }
        .modal input[type="text"], .modal input[type="number"] { width:100%; padding:10px; border:1px solid #eee; border-radius:6px; font-size:14px; }
        .modal .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:10px; }
        .small-muted { font-size:12px; color:#888; margin-top:6px; }

        /* keep responsive behavior */
        @media (max-width:800px) {
            .main-container { flex-direction:column; height:auto; }
            .controls-panel { width:100%; height:auto; }
            .preview-wrapper { width:100%; margin-top:15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo">
    </div>

    <div class="main-container">

        <div class="controls-panel">
            <h1 class="header-title">Генератор менюборда</h1>

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu"><img src="menu.svg" alt="Меню"> Меню</button>
                <button class="tab-btn" data-tab="promo"><img src="acii.svg" alt="Акция"> Акция</button>
                <button class="tab-btn" data-tab="combined"><img src="2v1.svg" alt="2 в 1"> 2в1</button>
            </div>

            <div class="controls-content">
                <div id="menu-controls">
                    <div class="control-group">
                        <label>Загрузка данных:</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл Excel или
                            <button class="btn btn-secondary" style="width:auto; padding:5px 10px; margin:5px 0 0 0;" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display:none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Настройки верстки:</label>
                        <div class="layout-buttons" id="layout-buttons">
                           <button class="layout-btn active" data-layout="list">
                                <img src="menu.svg" alt="">
                                Список
                            </button>
                            <button class="layout-btn" data-layout="grid">
                                <img src="2v1.svg" alt="">
                                2x2
                            </button>
                            <button class="layout-btn" data-layout="grid3x3">
                                <img src="acii.svg" alt="">
                                3x3
                            </button>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="show-description-checkbox" checked>
                            <label for="show-description-checkbox">Показывать описание блюд</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="multiple-prices-checkbox">
                            <label for="multiple-prices-checkbox">Использовать цены для объемов (S/M/L)</label>
                        </div>
                    </div>

                     <div class="control-group">
                        <label>Цвета</label>
                        <div class="color-picker-row">
                            <div class="color-picker-item">
                                <label>Фон меню</label>
                                <input type="color" id="menu-bg-color-picker" value="#eeeeee">
                            </div>
                            <div class="color-picker-item grid-color-item">
                                <label>Фон сетки</label>
                                <input type="color" id="grid-bg-color-picker" value="#f5f5f5">
                            </div>
                            <div class="color-picker-item grid-color-item">
                                <label>Фон ячейки</label>
                                <input type="color" id="cell-bg-color-picker" value="#ffffff">
                            </div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт категорий:</label>
                        <div class="setting-row">
                            <select id="category-font-select" class="select"><option value="'Roboto', sans-serif">Roboto</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Open Sans', sans-serif">O
