<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            
            --primary-color: #00b398;
            --secondary-color: #f8f9fa;
            --accent-color: #e74c3c;
            --bg-color: #fff;
            --menu-bg-color: #fff;
            --menu-text-color: #667099;
            --menu-text-light: #8e8e9e;
            --font-main: 'Roboto', sans-serif;
            --font-heading: 'Roboto', sans-serif;
            --text-align: left;
            --section-font-size: 24px;
            --item-name-font-size: 16px;
            --item-desc-font-size: 14px;
            --item-price-font-size: 16px;
            --promo-title-font-size: 60px;
            --promo-text-font-size: 30px;
            --promo-price-font-size: 40px;
            --divider-color: #eee;
            --category-font-color: #00b398;
            --category-font-size: 24px;
            --item-font-color: #667099;
            --item-font-size: 16px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-main);
            color: var(--text-color);
            background-color: #f5f5f5;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 15px;
            border-bottom: 0px solid #eee;
        }
        
        .header-logo {
            width: 85px;
            height: 22px;
            margin-right:20px;
            object-fit: initial;
        }
        ≈
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #3d435c;
            margin: 0;
 margin-bottom: 15px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            height: calc(100% - 120px);
        }
        
        .controls-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0px 0px rgba(0,0,0,0.1);
            width: 350px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .controls-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .controls-footer {
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: auto;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 10px;
            border-bottom: 0px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 0;
        }
        
        .tab-btn {
            display: flex;
            align-items: center;
            padding: 10px 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 0px ;
            transition: all 0.3s;
        }

        .tab-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .tab-btn.active {
            border-bottom: 0px solid var(--active-color);
            color: var(--active-color);
        }
        
        .control-group {
            margin-bottom: 0px;
            padding-bottom: 10px;
            border-bottom:0px solid #eee;
        }
        
        .control-group:last-child {
            border-bottom: none;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .checkbox-group input {
            margin-right: 10px;
        }
        
        .btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background: var(--button-hover);
        }
        
        .btn-secondary {
            background: none;
            color: var(--text-color);
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
            background-color: var(--input-bg);
        }
        
        .select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
           border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background: transparent;
            margin-bottom: 10px;
        }

        .setting-row {
            display: grid;
            grid-template-columns: 1fr 1fr 20px;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-row label {
            grid-column: 1 / -1;
        }
        
        .color-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .color-option {
            display: flex;
            flex-direction: column;
        }
        
        .color-option label {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .preview-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .preview-container {
            background: white;
            border-radius: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            box-shadow: none; /* Убрана тень */
            background-color: transparent; /* Сделан прозрачным */
        }
        
        .preview-actions {
            padding: 15px;
            background: transparent;
            border-top: 0px solid #eee;
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .menu-preview {
            flex: 1;
            padding: 20px;
            position: relative;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Стили для шаблона меню */
        .menu-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        
        .menu-header {
            margin-bottom: 30px;
            text-align: var(--text-align);
        }
        
        .menu-title {
            font-family: var(--font-heading);
            font-size: var(--title-font-size);
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .menu-subtitle {
            font-size: var(--subtitle-font-size);
            color: var(--menu-text-light);
        }
        
        .menu-items-container {
            flex: 1;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .menu-items-container.two-columns {
            grid-template-columns: 1fr 1fr;
        }
        
        .menu-items-scroll {
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .menu-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-family: var(--font-category);
            font-size: var(--category-font-size);
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--divider-color);
            color: var(--category-font-color);
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--divider-color);
            color: var(--item-font-color);
        }
        
        .item-content {
            flex-grow: 1;
        }
        
        .item-name {
            font-family: var(--font-item);
            font-weight: 500;
            font-size: var(--item-font-size);
            margin-bottom: 5px;
        }
        
        .item-description {
            font-family: var(--font-item);
            font-size: 14px;
            color: var(--menu-text-light);
            margin-bottom: 5px;
        }
        
        .item-price {
            font-family: var(--font-item);
            font-weight: 700;
            font-size: var(--item-font-size);
            white-space: nowrap;
            margin-left: 20px;
            text-align: right;
            min-width: 80px;
        }
        
        .volume-price {
            display: inline;
            font-size: 14px;
            color: var(--menu-text-light);
            margin-left: 5px;
        }
        
        .volume-price:first-child {
            margin-left: 0;
        }
        
        /* Стили для шаблона "Акция" */
        .promo-template {
            color: white;
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 800px;
            overflow: hidden;
        }

        .promo-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            text-align: left;
        }

        .promo-header {
            margin-bottom: 30px;
            text-align: left;
        }

        .promo-title {
            font-size: var(--promo-title-font-size);
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .promo-text {
            font-size: var(--promo-text-font-size);
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .promo-price {
            font-size: var(--promo-price-font-size);
            font-weight: bold;
            margin-top: 20px;
        }

        /* Стили для комбинированного шаблона */
        .combined-template {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            max-width: 1000px;
            max-height: 800px;
            height: 100%;
            overflow: hidden;
        }
        
        .combined-menu-part {
            padding: 30px;
            background: var(--menu-bg-color);
            overflow: hidden;
        }
        
        .combined-menu-scroll {
            height: 100%;
            overflow-y: auto;
        }
        
        .combined-promo-part {
            position: relative;
            color: white;
            overflow: hidden;
        }
        
        .combined-promo-content {
            position: relative;
            z-index: 2;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        
        /* Стили для генерации фона */
        .bg-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bg-option-btn {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            background: white;
        }

        .bg-option-btn.active {
            background: var(--active-color);
            color: white;
            border-color: var(--active-color);
        }

        .prompt-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
        }

        .generate-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        
        /* Загрузочный экран */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 24px;
            flex-direction: column;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--active-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            
            .controls-panel {
                width: 100%;
            }
            
            .combined-template {
                grid-template-columns: 1fr;
            }
        }
        
        /* Drag and drop стили */
        .drop-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: var(--input-bg);
        }
        
        .drop-area:hover {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.05);
        }
        
        .drop-area.highlight {
            border-color: var(--active-color);
            background: rgba(0, 179, 152, 0.1);
        }
        
        .file-info {
            font-size: 12px;
            color: var(--menu-text-light);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Логотип" class="header-logo">
        
    </div>
    
    <div class="main-container">

        <div class="controls-panel"><h1 class="header-title">Генератор менюборда</h1>

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="menu">
                    <img src="menu.svg" alt="Меню"> Меню
                </button>
                <button class="tab-btn" data-tab="promo">
                    <img src="acii.svg" alt="Акция"> Акция
                </button>
                <button class="tab-btn" data-tab="combined">
                    <img src="2v1.svg" alt="2 в 1"> 2в1
                </button>
            </div>

            <div class="controls-content">
                <div id="menu-controls">
                    <div class="control-group">
                        <label>Загрузка данных:</label>
                        <div class="drop-area" id="menu-drop-area">
                            Перетащите файл Excel с меню сюда или
                            <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Выберите файл</button>
                            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display: none;">
                            <div class="file-info" id="menu-file-info">Файл не выбран</div>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="multiple-prices-checkbox">
                            <label for="multiple-prices-checkbox">Использовать цены для объемов (S/M/L)</label>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон:</label>
                        <div class="bg-options">
                            <button class="bg-option-btn active" data-type="color">Цвет</button>
                            <button class="bg-option-btn" data-type="image">Изображение</button>
                        </div>
                        
                        <div id="bg-color-container-menu">
                            <input type="color" id="menu-bg-color-picker" value="#ffffff" style="width: 40%; height: 40px;">
                        </div>
                        
                        <div id="bg-image-container-menu" style="display: none;">
                            <button class="btn btn-secondary" onclick="document.getElementById('menu-bg-upload').click()">Добавить фон</button>
                            <input type="file" id="menu-bg-upload" accept="image/*" style="display: none;">
                            <div class="file-info" id="menu-bg-file-info">Фон не загружен</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт категорий:</label>
                        <div class="setting-row">
                            <select id="category-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                            </select>
                            <input type="number" id="category-font-size" class="input" value="24" min="10" max="100">
                            <input type="color" id="category-color-picker" value="#00b398">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Шрифт пунктов:</label>
                        <div class="setting-row">
                            <select id="item-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="'Lato', sans-serif">Lato</option>
                            </select>
                            <input type="number" id="item-font-size" class="input" value="16" min="10" max="100">
                            <input type="color" id="item-color-picker" value="#667099">
                        </div>
                    </div>
                </div>
                
                <div id="promo-controls" style="display: none;">
                    <div class="control-group">
                        <label for="promo-title-input">Заголовок акции:</label>
                        <input type="text" id="promo-title-input" class="input" placeholder="Введите заголовок акции">
                        
                        <div class="setting-row">
                            <select id="promo-title-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Oswald', sans-serif">Oswald</option>
                                <option value="'Playfair Display', serif">Playfair Display</option>
                                <option value="'Raleway', sans-serif">Raleway</option>
                            </select>
                            <input type="number" id="promo-title-size" class="input" value="60" min="10" max="100">
                            <input type="color" id="promo-title-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-text-input">Текст акции:</label>
                        <input type="text" id="promo-text-input" class="input" placeholder="Введите текст акции">
                        
                        <div class="setting-row">
                            <select id="promo-text-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="'Lato', sans-serif">Lato</option>
                                <option value="'PT Sans', sans-serif">PT Sans</option>
                            </select>
                            <input type="number" id="promo-text-size" class="input" value="30" min="10" max="100">
                            <input type="color" id="promo-text-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="promo-price-input">Цена товара (₽):</label>
                        <input type="number" id="promo-price-input" class="input" placeholder="Введите цену товара">
                        
                        <div class="setting-row">
                            <select id="promo-price-font-select" class="select">
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Oswald', sans-serif">Oswald</option>
                                <option value="'Raleway', sans-serif">Raleway</option>
                            </select>
                            <input type="number" id="promo-price-size" class="input" value="40" min="10" max="100">
                            <input type="color" id="promo-price-color-picker" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>Фон:</label>
                        <div class="bg-options">
                            <button class="bg-option-btn active" data-type="color">Цвет</button>
                            <button class="bg-option-btn" data-type="image">Изображение</button>
                            <button class="bg-option-btn" data-type="generate">Сгенерировать</button>
                        </div>
                        
                        <div id="bg-color-container">
                            <input type="color" id="bg-color-picker" value="#4a6baf" style="width: 100%; height: 40px;">
                        </div>
                        
                        <div id="bg-image-container" style="display: none;">
                            <button class="btn btn-secondary" onclick="document.getElementById('promo-background-upload').click()">Добавить фон</button>
                            <input type="file" id="promo-background-upload" accept="image/*" style="display: none;">
                            <div class="file-info" id="bg-file-info">Изображение не загружено</div>
                        </div>
                        
                        <div id="bg-generate-container" style="display: none;">
                            <input type="text" id="bg-prompt" class="prompt-input" placeholder="Опишите фон для генерации">
                            <button class="generate-btn" id="generate-bg-btn">Сгенерировать фон</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-wrapper">
            <div class="menu-preview" id="menu-preview">
                <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                    <h3>Сейчас здесь будет ваше меню</h3>
                    <p>Настройте параметры слева и загрузите данные</p>
                </div>
            </div>

            <div class="preview-actions">
                <button class="btn" id="download-png-btn">Сохранить в JPEG</button>
                <button class="btn btn-secondary" id="download-pdf-btn">Сохранить в PDF</button>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div>Генерация фона...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tabButtons = document.querySelectorAll('.tab-btn');
            const menuControls = document.getElementById('menu-controls');
            const promoControls = document.getElementById('promo-controls');
            const fileInput = document.getElementById('file-input');
            const menuDropArea = document.getElementById('menu-drop-area');
            const menuFileInfo = document.getElementById('menu-file-info');
            const menuBgUpload = document.getElementById('menu-bg-upload');
            const menuBgFileInfo = document.getElementById('menu-bg-file-info');
            const multiplePricesCheckbox = document.getElementById('multiple-prices-checkbox');
            const menuPreview = document.getElementById('menu-preview');
            const downloadPngBtn = document.getElementById('download-png-btn');
            const downloadPdfBtn = document.getElementById('download-pdf-btn');
            const loadingOverlay = document.getElementById('loading-overlay');
            
            const categoryFontSelect = document.getElementById('category-font-select');
            const categoryFontSizeInput = document.getElementById('category-font-size');
            const categoryColorPicker = document.getElementById('category-color-picker');
            const itemFontSelect = document.getElementById('item-font-select');
            const itemFontSizeInput = document.getElementById('item-font-size');
            const itemColorPicker = document.getElementById('item-color-picker');
            
            const promoTitleInput = document.getElementById('promo-title-input');
            const promoTextInput = document.getElementById('promo-text-input');
            const promoPriceInput = document.getElementById('promo-price-input');
            const promoTitleFontSelect = document.getElementById('promo-title-font-select');
            const promoTextFontSelect = document.getElementById('promo-text-font-select');
            const promoPriceFontSelect = document.getElementById('promo-price-font-select');
            const promoTitleColorPicker = document.getElementById('promo-title-color-picker');
            const promoTextColorPicker = document.getElementById('promo-text-color-picker');
            const promoPriceColorPicker = document.getElementById('promo-price-color-picker');
            const promoTitleSizeInput = document.getElementById('promo-title-size');
            const promoTextSizeInput = document.getElementById('promo-text-size');
            const promoPriceSizeInput = document.getElementById('promo-price-size');
            
            const bgOptionBtns = document.querySelectorAll('.bg-option-btn');
            const bgColorContainer = document.getElementById('bg-color-container');
            const bgImageContainer = document.getElementById('bg-image-container');
            const bgGenerateContainer = document.getElementById('bg-generate-container');
            const promoBackgroundUpload = document.getElementById('promo-background-upload');
            const bgFileInfo = document.getElementById('bg-file-info');
            const bgColorPicker = document.getElementById('bg-color-picker');
            const bgPromptInput = document.getElementById('bg-prompt');
            const generateBgBtn = document.getElementById('generate-bg-btn');

            const menuBgColorPicker = document.getElementById('menu-bg-color-picker');
            const menuBgOptions = document.querySelectorAll('#menu-controls .bg-option-btn');
            const menuBgColorContainer = document.getElementById('bg-color-container-menu');
            const menuBgImageContainer = document.getElementById('bg-image-container-menu');

            let currentTab = 'menu';
            let excelData = null;
            let currentPromoBgType = "color";
            let currentMenuBgType = "color";
            let promoBackgroundImage = null;
            let menuBackgroundImage = null;
            
            init();

            function init() {
                setupEventListeners();
                updateTab();
                renderMenu();
            }

            function setupEventListeners() {
                tabButtons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        tabButtons.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentTab = this.dataset.tab;
                        updateTab();
                        renderMenu();
                    });
                });
                
                setupDropArea(menuDropArea, fileInput, menuFileInfo);
                
                menuBgUpload.addEventListener('change', function(e) {
                    if (e.target.files && e.target.files[0]) {
                        const file = e.target.files[0];
                        menuBgFileInfo.textContent = file.name;
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            menuBackgroundImage = event.target.result;
                            renderMenu();
                        };
                        reader.readAsDataURL(file);
                    }
                });

                multiplePricesCheckbox.addEventListener('change', renderMenu);
                
                categoryFontSelect.addEventListener('change', renderMenu);
                categoryFontSizeInput.addEventListener('input', renderMenu);
                categoryColorPicker.addEventListener('input', renderMenu);
                itemFontSelect.addEventListener('change', renderMenu);
                itemFontSizeInput.addEventListener('input', renderMenu);
                itemColorPicker.addEventListener('input', renderMenu);

                menuBgColorPicker.addEventListener('input', renderMenu);

                menuBgOptions.forEach(btn => {
                    btn.addEventListener('click', function() {
                        menuBgOptions.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentMenuBgType = this.dataset.type;
                        
                        menuBgColorContainer.style.display = 'none';
                        menuBgImageContainer.style.display = 'none';
                        
                        if (currentMenuBgType === 'color') {
                            menuBgColorContainer.style.display = 'block';
                        } else if (currentMenuBgType === 'image') {
                            menuBgImageContainer.style.display = 'block';
                        }
                        
                        renderMenu();
                    });
                });

                promoTitleInput.addEventListener('input', renderMenu);
                promoTextInput.addEventListener('input', renderMenu);
                promoPriceInput.addEventListener('input', renderMenu);
                promoTitleFontSelect.addEventListener('change', renderMenu);
                promoTextFontSelect.addEventListener('change', renderMenu);
                promoPriceFontSelect.addEventListener('change', renderMenu);
                promoTitleColorPicker.addEventListener('input', renderMenu);
                promoTextColorPicker.addEventListener('input', renderMenu);
                promoPriceColorPicker.addEventListener('input', renderMenu);
                promoTitleSizeInput.addEventListener('input', renderMenu);
                promoTextSizeInput.addEventListener('input', renderMenu);
                promoPriceSizeInput.addEventListener('input', renderMenu);
                
                downloadPngBtn.addEventListener('click', downloadAsPNG);
                downloadPdfBtn.addEventListener('click', downloadAsPDF);
                
                bgOptionBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        bgOptionBtns.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentPromoBgType = this.dataset.type;
                        
                        bgColorContainer.style.display = 'none';
                        bgImageContainer.style.display = 'none';
                        bgGenerateContainer.style.display = 'none';
                        
                        if (currentPromoBgType === 'color') {
                            bgColorContainer.style.display = 'block';
                        } else if (currentPromoBgType === 'image') {
                            bgImageContainer.style.display = 'block';
                        } else if (currentPromoBgType === 'generate') {
                            bgGenerateContainer.style.display = 'block';
                        }
                        
                        renderMenu();
                    });
                });
                
                promoBackgroundUpload.addEventListener('change', function(e) {
                    if (e.target.files && e.target.files[0]) {
                        const file = e.target.files[0];
                        bgFileInfo.textContent = file.name;
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            promoBackgroundImage = event.target.result;
                            renderMenu();
                        };
                        reader.readAsDataURL(file);
                    }
                });
                
                generateBgBtn.addEventListener('click', generateBackground);
            }
            
            function setupDropArea(dropArea, fileInput, fileInfo) {
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    dropArea.addEventListener(eventName, preventDefaults, false);
                });
                
                function preventDefaults(e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                
                ['dragenter', 'dragover'].forEach(eventName => {
                    dropArea.addEventListener(eventName, highlight, false);
                });
                
                ['dragleave', 'drop'].forEach(eventName => {
                    dropArea.addEventListener(eventName, unhighlight, false);
                });
                
                function highlight() {
                    dropArea.classList.add('highlight');
                }
                
                function unhighlight() {
                    dropArea.classList.remove('highlight');
                }
                
                dropArea.addEventListener('drop', handleDrop, false);
                
                function handleDrop(e) {
                    const dt = e.dataTransfer;
                    const files = dt.files;
                    if (files.length) {
                        fileInput.files = files;
                        handleFiles(files);
                    }
                }
                
                fileInput.addEventListener('change', function() {
                    if (this.files.length) {
                        handleFiles(this.files);
                    }
                });
                
                function handleFiles(files) {
                    const file = files[0];
                    fileInfo.textContent = file.name;
                    loadExcelFile(file);
                }
            }
            
            function updateTab() {
                menuControls.style.display = 'none';
                promoControls.style.display = 'none';
                if (currentTab === 'menu') {
                    menuControls.style.display = 'block';
                } else if (currentTab === 'promo') {
                    promoControls.style.display = 'block';
                } else if (currentTab === 'combined') {
                    menuControls.style.display = 'block'; // В комбинированном режиме показываем обе панели или одну
                }
            }
            
            function loadExcelFile(file) {
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);
                        
                        excelData = jsonData;
                        renderMenu();
                    } catch (error) {
                        alert('Ошибка при чтении файла: ' + error.message);
                    }
                };
                reader.onerror = function() {
                    alert('Ошибка при чтении файла');
                };
                reader.readAsArrayBuffer(file);
            }
            
            function formatPrice(price) {
                if (!price) return '';
                const num = parseFloat(price);
                return isNaN(num) ? price : num.toFixed(0) + ' ₽';
            }
            
            function getVolumePrices(item) {
                const volumes = ['S', 'M', 'L'];
                let pricesHtml = '';
                let hasVolumePrices = false;
                
                volumes.forEach(vol => {
                    if (item[vol] && !isNaN(parseFloat(item[vol]))) {
                        pricesHtml += `<span class="volume-price">${vol}: ${formatPrice(item[vol])}</span>`;
                        hasVolumePrices = true;
                    }
                });
                
                return hasVolumePrices ? pricesHtml : '';
            }
            
            async function generateBackground() {
                const prompt = bgPromptInput.value.trim();
                if (!prompt) {
                    alert('Введите описание для генерации фона');
                    return;
                }
                
                loadingOverlay.style.display = 'flex';
                
                try {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = 800;
                    canvas.height = 450;
                    const ctx = canvas.getContext('2d');
                    
                    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    gradient.addColorStop(0, '#5A67D8');
                    gradient.addColorStop(1, '#81C784');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        if (Math.random() > 0.7) {
                            const noise = Math.floor(Math.random() * 30) - 15;
                            data[i] += noise;
                            data[i + 1] += noise;
                            data[i + 2] += noise;
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    
                    promoBackgroundImage = canvas.toDataURL('image/jpeg');
                    bgFileInfo.textContent = "Сгенерированный фон";
                    renderMenu();
                    
                } catch (error) {
                    console.error('Ошибка генерации фона:', error);
                    alert('Произошла ошибка при генерации фона: ' + error.message);
                } finally {
                    loadingOverlay.style.display = 'none';
                }
            }
            
            function renderMenu() {
                document.documentElement.style.setProperty('--category-font-size', categoryFontSizeInput.value + 'px');
                document.documentElement.style.setProperty('--category-font-color', categoryColorPicker.value);
                document.documentElement.style.setProperty('--font-category', categoryFontSelect.value);
                document.documentElement.style.setProperty('--item-font-size', itemFontSizeInput.value + 'px');
                document.documentElement.style.setProperty('--item-font-color', itemColorPicker.value);
                document.documentElement.style.setProperty('--font-item', itemFontSelect.value);

                document.documentElement.style.setProperty('--promo-title-font-size', promoTitleSizeInput.value + 'px');
                document.documentElement.style.setProperty('--promo-text-font-size', promoTextSizeInput.value + 'px');
                document.documentElement.style.setProperty('--promo-price-font-size', promoPriceSizeInput.value + 'px');
                
                if (currentTab === 'menu' && !excelData) {
                    menuPreview.innerHTML = `
                        <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                            <h3>Сейчас здесь будет ваше меню</h3>
                            <p>Загрузите файл с меню и настройте параметры слева</p>
                        </div>
                    `;
                    return;
                }
                
                if (currentTab === 'promo' && !promoTitleInput.value && !promoTextInput.value && !promoPriceInput.value) {
                    menuPreview.innerHTML = `
                        <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                            <h3>Сейчас здесь будет ваша акция</h3>
                            <p>Введите данные для акции и настройте параметры слева</p>
                        </div>
                    `;
                    return;
                }
                
                if (currentTab === 'combined' && (!excelData || (!promoTitleInput.value && !promoTextInput.value && !promoPriceInput.value))) {
                    menuPreview.innerHTML = `
                        <div style="text-align: center; color: #a3a9c2; padding: 40px;">
                            <h3>Сейчас здесь будет комбинированное меню</h3>
                            <p>Загрузите файл с меню и введите данные для акции</p>
                        </div>
                    `;
                    return;
                }
                
                let menuHtml = '';
                let promoHtml = '';
                
                if (excelData && (currentTab === 'menu' || currentTab === 'combined')) {
                    const categories = [...new Set(excelData.map(item => item.Категория || 'Основное меню'))];
                    
                    categories.forEach(category => {
                        menuHtml += `<div class="menu-section"><div class="section-title">${category}</div>`;
                        
                        excelData.filter(item => (item.Категория || 'Основное меню') === category).forEach(item => {
                            const hasDescription = item.Описание && item.Описание.trim() !== '';
                            const volumePrices = multiplePricesCheckbox.checked ? getVolumePrices(item) : '';
                            const showMainPrice = !multiplePricesCheckbox.checked || !volumePrices;
                            
                            menuHtml += `
                            <div class="menu-item">
                                <div class="item-content">
                                    <div class="item-name">${item.Название || ''}</div>
                                    ${hasDescription ? `<div class="item-description">${item.Описание}</div>` : ''}
                                </div>
                                <div class="item-price">
                                    ${showMainPrice ? formatPrice(item.Цена) : volumePrices}
                                </div>
                            </div>
                            `;
                        });
                        
                        menuHtml += `</div>`;
                    });
                }
                
                if (currentTab === 'promo' || currentTab === 'combined') {
                    if (promoTitleInput.value || promoTextInput.value || promoPriceInput.value) {
                        promoHtml = `
                            <div class="promo-header">
                                ${promoTitleInput.value ? `
                                <div class="promo-title" style="font-family: ${promoTitleFontSelect.value}; color: ${promoTitleColorPicker.value}">
                                    ${promoTitleInput.value}
                                </div>
                                ` : ''}
                                ${promoTextInput.value ? `
                                <div class="promo-text" style="font-family: ${promoTextFontSelect.value}; color: ${promoTextColorPicker.value}">
                                    ${promoTextInput.value}
                                </div>
                                ` : ''}
                                ${promoPriceInput.value ? `
                                <div class="promo-price" style="font-family: ${promoPriceFontSelect.value}; color: ${promoPriceColorPicker.value}">
                                    ${formatPrice(promoPriceInput.value)}
                                </div>
                                ` : ''}
                            </div>
                        `;
                    }
                }
                
                menuPreview.innerHTML = '';
                
                if (currentTab === 'menu') {
                    const menuContainer = document.createElement('div');
                    menuContainer.className = 'menu-content';
                    
                    if (currentMenuBgType === 'color') {
                        menuContainer.style.backgroundColor = menuBgColorPicker.value;
                    } else if (currentMenuBgType === 'image' && menuBackgroundImage) {
                        menuContainer.style.backgroundImage = `url(${menuBackgroundImage})`;
                        menuContainer.style.backgroundSize = 'cover';
                        menuContainer.style.backgroundPosition = 'center';
                        menuContainer.style.padding = '30px';
                    }
                    
                    const menuItemsContainer = document.createElement('div');
                    menuItemsContainer.className = 'menu-items-container';
                    
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = menuHtml;
                    
                    const totalItems = excelData ? excelData.length : 0;
                    const itemsPerColumn = Math.ceil(totalItems / 2);
                    
                    if (totalItems > 10) {
                        menuItemsContainer.classList.add('two-columns');
                        let currentColumnHtml = '';
                        let count = 0;
                        const sections = [...new Set(excelData.map(item => item.Категория || 'Основное меню'))];
                        let sectionCount = 0;
                        
                        sections.forEach(section => {
                            const sectionItems = excelData.filter(item => (item.Категория || 'Основное меню') === section);
                            if (count + sectionItems.length > itemsPerColumn && count !== 0) {
                                const column = document.createElement('div');
                                column.innerHTML = currentColumnHtml;
                                menuItemsContainer.appendChild(column);
                                currentColumnHtml = '';
                                count = 0;
                            }
                            
                            currentColumnHtml += `<div class="menu-section"><div class="section-title">${section}</div>`;
                            sectionItems.forEach(item => {
                                const hasDescription = item.Описание && item.Описание.trim() !== '';
                                const volumePrices = multiplePricesCheckbox.checked ? getVolumePrices(item) : '';
                                const showMainPrice = !multiplePricesCheckbox.checked || !volumePrices;
                                currentColumnHtml += `
                                <div class="menu-item">
                                    <div class="item-content">
                                        <div class="item-name">${item.Название || ''}</div>
                                        ${hasDescription ? `<div class="item-description">${item.Описание}</div>` : ''}
                                    </div>
                                    <div class="item-price">
                                        ${showMainPrice ? formatPrice(item.Цена) : volumePrices}
                                    </div>
                                </div>
                                `;
                            });
                            currentColumnHtml += `</div>`;
                            count += sectionItems.length;
                        });
                        
                        if (currentColumnHtml) {
                            const column = document.createElement('div');
                            column.innerHTML = currentColumnHtml;
                            menuItemsContainer.appendChild(column);
                        }
                    } else {
                        menuItemsContainer.innerHTML = menuHtml;
                    }
                    
                    menuContainer.appendChild(menuItemsContainer);
                    menuPreview.appendChild(menuContainer);
                } 
                else if (currentTab === 'promo') {
                    const promoContainer = document.createElement('div');
                    promoContainer.className = 'promo-template';
                    
                    if (currentPromoBgType === 'color') {
                        promoContainer.style.backgroundColor = bgColorPicker.value;
                    } else if (currentPromoBgType === 'image' && promoBackgroundImage) {
                        promoContainer.style.backgroundImage = `url(${promoBackgroundImage})`;
                        promoContainer.style.backgroundSize = 'cover';
                        promoContainer.style.backgroundPosition = 'center';
                    } else if (currentPromoBgType === 'generate' && promoBackgroundImage) {
                        promoContainer.style.backgroundImage = `url(${promoBackgroundImage})`;
                        promoContainer.style.backgroundSize = 'cover';
                        promoContainer.style.backgroundPosition = 'center';
                    }
                    
                    const content = document.createElement('div');
                    content.className = 'promo-content';
                    content.innerHTML = promoHtml;
                    promoContainer.appendChild(content);
                    menuPreview.appendChild(promoContainer);
                }
                else if (currentTab === 'combined') {
                    const combinedContainer = document.createElement('div');
                    combinedContainer.className = 'combined-template';
                    
                    const menuPart = document.createElement('div');
                    menuPart.className = 'combined-menu-part';
                    
                    if (currentMenuBgType === 'color') {
                        menuPart.style.backgroundColor = menuBgColorPicker.value;
                    } else if (currentMenuBgType === 'image' && menuBackgroundImage) {
                        menuPart.style.backgroundImage = `url(${menuBackgroundImage})`;
                        menuPart.style.backgroundSize = 'cover';
                        menuPart.style.backgroundPosition = 'center';
                        menuPart.style.backgroundColor = 'rgba(255,255,255,0.9)';
                    }
                    
                    const menuScroll = document.createElement('div');
                    menuScroll.className = 'combined-menu-scroll';
                    
                    menuPart.innerHTML = `<div class="menu-items-container"></div>`;
                    menuScroll.innerHTML = menuHtml;
                    menuPart.querySelector('.menu-items-container').appendChild(menuScroll);
                    combinedContainer.appendChild(menuPart);
                    
                    const promoPart = document.createElement('div');
                    promoPart.className = 'combined-promo-part';
                    
                    if (currentPromoBgType === 'color') {
                        promoPart.style.backgroundColor = bgColorPicker.value;
                    } else if (currentPromoBgType === 'image' && promoBackgroundImage) {
                        promoPart.style.backgroundImage = `url(${promoBackgroundImage})`;
                        promoPart.style.backgroundSize = 'cover';
                        promoPart.style.backgroundPosition = 'center';
                    } else if (currentPromoBgType === 'generate' && promoBackgroundImage) {
                        promoPart.style.backgroundImage = `url(${promoBackgroundImage})`;
                        promoPart.style.backgroundSize = 'cover';
                        promoPart.style.backgroundPosition = 'center';
                    }
                    
                    const promoContent = document.createElement('div');
                    promoContent.className = 'combined-promo-content';
                    promoContent.innerHTML = promoHtml;
                    promoPart.appendChild(promoContent);
                    combinedContainer.appendChild(promoPart);
                    
                    menuPreview.appendChild(combinedContainer);
                }
            }
            
            function downloadAsPNG() {
                html2canvas(menuPreview, {backgroundColor: null, scale: 2}).then(canvas => {
                    canvas.toBlob(function(blob) {
                        saveAs(blob, 'menuboard.png');
                    }, 'image/png', 1.0);
                });
            }
            
            function downloadAsPDF() {
                const { jsPDF } = window.jspdf;
                
                html2canvas(menuPreview, {backgroundColor: null, scale: 2}).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF({
                        orientation: 'landscape',
                        unit: 'mm',
                        format: 'a4'
                    });
                    
                    const imgProps = pdf.getImageProperties(imgData);
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    
                    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save('menuboard.pdf');
                });
            }
        });
    </script>
</body>
</html>
