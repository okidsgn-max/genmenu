<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор менюборда</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bad+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* Основные стили из cssstyle3.css */
        :root {
            --primary: #00b398;
            --primary-hover: #008f79;
            --primary-active: #005c4e;
            --primary-light: #e0f2f0;
            --text-main: #1A1D1F;
            --text-secondary: #3d435c;
            --text-inactive: #667099;
            --border: #e8e8f0;
            --background-light: #f6f6f9;
            --background-dark: #f0f0f5;
            --placeholder: #9A9FA5;
            --border-radius: 8px;
            --transition-fast: 0.15s;
            --transition-medium: 0.3s;
            --transition-slow: 0.5s;

            /* Grid specific */
            --grid-bg-color: transparent;
            --cell-bg-color: rgba(255, 255, 255, 0.85);
            --menu-bg-color: #eeeeee;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            color: var(--text-main);
            background-color: #f5f5f5;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Новый хедер */
        .header {
            height: 60px;
            width: 100%;
            background-image: url('banner-adv.webp');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 100;
        }
        
        .header-logo-container {
            display: flex;
            align-items: center;
        }
        
        .header-logo {
            height: 24px;
            object-fit: contain;
        }
        
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        
        .header-text {
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        
        .header-btn {
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition-medium);
            text-decoration: none;
        }
        
        .header-btn.trial {
            background-color: var(--primary);
            color: white;
            border: none;
        }
        
        .header-btn.trial:hover {
            background-color: var(--primary-hover);
        }
        
        .header-btn.login {
            background-color: var(--background-light);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .header-btn.login:hover {
            background-color: #e8e8f0;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            height: calc(100% - 60px);
            padding: 20px;
        }
        
        /* Кнопки */
        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            line-height: 20px;
            border-radius: var(--border-radius);
            padding: 12px 16px;
            cursor: pointer;
            transition: all var(--transition-medium);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary);
            color: #FFFFFF;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(0px);
            box-shadow: 0 0px 0px rgba(0,0,0,0.15);
        }
        
        .btn:active {
            background-color: var(--primary-active);
            transform: translateY(0);
            box-shadow: 0 0px 0px rgba(0,0,0,0.1);
        }
        
        .btn-secondary {
            background-color: var(--background-light);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background-color: #e8e8f0;
        }
        
        /* Поля ввода */
        .input, .select {
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: var(--border-radius);
            background-color: var(--background-light);
            color: var(--text-secondary);
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: all var(--transition-medium);
            margin-bottom: 16px;
        }
        
        .input:hover, .select:hover {
            border-color: var(--primary-hover);
        }
        
        .select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 6L8 10L12 6' stroke='%239A9FA5' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            cursor: pointer;
        }
        
        .input:focus, .select:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(0, 179, 152, 0.1);
        }
        
        /* Чекбоксы */
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .features-group {
            display: flex;
            gap: 15px;
        }
        
        .checkbox-group input {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 0;
        }
        
        /* Остальные стили из оригинального файла */
        .controls-panel {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            width: 380px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .controls-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .controls-footer {
            padding-top: 15px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .tab-btn {
            display: flex;
            align-items: center;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition-medium);
            color: var(--text-secondary);
        }

        .tab-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .tab-btn.active {
            color: var(--primary);
        }
        
        .control-group {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .control-group:last-child { border-bottom: none; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .preview-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .preview-container {
            width: 100%;
            background: transparent;
            border-radius: var(--border-radius);
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid var(--border);
        }
                
        .preview-actions {
            padding: 15px 0 0 0;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }
        
        .menu-preview {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: var(--menu-bg-color);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            overflow: hidden;
        }
        
        /* Стили для шаблона списка */
        .menu-list-template {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .menu-items-container {
            flex: 1;
            overflow: auto;
            display: grid;
            gap: 20px 40px;
            padding: 30px;
        }

        .menu-items-container.two-columns { grid-template-columns: 1fr 1fr; }
        
        .menu-section { margin-bottom: 30px; }
        
        .section-title {
            font-family: var(--category-font-family);
            font-size: var(--category-font-size);
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
            color: var(--category-font-color);
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border);
        }
        
        .item-content { flex-grow: 1; }
        
        .item-name {
            font-family: var(--item-font-family);
            font-weight: 500;
            font-size: var(--item-font-size);
            color: var(--item-font-color);
            margin-bottom: 5px;
        }
        
        .item-description {
            font-family: var(--desc-font-family);
            font-size: var(--desc-font-size);
            color: var(--desc-font-color);
            margin-bottom: 5px;
            font-weight: 300;
        }
        
        .item-price {
            font-family: var(--item-font-family);
            font-weight: 700;
            font-size: var(--item-font-size);
            color: var(--item-font-color);
            white-space: nowrap;
            margin-left: 20px;
            text-align: right;
            min-width: 80px;
        }
        
        /* Стили для шаблонов сетки */
        .menu-grid-template, .menu-grid-template-3x3 {
            width: 100%;
            height: 100%;
            display: grid;
            gap: 15px;
            padding: 15px;
            background-color: var(--grid-bg-color);
        }
        .menu-grid-template {
             grid-template-columns: 1fr 1fr;
             grid-template-rows: 1fr 1fr;
        }
        .menu-grid-template-3x3 {
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .grid-cell {
            background-color: var(--cell-bg-color);
            backdrop-filter: blur(5px);
            border-radius: var(--border-radius);
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 5px;
            position: relative;
            overflow: hidden;
        }
        
        .grid-cell .item-name,
        .grid-cell .item-description,
        .grid-cell .item-price {
            position: relative;
            z-index: 3;
            /* background-color: rgba(0,0,0,0.5); */ /* Removed as requested */
            padding: 5px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7); /* Added for readability on complex backgrounds */
        }

        .grid-cell .item-name { 
            grid-row: 1;
            font-weight: 700;
        }
        
        .grid-cell .item-description { 
            grid-row: 2;
            align-self: start; 
            white-space: normal;
            overflow: hidden;
        }
        
        .grid-cell .item-price { 
            grid-row: 3;
            align-self: end; 
            text-align: left; 
            margin-left: 0;
            font-family: var(--price-font-family);
            font-size: var(--price-font-size);
            color: var(--price-font-color);
        }
        
        .grid-cell .item-photo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            z-index: 1;
        }
        
        .grid-cell .item-photo { 
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .grid-cell .upload-photo-btn {
            font-size: 30px;
            cursor: pointer;
            border: none;
            background: #e0e0e0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #888;
            position: relative;
            z-index: 2;
        }

        /* Стили для шаблона "Акция" */
        .promo-template {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-color: #333333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .promo-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: var(--promo-text-align, left);
        }
        
        .promo-title, .promo-text, .promo-price {
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5); /* Added for readability */
        }

        .promo-title {
            font-size: var(--promo-title-font-size);
            font-family: var(--promo-title-font-family);
            color: var(--promo-title-font-color);
            font-weight: 700; 
            margin-bottom: 20px; 
            line-height: 1.1;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }
        
        .promo-text {
            font-size: var(--promo-text-font-size);
            font-family: var(--promo-text-font-family);
            color: var(--promo-text-font-color);
            margin-bottom: 30px; 
            line-height: 1.3;
        }
        
        .promo-price-container {
            margin-top: auto;
            display: inline-flex;
            align-items: center;
            gap: 20px;
        }

        .promo-content[style*="text-align: center"] .promo-title,
        .promo-content[style*="text-align: center"] .promo-price-container {
            margin-left: auto;
            margin-right: auto;
        }

        .promo-content[style*="text-align: right"] .promo-title,
        .promo-content[style*="text-align: right"] .promo-price-container {
            margin-left: auto;
        }
        
        .promo-price {
            font-size: var(--promo-price-font-size);
            font-family: var(--promo-price-font-family);
            color: var(--promo-price-font-color);
            font-weight: bold;
        }
        
        .promo-discount {
            font-size: calc(var(--promo-price-font-size) * 0.7);
            font-family: var(--promo-price-font-family);
            color: var(--discount-font-color);
            font-weight: bold;
            background: var(--discount-bg-color);
            padding: 5px 10px;
            border-radius: 20px;
        }
        
        .promo-icon {
            height: 1em;
            width: auto;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5)); /* Added for readability */
        }
        
        /* Стили для комбинированного шаблона */
        .combined-template {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .combined-menu-part {
            overflow: auto;
            position: relative;
            background-color: var(--menu-bg-color);
        }
        
        .combined-promo-part {
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        
        /* Special styles for 2-in-1 with grid */
        .combined-grid-active .combined-promo-part {
            display: grid;
            place-items: center;
        }
        
        .combined-grid-active .combined-promo-content {
             width: 90%;
             height: 90%;
             padding: 30px;
        }
        
        .combined-promo-content {
            position: relative;
            z-index: 2;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            text-align: left;
            color: white;
        }
        
        /* Стили для логотипа и даты */
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--menu-bg-color);
            flex-shrink: 0;
        }
        
        .menu-logo {
            max-height: 50px;
            max-width: 150px;
        }
        
        .menu-date {
            font-family: var(--item-font-family);
            font-size: 14px;
            color: var(--text-secondary);
            background-color: var(--menu-bg-color);
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        /* Оверлей для 3x3 предупреждения */
        .warning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, var(--overlay-opacity, 0.5));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }
        
        /* Модальные окна */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            width: 400px;
            max-width: 90%;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .aspect-ratio-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .aspect-ratio-btn {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            cursor: pointer;
            text-align: center;
        }
        
        .aspect-ratio-btn.active {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }
        
        .loading-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background: rgba(0,0,0,0.7); 
            display: none;
            justify-content: center; 
            align-items: center; 
            z-index: 1000;
            color: white; 
            font-size: 24px; 
            flex-direction: column; 
            text-align: center;
        }
        
        .spinner {
            border: 5px solid #f3f3f3; 
            border-top: 5px solid var(--primary);
            border-radius: 50%; 
            width: 50px; 
            height: 50px;
            animation: spin 1s linear infinite; 
            margin-bottom: 20px;
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        /* Область для перетаскивания файлов */
        .drop-area {
            border: 2px dashed var(--border); 
            border-radius: var(--border-radius);
            padding: 20px; 
            text-align: center; 
            margin-bottom: 15px;
            cursor: pointer; 
            transition: all var(--transition-medium); 
            background-color: var(--background-light);
        }
        
        .drop-area:hover, .drop-area.highlight {
            border-color: var(--primary);
            background: rgba(0, 179, 152, 0.1);
        }
        
        .file-info { 
            font-size: 12px; 
            color: var(--text-inactive); 
            margin-top: 5px; 
        }

        /* Кнопки выбора макета */
        .layout-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .layout-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all var(--transition-medium);
            background: var(--background-light);
            font-size: 12px;
            font-weight: 500;
        }
        
        .layout-btn:hover {
            border-color: var(--primary);
            background: rgba(0, 179, 152, 0.1);
        }
        
        .layout-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }
        
        .layout-btn img {
            width: 24px;
            height: 24px;
            margin-bottom: 5px;
        }
        
        .layout-btn.active img {
             filter: brightness(0) invert(1);
        }

        /* Выбор цвета */
        .color-picker-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            align-items: center;
        }
        
        .color-picker-item label {
            font-size: 12px;
            text-align: center;
        }

            width: 100%;
            height: 30px;
            padding: 0;
            border: none;
            background: none;
            border-radius: var(--border-radius);
        }
        
        .grid-color-item {
            display: none;
        }
        
        /* Ползунок */
        .slider-container {
            margin-bottom: 15px;
        }
        
        .slider-container label {
            display: block;
            margin-bottom: 5px;
        }
        
        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--background-light);
            outline: none;
            -webkit-appearance: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        
        .slider-value {
            font-size: 12px;
            color: var(--text-inactive);
            text-align: right;
        }
        
        /* Строки настроек */
        .setting-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .setting-row .select {
            flex: 2;
        }
        
        .setting-row .input {
            flex: 1;
        }
        
        .setting-row input[type="color"] {
            width: 40px;
            height: 40px;
            padding: 0;
            border: none;
            background: none;
        }
    </style>
</head>
