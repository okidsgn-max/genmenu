<!DOCTYPE html>
<html lang="ru">
<!-- Остальная часть HTML остается без изменений до скрипта -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Создаем FFmpeg с встроенными WASM-файлами
    const { createFFmpeg } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'ffmpeg-core.js',
        // Отключаем загрузку из сети
        mainName: 'main',
        workerLoad: false,
        coreLoad: false
    });

    // Встроенные WASM-ресурсы (обычно их нужно заменить на актуальные base64-строки)
    const wasmBinary = `...base64 encoded ffmpeg-core.wasm...`;
    const workerScript = `...base64 encoded ffmpeg-worker.js...`;

    let ffmpegLoaded = false;
    
    // Загружаем FFmpeg из памяти
    async function loadFFmpeg() {
        if (ffmpegLoaded) return true;
        
        controls.loadingText.textContent = 'Инициализация видеомодуля...';
        controls.loadingOverlay.style.display = 'flex';
        
        try {
            // Создаем Blob URL для worker
            const workerBlob = new Blob([atob(workerScript)], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(workerBlob);
            
            // Создаем Uint8Array из WASM бинарника
            const wasmArray = Uint8Array.from(atob(wasmBinary), c => c.charCodeAt(0));
            
            // Загружаем FFmpeg
            await ffmpeg.load({
                workerURL: workerUrl,
                coreURL: { wasm: wasmArray },
                wasmPath: '',
                workerPath: ''
            });
            
            ffmpegLoaded = true;
            console.log('FFmpeg инициализирован');
            return true;
        } catch (e) {
            console.error('Ошибка загрузки FFmpeg:', e);
            alert('Не удалось инициализировать видеомодуль. Попробуйте обновить страницу.');
            return false;
        } finally {
            controls.loadingOverlay.style.display = 'none';
        }
    }

    // Остальной код остается без изменений до функции downloadAsMP4

    async function downloadAsMP4() {
        controls.mp4Modal.style.display = 'none';
        const name = controls.videoName.value || 'Мое меню';
        const duration = parseInt(controls.videoDuration.value) || 10;
        
        controls.videoProcessing.style.display = 'flex';
        
        try {
            // Инициализируем FFmpeg если еще не загружен
            if (!await loadFFmpeg()) return;
            
            // Делаем скриншот меню
            const target = controls.menuPreview.children[0];
            if (!target) return;
            
            controls.videoProcessing.querySelector('p').textContent = 'Делаем скриншот меню...';
            const canvas = await html2canvas(target, { 
                backgroundColor: null, 
                scale: 2,
                width: 1920,
                height: 1080,
                logging: false
            });
            
            // Конвертируем в JPEG
            controls.videoProcessing.querySelector('p').textContent = 'Подготавливаем изображение...';
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            const imageBlob = await (await fetch(imageData)).blob();
            
            // Создаем видео
            controls.videoProcessing.querySelector('p').textContent = 'Создаем видео... (это займет 10-30 секунд)';
            
            // Пишем файл в виртуальную файловую систему FFmpeg
            ffmpeg.FS('writeFile', 'input.jpg', await fetchFile(imageBlob));
            
            // Запускаем кодирование
            await ffmpeg.run(
                '-loop', '1',
                '-i', 'input.jpg',
                '-c:v', 'libx264',
                '-t', duration.toString(),
                '-pix_fmt', 'yuv420p',
                '-vf', 'scale=1920:1080',
                '-preset', 'fast',
                '-crf', '23',
                'output.mp4'
            );
            
            // Читаем результат
            const data = ffmpeg.FS('readFile', 'output.mp4');
            
            // Сохраняем файл
            controls.videoProcessing.querySelector('p').textContent = 'Сохранение видео...';
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            saveAs(blob, `${name.replace(/[^a-zа-яё0-9]/gi, '_')}.mp4`);
            
        } catch (error) {
            console.error('Ошибка создания видео:', error);
            alert('Произошла ошибка: ' + error.message);
        } finally {
            controls.videoProcessing.style.display = 'none';
        }
    }

    // Остальной код остается без изменений
});
</script>
</html>
